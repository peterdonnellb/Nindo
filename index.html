// JP per action: attack=10, special=15, kill=20, move only=3, use item=5
const JP_AWARDS = { attack: 10, special: 15, kill: 20, move: 3, item: 5 };

// Job level thresholds: level 1-5, unlock new ability slots at levels 2 and 4
const JOB_LEVEL_XP = [0, 150, 400, 800, 1400, 2200];

// ── Helpers ──

function getNinjaJobData(n) {
  if (!n.jobs) n.jobs = {};
  if (!n.jobs[n.class]) n.jobs[n.class] = { jp: 0, totalSp: 0, level: 1 };
  const jd = n.jobs[n.class];
  // Migrate: ensure totalSp exists on old saves
  if (jd.totalSp === undefined) jd.totalSp = jd.jp;
  return jd;
}

function getUnlockedAbilities(n) {
  return n.unlockedAbilities || [];
}

function getEquippedSlots(n) {
  if (!n.equippedAbilities) n.equippedAbilities = { reaction: null, support: null, movement: null };
  return n.equippedAbilities;
}

function getAbilitiesForSlot(n, slot) {
  return getUnlockedAbilities(n)
    .map(id => JOB_ABILITIES[id])
    .filter(a => a && a.slot === slot);
}

function canLearnAbility(n, abilityId) {
  const ab = JOB_ABILITIES[abilityId];
  if (!ab) return false;
  if (getUnlockedAbilities(n).includes(abilityId)) return false;
  if (ab.classReq && !ab.classReq.includes(n.class)) return false;
  const jd = getNinjaJobData(n);
  return jd.jp >= ab.jpCost;
}

function learnAbility(n, abilityId) {
  const ab = JOB_ABILITIES[abilityId];
  if (!ab) return false;
  const jd = getNinjaJobData(n);
  if (jd.jp < ab.jpCost) { toast('Not enough SP!', 'error'); return false; }
  jd.jp -= ab.jpCost;  // spend from spendable pool only — totalSp unchanged
  if (!n.unlockedAbilities) n.unlockedAbilities = [];
  n.unlockedAbilities.push(abilityId);
  // Auto-equip if slot is empty
  const slots = getEquippedSlots(n);
  if (!slots[ab.slot]) slots[ab.slot] = abilityId;
  saveGame();
  toast(n.name + ' learned ' + ab.name + '!', 'success');
  return true;
}

function equipAbility(n, slot, abilityId) {
  const slots = getEquippedSlots(n);
  slots[slot] = abilityId || null;
  saveGame();
}

function giveJP(n, amount, actionType) {
  const jd = getNinjaJobData(n);
  jd.jp += amount;        // spendable SP
  jd.totalSp += amount;   // lifetime SP (never decreases — drives level/meter)
  // Level up based on lifetime SP earned, not spendable
  const nextThreshold = JOB_LEVEL_XP[jd.level];
  if (nextThreshold && jd.totalSp >= nextThreshold && jd.level < 5) {
    jd.level++;
    const gn = GS.clan.find(x => x.id === n.id);
    if (gn) { if (!gn.jobs) gn.jobs = {}; gn.jobs[n.class] = { ...jd }; }
    addLog('★ ' + n.name + ' Skill Level ' + jd.level + ' (' + n.class + ')!', 'system');
    toast(n.name + ': ' + n.class + ' Skill Lv' + jd.level + '!', 'success');
  }
  const gn = GS.clan.find(x => x.id === n.id);
  if (gn) { if (!gn.jobs) gn.jobs = {}; gn.jobs[n.class] = { ...jd }; }
}

// ── Compute effective stats with support passives ──
function getEffectiveMoveRange(ally) {
  const cls = CLASSES[ally.class];
  let range = cls.moveRange;
  const slots = getEquippedSlots(ally);
  if (slots.movement) {
    const ab = JOB_ABILITIES[slots.movement];
    if (ab?.effect === 'move_range') range += ab.value;
  }
  return range;
}

function hasMovementAbility(ally, effectId) {
  const slots = getEquippedSlots(ally);
  if (!slots.movement) return false;
  return JOB_ABILITIES[slots.movement]?.effect === effectId;
}

function hasSupportAbility(ally, effectId) {
  const slots = getEquippedSlots(ally);
  if (!slots.support) return false;
  return JOB_ABILITIES[slots.support]?.effect === effectId;
}

function hasWeaponUnlock(ally, weaponType) {
  const slots = getEquippedSlots(ally);
  if (!slots.support) return false;
  const ab = JOB_ABILITIES[slots.support];
  return ab?.effect === 'unlock_weapon' && ab.weaponType === weaponType;
}

function getSupportDmgBonus(ally) {
  const slots = getEquippedSlots(ally);
  if (!slots.support) return 1;
  const ab = JOB_ABILITIES[slots.support];
  return ab?.effect === 'stat_dmg' ? (1 + ab.value) : 1;
}

// ── REACTION hooks ──

// Called before ally takes damage — returns modified damage after reactions
function triggerReaction(ally, rawDmg, attackerUnit) {
  const slots = getEquippedSlots(ally);
  const reactionId = slots?.reaction;
  if (!reactionId) return rawDmg;
  const ab = JOB_ABILITIES[reactionId];
  if (!ab) return rawDmg;

  switch (ab.effect) {
    case 'counter': {
      if (attackerUnit && attackerUnit.hp > 0) {
        const counterDmg = Math.max(1, Math.floor(rawDmg * ab.value));
        if (attackerUnit.gridId) {
          // Attacker is an ally (shouldn't happen normally)
        } else {
          attackerUnit.hp = Math.max(0, attackerUnit.hp - counterDmg);
          addLog(ally.name + ' COUNTERS ' + attackerUnit.name + ' for ' + counterDmg + '!', 'special');
        }
      }
      return rawDmg;
    }
    case 'auto_heal': {
      const hpAfter = ally.hp - rawDmg;
      if (hpAfter / ally.maxHp < ab.threshold) {
        const healItem = ally.carriedItems?.find(i => i.effect === 'heal' || i.effect === 'full_heal');
        if (healItem) {
          const healed = Math.min(ally.maxHp - ally.hp, healItem.value || 25);
          ally.hp = Math.min(ally.maxHp, ally.hp + healed);
          const idx = ally.carriedItems.indexOf(healItem);
          if (idx !== -1) ally.carriedItems.splice(idx, 1);
          addLog(ally.name + ': Auto-Potion activates! +' + healed + ' HP', 'heal');
        }
      }
      return rawDmg;
    }
    case 'evade_step': {
      if (Math.random() < ab.chance) {
        // Try to step to adjacent empty tile
        const dirs = [{dx:1,dy:0},{dx:-1,dy:0},{dx:0,dy:1},{dx:0,dy:-1}];
        for (const d of dirs) {
          if (isPosEmpty(ally.x + d.dx, ally.y + d.dy, ally.gridId)) {
            ally.x += d.dx; ally.y += d.dy;
            addLog(ally.name + ' redirects and dodges!', 'special');
            return 0; // evaded
          }
        }
      }
      return rawDmg;
    }
    case 'nullify_blade': {
      if (attackerUnit?.weapon?.type === 'blades' && Math.random() < ab.chance) {
        addLog(ally.name + ' grasps the blade — nullified!', 'special');
        return 0;
      }
      return rawDmg;
    }
    case 'chi_absorb': {
      if (ally.chi >= ab.chiCost) {
        ally.chi -= ab.chiCost;
        const absorbed = Math.floor(rawDmg * ab.value);
        addLog(ally.name + ' chi barrier absorbs ' + absorbed + ' dmg!', 'special');
        return rawDmg - absorbed;
      }
      return rawDmg;
    }
  }
  return rawDmg;
}

// Check iron_will support ability
function checkIronWill(ally, dmg) {
  if (!hasSupportAbility(ally, 'survive_lethal')) return dmg;
  if (ally.hp - dmg <= 0 && ally.hp > 10) {
    addLog(ally.name + ': Iron Will activates! Survives at 1 HP!', 'special');
    return ally.hp - 1; // survive at 1 HP
  }
  return dmg;
}

// Check poison_touch on_hit support
function checkOnHitPoison(ally, target) {
  if (!hasSupportAbility(ally, 'on_hit_poison')) return;
  if (target && target.hp > 0 && Math.random() < 0.3) {
    target.status = 'poisoned';
    addLog(ally.name + ': Poison Touch! ' + target.name + ' poisoned!', 'special');
  }
}

// ==========================================
// ===== ATB / CT TURN SYSTEM =====
// ==========================================

// Advance simulation until a unit's CT reaches 100, then start their turn
function advanceCT() {
  if (!CS.active) return;
  const allUnits = getAllLiveUnits();
  if (!allUnits.length) { checkCombatEnd(); return; }

  // Tick all units' CT by their speed until someone is ready
  let iters = 0;
  while (iters++ < 2000) {
    allUnits.forEach(u => { u.ct = (u.ct || 0) + (u.spd || 5); });
    const ready = allUnits.filter(u => u.ct >= 100);
    if (ready.length) {
      // Highest CT goes first; speed breaks ties
      ready.sort((a, b) => b.ct - a.ct || b.spd - a.spd);
      beginUnitTurn(ready[0]);
      return;
    }
  }
}

function getAllLiveUnits() {
  return [
    ...CS.allies.filter(a => isAllyActive(a) && !a.escaped),
    ...CS.enemies.filter(e => e.hp > 0)
  ];
}

// Calculate upcoming turn order for display (does not modify actual CT)
function calcTurnOrder(count) {
  const allUnits = getAllLiveUnits();
  if (!allUnits.length) return [];
  const cts = {};
  allUnits.forEach(u => { cts[u.gridId || u.id] = u.ct || 0; });
  const order = [];
  let iters = 0;
  while (order.length < count && iters++ < 2000) {
    allUnits.forEach(u => { cts[u.gridId || u.id] += u.spd || 5; });
    const ready = allUnits.filter(u => cts[u.gridId || u.id] >= 100);
    if (ready.length) {
      ready.sort((a, b) => cts[b.gridId||b.id] - cts[a.gridId||a.id] || b.spd - a.spd);
      for (const u of ready) {
        if (order.length < count) order.push(u);
        cts[u.gridId || u.id] = 0;
      }
    }
  }
  return order;
}

function beginUnitTurn(unit) {
  CS.activeUnit = unit.gridId || unit.id;
  CS.unitMoved = false;
  CS.unitActed = false;
  CS.savedMove = null;

  if (unit.gridId) {
    // ALLY turn
    unit.chi = Math.min(unit.maxChi, unit.chi + 1); // chi regen
    CS.selectedAlly = unit.gridId;
    CS.phase = 'player';
    CS.turn++;
    addLog('--- ' + unit.name + '\'s turn (SPD ' + (unit.spd||5) + ') ---', 'system');
    if (CS.turnLimit > 0) {
      const left = CS.turnLimit - CS.turn + 1;
      if (left <= 3) addLog('\u23f3 ' + left + ' turn' + (left !== 1 ? 's' : '') + ' remaining!', 'system');
    }
    renderCombat();
    checkCombatEnd();
  } else {
    // ENEMY turn
    CS.phase = 'enemy_acting';
    renderCombat();
    setTimeout(() => runEnemyUnitTurn(unit), 400);
  }
}

// Called at the end of every unit's turn (ally or enemy) to tick doom counters
function tickDoomCountdowns() {
  const doomed = CS.allies.filter(a => a.doomed && a.doomCountdown > 0);
  doomed.forEach(ally => {
    ally.doomCountdown--;
    if (ally.doomCountdown <= 0) {
      // Permadeath — unit expires
      triggerPermadeath(ally);
    } else {
      addLog(ally.name + ' is dying! ' + ally.doomCountdown + ' turn' + (ally.doomCountdown !== 1 ? 's' : '') + ' remaining!', 'death');
    }
  });
}

function triggerPermadeath(ally) {
  addLog(ally.name + ' has perished! Lost forever...', 'death');
  toast(ally.name + ' has died permanently!', 'error');

  // Build loot bag from all their equipment
  const bag = {
    x: ally.x, y: ally.y,
    allyId: ally.id,
    name: ally.name + "'s Belongings",
    icon: '💀',
    items: [...(ally.carriedItems || [])],
    weapon: ally.weapon ? { ...ally.weapon } : null,
  };
  CS.doomBags.push(bag);

  // Remove from GS clan permanently
  const gnIdx = GS.clan.findIndex(x => x.id === ally.id);
  if (gnIdx !== -1) GS.clan.splice(gnIdx, 1);

  // Mark dead in CS (hp=0 already, flag as perished so it's skipped)
  ally.doomed = false;
  ally.perished = true;
  ally.hp = 0;

  // Persist removal immediately so save state is correct even if combat ends abnormally
  saveGame();

  // Notify and check if all dead
  if (GS.clan.length === 0) {
    setTimeout(() => endCombat('defeat'), 800);
  }
}

// Revive a doomed ally back to 1 HP (used by healing items in combat)
function reviveAlly(ally, healAmount) {
  if (!ally.doomed) return false;
  ally.doomed = false;
  ally.doomCountdown = 0;
  ally.hp = Math.min(ally.maxHp, Math.max(1, healAmount || 1));
  // Re-enter ATB with partial CT
  ally.ct = 20;
  addLog(ally.name + ' revived with ' + ally.hp + ' HP!', 'heal');
  toast(ally.name + ' revived!', 'success');
  return true;
}

function pickupDoomBag(ally, bag) {
  const idx = CS.doomBags.indexOf(bag);
  if (idx === -1) return;

  // Return items to inventory
  if (bag.items && bag.items.length) {
    bag.items.forEach(item => {
      const cat = getCategoryForItem(item);
      if (GS.inventory[cat]) GS.inventory[cat].push(item);
    });
  }
  // Return weapon to stash
  if (bag.weapon) {
    if (!GS.weaponStash) GS.weaponStash = [];
    GS.weaponStash.push(bag.weapon);
  }

  const count = (bag.items?.length || 0) + (bag.weapon ? 1 : 0);
  addLog(ally.name + ' recovers ' + bag.name + '! (' + count + ' item' + (count !== 1 ? 's' : '') + ' returned)', 'heal');
  toast('Recovered ' + bag.name + '!', 'success');
  CS.doomBags.splice(idx, 1);
  updateGoldDisplay();
  saveGame();
}

function getDoomBagAt(x, y) {
  return CS.doomBags.find(b => b.x === x && b.y === y) || null;
}

function isAllyDoomed(ally) {
  return !!(ally && ally.doomed && ally.doomCountdown > 0);
}

function isAllyAlive(ally) {
  return ally && ally.hp > 0 && !ally.doomed && !ally.perished;
}

function isAllyActive(ally) {
  // Can participate in ATB: alive and not doomed/perished
  return ally && ally.hp > 0 && !ally.doomed && !ally.perished;
}

function undoMove() {
  const ally = CS.allies.find(a => a.gridId === CS.activeUnit);
  if (!ally || !CS.savedMove || CS.unitActed) {
    toast('Cannot undo move — an action has already been taken.', 'error');
    return;
  }
  // Restore position and facing
  ally.x = CS.savedMove.x;
  ally.y = CS.savedMove.y;
  ally.facing = CS.savedMove.facing;
  CS.savedMove = null;
  CS.unitMoved = false;
  CS.highlightedTiles = [];
  CS.selectedAction = null;
  addLog(ally.name + ' cancels their move.', 'system');
  renderCombat();
}

function finishAllyTurn() {
  const ally = CS.allies.find(a => a.gridId === CS.activeUnit);
  if (!ally) return;

  // JP for move without attack
  if (CS.unitMoved && !CS.unitActed) giveJP(ally, JP_AWARDS.move, 'move');

  CS.savedMove = null;

  // CT reset: both done = 0, partial action = 25 (carry-over momentum)
  ally.ct = (CS.unitMoved && CS.unitActed) ? 0 : 25;

  // Tick doom countdowns for all doomed allies
  tickDoomCountdowns();
  // Tick buffs and status for this ally
  tickUnitStatus(ally);

  CS.selectedAlly = null;
  CS.selectedAction = null;
  CS.highlightedTiles = [];
  CS.activeUnit = null;
  CS.phase = 'enemy_acting'; // briefly neutral while advancing

  checkCombatEnd();
  if (CS.active) setTimeout(advanceCT, 200);
}

function tickUnitStatus(unit) {
  if (unit.buffs) {
    unit.buffs = unit.buffs.map(b => {
      // Don't tick permanent buffs
      if (b.permanent) return b;
      return { ...b, turns: b.turns - 1 };
    }).filter(b => b.permanent || b.turns > 0);
  }
  if (unit.status === 'poisoned') applyDamage(unit, 5, 'Poison');
  if (unit.bleeds && unit.bleedTurns > 0) {
    unit.hp = Math.max(0, unit.hp - unit.bleeds);
    unit.bleedTurns--;
    addLog('\u{1FA78} ' + unit.name + ' bleeds ' + unit.bleeds + ' HP. (' + unit.hp + '/' + unit.maxHp + ')', 'damage');
    if (unit.bleedTurns <= 0) unit.bleeds = 0;
  }
}

function finishEnemyTurn(enemy) {
  if (enemy) {
    enemy.ct = 0;
    tickUnitStatus(enemy);
  }
  // Tick doom countdowns every enemy action too
  tickDoomCountdowns();
  CS.activeUnit = null;
  checkCombatEnd();
  if (CS.active) setTimeout(advanceCT, 200);
}


function calcEnemyDamage(enemy) {
  if (enemy.weapon && enemy.weapon.dmg) {
    const w = enemy.weapon;
    if (w.type === 'ranged' && w.quiverEmpty) {
      return enemy.dmg[0] + Math.floor(Math.random() * (enemy.dmg[1] - enemy.dmg[0] + 1));
    }
    return Math.max(1, w.dmg[0] + Math.floor(Math.random() * (w.dmg[1] - w.dmg[0] + 1)));
  }
  return enemy.dmg[0] + Math.floor(Math.random() * (enemy.dmg[1] - enemy.dmg[0] + 1));
}

function consumeEnemyWeaponUse(enemy) {
  const w = enemy.weapon;
  if (!w) return;
  if (w.type === 'thrown') {
    w.ammo = Math.max(0, (w.ammo || 1) - 1);
    if (w.ammo <= 0) { addLog(enemy.name + '\'s ' + w.name + ' runs out!', 'system'); enemy.weapon = null; enemy.attackRange = 1; }
    return;
  }
  if (w.type === 'ranged') {
    w.ammo = Math.max(0, (w.ammo || 1) - 1);
    if (w.ammo <= 0) { w.quiverEmpty = true; enemy.attackRange = 1; addLog(enemy.name + '\'s ' + w.name + ' — quiver empty!', 'system'); }
    return;
  }
  w.usesLeft = Math.max(0, (w.usesLeft || 1) - 1);
  if (w.usesLeft <= 0) { addLog(enemy.name + '\'s ' + w.name + ' breaks!', 'system'); enemy.weapon = null; }
}

function runEnemyUnitTurn(enemy) {
  if (!enemy || enemy.hp <= 0) { finishEnemyTurn(enemy); return; }

  // Status checks
  if (enemy.status === 'stunned') {
    enemy.stunTurns = (enemy.stunTurns || 1) - 1;
    addLog(enemy.name + ' is stunned, skips turn.');
    if (enemy.stunTurns <= 0) enemy.status = null;
    renderCombat();
    setTimeout(() => finishEnemyTurn(enemy), 300);
    return;
  }
  if (enemy.status === 'confused') {
    addLog(enemy.name + ' is confused, skips turn.');
    enemy.status = null;
    renderCombat();
    setTimeout(() => finishEnemyTurn(enemy), 300);
    return;
  }
  if (enemy.status === 'blinded') {
    enemy.blindTurns = (enemy.blindTurns || 1) - 1;
    if (enemy.blindTurns <= 0) { enemy.status = null; addLog(enemy.name + ' recovers from blindness.', 'system'); }
    else addLog(enemy.name + ' is blinded \u2014 attacks at random!');
  }
  if (enemy.status === 'poisoned') {
    enemy.hp = Math.max(0, enemy.hp - 5);
    addLog(enemy.name + ' takes poison damage.', 'damage');
    if (enemy.hp <= 0) {
      addLog(enemy.name + ' dies from poison!', 'death');
      if (enemy.gold) { GS.gold += enemy.gold; updateGoldDisplay(); }
      renderCombat();
      setTimeout(() => finishEnemyTurn(enemy), 300);
      return;
    }
  }

  const aliveAllies = CS.allies.filter(a => a.hp > 0 && !a.escaped);
  if (!aliveAllies.length) { finishEnemyTurn(enemy); return; }

  // Target selection
  let nearest;
  if (enemy.status === 'blinded') {
    nearest = aliveAllies[Math.floor(Math.random() * aliveAllies.length)];
  } else {
    nearest = aliveAllies.reduce((best, a) => {
      const d = Math.abs(a.x - enemy.x) + Math.abs(a.y - enemy.y);
      const bd = Math.abs(best.x - enemy.x) + Math.abs(best.y - enemy.y);
      return d < bd ? a : best;
    });
  }

  const dist = Math.abs(nearest.x - enemy.x) + Math.abs(nearest.y - enemy.y);
  const _elos = hasLineOfSight(enemy.x, enemy.y, nearest.x, nearest.y);

  if (dist <= enemy.attackRange && _elos) {
    const adx = nearest.x - enemy.x, ady = nearest.y - enemy.y;
    if (Math.abs(adx) >= Math.abs(ady)) enemy.facing = adx > 0 ? 'east' : 'west';
    else enemy.facing = ady > 0 ? 'south' : 'north';
    const dmg = calcEnemyDamage(enemy);
    addLog((enemy.weapon ? enemy.weapon.icon + ' ' : '') + enemy.name + ' attacks ' + nearest.name + '!', 'damage');
        recordDetection(); // enemy spotted and struck ally
    applyDamageToAlly(nearest, dmg, enemy.name);
    consumeEnemyWeaponUse(enemy);
  } else {
    const dx = Math.sign(nearest.x - enemy.x);
    const dy = Math.sign(nearest.y - enemy.y);
    const steps = Math.min(enemy.moveRange, dist - 1);
    for (let s = 0; s < steps; s++) {
      const nx = enemy.x + dx, ny = enemy.y + dy;
      if (isPosEmpty(nx, ny, enemy.id)) {
        const ox = enemy.x, oy = enemy.y; enemy.x = nx; enemy.y = ny;
        if (Math.abs(enemy.x-ox) >= Math.abs(enemy.y-oy)) enemy.facing = enemy.x > ox ? 'east' : 'west';
        else enemy.facing = enemy.y > oy ? 'south' : 'north';
        break;
      } else if (isPosEmpty(enemy.x + dx, enemy.y, enemy.id)) {
        enemy.x += dx; enemy.facing = dx > 0 ? 'east' : 'west'; break;
      } else if (isPosEmpty(enemy.x, enemy.y + dy, enemy.id)) {
        enemy.y += dy; enemy.facing = dy > 0 ? 'south' : 'north'; break;
      }
    }
    if (Math.abs(nearest.x - enemy.x) + Math.abs(nearest.y - enemy.y) <= enemy.attackRange
        && hasLineOfSight(enemy.x, enemy.y, nearest.x, nearest.y)) {
      const dmg = calcEnemyDamage(enemy);
      addLog((enemy.weapon ? enemy.weapon.icon + ' ' : '') + enemy.name + ' attacks ' + nearest.name + '!', 'damage');
      applyDamageToAlly(nearest, dmg, enemy.name);
      consumeEnemyWeaponUse(enemy);
    }
  }

  renderCombat();
  setTimeout(() => finishEnemyTurn(enemy), 300);
}


// Returns damage multiplier based on attacker direction relative to defender's facing.
// facing direction: south=+y, north=-y, east=+x, west=-x
function getDirDamageMult(defender, attackerX, attackerY) {
  const f = defender.facing || 'south';
  // Vector from defender to attacker
  const dx = attackerX - defender.x;
  const dy = attackerY - defender.y;
  if (dx === 0 && dy === 0) return 1;

  // Direction defender is facing (where they LOOK / where their front is)
  const fvx = f === 'east' ? 1 : f === 'west' ? -1 : 0;
  const fvy = f === 'south' ? 1 : f === 'north' ? -1 : 0;

  // Normalise attacker direction
  const len = Math.sqrt(dx*dx + dy*dy);
  const anx = dx / len, any = dy / len;

  // Dot product: 1 = attacker directly in front, -1 = directly behind
  const dot = fvx * anx + fvy * any;

  // dot > 0.5  → front arc (attacker in front of defender) = 1× damage
  // dot < -0.5 → rear arc  = 1.5× damage
  // else       → side arc  = 1.25× damage
  if (dot > 0.5)  return 1.0;
  if (dot < -0.5) return 1.5;
  return 1.25;
}

function applyDamageToAlly(ally, rawDmg, attackerName) {
  // Reaction ability check (before armor)
  const attackerUnit = CS.enemies.find(e => e.name === attackerName || (e.name && attackerName && e.name.includes(attackerName)));
  let dmg = triggerReaction(ally, rawDmg, attackerUnit);
  if (dmg <= 0) { renderCombat(); return; } // evaded

  // Directional damage multiplier (front=1×, side=1.25×, rear=1.5×)
  if (attackerUnit) {
    const dirMult = getDirDamageMult(ally, attackerUnit.x, attackerUnit.y);
    if (dirMult !== 1) {
      const dirLabel = dirMult >= 1.5 ? '⬅ Backstab!' : '↙ Flank!';
      dmg = Math.round(dmg * dirMult);
      addLog(dirLabel + ' (' + (dirMult >= 1.5 ? '+50%' : '+25%') + ' dmg)', 'damage');
    }
  }

  // Iron Will support
  dmg = checkIronWill(ally, dmg);

  // Armor passive reduction
  const armorBuff = ally.buffs?.find(b => b.type === 'armor_passive');
  if (armorBuff && (armorBuff.effect === 'armor' || armorBuff.effect === 'shadow_armor')) {
    dmg = Math.max(1, Math.floor(dmg * (1 - armorBuff.value / 100)));
  }
  // Armor durability
  if (ally.armorItem && ally.armorItem.durability > 0) {
    ally.armorItem.durability--;
    if (ally.armorItem.durability <= 0) {
      // Remove armor passive buff
      ally.buffs = (ally.buffs || []).filter(b => b.type !== 'armor_passive');
      addLog(ally.name + "'s " + ally.armorItem.name + " is destroyed!", 'system');
      ally.armorItem = null;
    }
  }
  ally.hp = Math.max(0, ally.hp - dmg);
  addLog(attackerName + " → " + ally.name + ": " + dmg + " damage. (" + ally.hp + "/" + ally.maxHp + " HP)", 'damage');
  if (ally.hp <= 0 && !ally.doomed) {
    // Enter Doom Countdown instead of instant death
    ally.doomed = true;
    ally.doomCountdown = 3;
    ally.ct = 0; // remove from ATB queue while downed
    addLog(ally.name + ' is DOWN! Revive within 3 turns!', 'death');
    toast(ally.name + ' is dying — use a healing item to revive!', 'error');
    // Drop any held objective loot
    if (ally.hasLoot && CS.mission?.type === 'theft') {
      ally.hasLoot = false;
      CS.allyWithLoot = null;
      CS.exitsActive = false;
      CS.lootOnFloor = { x: ally.x, y: ally.y, ...(CS.mission.lootItem || { name: 'Loot', icon: '📦' }) };
      addLog('📦 Loot dropped — pick it up again!', 'system');
    }
  }
}

function checkCombatEnd() {
  if (!CS.active) return;
  const aliveEnemies = CS.enemies.filter(e => e.hp > 0);
  const aliveAllies = CS.allies.filter(a => isAllyAlive(a));
  const mission = CS.mission;
  const isMultiFloor = !!(mission.floors && mission.floors.length > 1);
  const floorData = isMultiFloor ? mission.floors[CS.currentFloor] : null;
  const isLastFloor = !isMultiFloor || CS.currentFloor >= CS.totalFloors - 1;

  if (aliveAllies.length === 0) { setTimeout(() => endCombat('defeat'), 800); return; }
  if (CS.turnLimit > 0 && CS.turn > CS.turnLimit) {
    addLog('Time is up! Mission failed.', 'system');
    setTimeout(() => endCombat('timedout'), 800); return;
  }

  // For multi-floor: check floor-specific win conditions
  // A floor is cleared when all enemies dead (+ target dead if applicable) + all allies at exit
  const floorTarget = floorData ? floorData.targetEnemy : mission.targetEnemy;
  const targetDead = !floorTarget || !CS.enemies.find(e => e.isTarget && e.hp > 0);

  // Assassination single-floor shortcut
  if (!isMultiFloor && mission?.type === 'assassination' && mission.targetEnemy) {
    if (targetDead && CS.exitsActive && !aliveAllies.filter(a => !a.escaped && !a.doomed).length) {
      setTimeout(() => endCombat('victory'), 800);
    }
    return;
  }
  // Theft single-floor
  if (!isMultiFloor && mission?.type === 'theft' && mission.carrierEnemy) {
    if (CS.objectivePhase === 'done') setTimeout(() => endCombat('victory'), 800);
    return;
  }
  // Rescue floor 2: all alive allies escaped with prisoner → victory
  if (isMultiFloor && isLastFloor && floorData?.isRescueFloor) {
    if (CS.prisonerFreed && CS.prisoner?.escaped && aliveAllies.filter(a => !a.escaped).length === 0) {
      setTimeout(() => endCombat('victory'), 800);
    }
    return;
  }

  // Generic: all enemies cleared (and target dead if required)
  if (aliveEnemies.length === 0 && targetDead) {
    if (isMultiFloor && !isLastFloor) {
      // Activate exits for floor transition
      if (!CS.exitsActive) {
        CS.exitsActive = true;
        CS.objectivePhase = 'extract';
        addLog('Floor ' + (CS.currentFloor + 1) + ' cleared! Reach the exit to advance.', 'system');
        toast('Floor cleared! Find the exit!', 'success');
        renderCombat();
      }
    } else {
      setTimeout(() => endCombat('victory'), 800);
    }
  }
}

function advanceFloor() {
  const mission = CS.mission;
  CS.currentFloor++;
  const _advFd = mission.floors[CS.currentFloor];
  addLog('=== FLOOR ' + (CS.currentFloor + 1) + ' — ' + (_advFd?.name || 'Next Floor') + ' ===', 'system');
  toast('Floor ' + (CS.currentFloor + 1) + '/' + CS.totalFloors + ': ' + (_advFd?.name || ''), 'success');

  // Reset per-floor state
  CS.turn = 0;
  CS.exitsActive = false;
  CS.objectivePhase = 'fight';
  CS.alliesEscaped = [];
  CS.lootOnFloor = null;
  CS.allyWithLoot = null;
  CS.doomBags = [];

  // Reset floor-specific turn limit
  const floorData = mission.floors[CS.currentFloor];
  CS.turnLimit = floorData?.turnLimit || 0;

  // Heal allies slightly between floors (25% of missing HP)
  CS.allies.filter(a => isAllyAlive(a)).forEach(a => {
    if (a.doomed) { a.doomed = false; a.doomCountdown = 0; a.hp = Math.max(1, Math.floor(a.maxHp * 0.1)); a.ct = 20; }
    const missing = a.maxHp - a.hp;
    a.hp = Math.min(a.maxHp, a.hp + Math.floor(missing * 0.25));
    a.ct = Math.floor(Math.random() * 30);
    a.escaped = false;
  });

  // Re-generate enemies from this floor's spec
  CS.enemies = [];
  let ec = 0;
  const fd = mission.floors[CS.currentFloor];
  (fd.enemies || []).forEach(group => {
    const type = ENEMY_TYPES[group.type];
    for (let i = 0; i < group.count; i++) {
      const pos = findEmptyPos(CS.gridW - 3, CS.gridW - 1, 1, CS.gridH - 2);
      const w = spawnEnemyWeapon(group.type, mission.difficulty || 1);
      const ar = w && (w.type === 'ranged' || w.type === 'thrown') ? Math.max(type.attackRange, w.range || 3) : type.attackRange;
      CS.enemies.push({
        id: 'enemy_' + ec++, name: type.name, emoji: type.emoji,
        hp: type.hp, maxHp: type.hp, dmg: [...type.dmg],
        moveRange: type.moveRange, attackRange: ar,
        x: pos.x, y: pos.y, gold: type.gold, exp: type.exp,
        ai: type.ai, isBoss: type.isBoss || false, isRecruitTarget: type.isAlly || false,
        status: null, type: group.type, weapon: w, facing: 'west',
        ct: Math.floor(Math.random() * 40), spd: type.spd || 5
      });
    }
  });

  if (fd.targetEnemy) {
    const t = CS.enemies.find(e => e.type === fd.targetEnemy);
    if (t) { t.isTarget = true; t.name = '★ ' + t.name; }
  }
  if (fd.carrierEnemy && fd.lootItem) {
    const c = CS.enemies.find(e => e.type === fd.carrierEnemy);
    if (c) { c.isCarrier = true; c.carriedLoot = fd.lootItem; c.name = '📦 ' + c.name; }
  }

  // Regenerate grid terrain for the new floor
  CS.grid = generateGrid(mission.floors[CS.currentFloor]?.terrain || mission.terrain || 'village');
  CS.exitTiles = [];
  // Inter-floor exits are on the RIGHT edge (enemies came from the left)
  const exitYs = [2, Math.floor(CS.gridH / 2), CS.gridH - 3].filter(y => y >= 0 && y < CS.gridH);
  const exitX = CS.gridW - 1;
  exitYs.forEach(y => {
    // Clear any wall that was generated there
    if (CS.grid[y]) CS.grid[y][exitX] = 'exit';
    CS.exitTiles.push({ x: exitX, y });
  });

  // Re-place allies back on the left side using current formation
  const partyIds = CS.allies.filter(a => !a.perished).map(a => a.id);
  const f = FORMATIONS[selectedFormation] || FORMATIONS.line;
  const pts = f.positions(partyIds.length, CS.gridH);
  CS.allies.filter(a => !a.perished).forEach((a, i) => {
    const pt = pts[i] || { x: 1 + i, y: Math.floor(CS.gridH / 2) };
    a.x = pt.x; a.y = pt.y; a.escaped = false;
  });

  // Spawn prisoner on rescue floor 2
  CS.prisoner = null;
  CS.prisonerFreed = false;
  const _rescFd = mission.floors[CS.currentFloor];
  if (_rescFd && _rescFd.isRescueFloor) {
    // Place prisoner in centre-right of map, behind the remaining guards
    const px = Math.floor(CS.gridW * 0.65);
    const py = Math.floor(CS.gridH / 2);
    CS.prisoner = { x: px, y: py, emoji: '⛓️', freed: false };
    addLog('⛓ The prisoner is chained ahead. Move the key-holder to them to free them!', 'system');
    toast('Find the prisoner and use the key!', 'success');
  }

  initMissionStats();
  renderCombat();
  setTimeout(advanceCT, 300);
}

function endCombat(result) {
  if (!CS.active) return;  // already ended — block duplicate calls from queued setTimeout
  CS.active = false;
  CS.phase = 'result';
  const mission = CS.mission;

  if (result === 'fled') {
    // Fled under smoke cover — no reward, ninja survive at 50% HP
    CS.allies.forEach(a => {
      const gn = GS.clan.find(x => x.id === a.id);
      if (gn) {
        gn.hp = Math.max(10, Math.floor(gn.maxHp * 0.5));
        gn.carriedItems = a.carriedItems || [];
        gn.weapon = a.weapon ? { ...a.weapon } : null;
      }
    });
    applyMissionReputation('fled', mission);
    saveGame();
    openModal('Escaped!',
      `<b style="color:var(--jade-bright)">Your ninja fled under cover of smoke.</b><br><br>No reward gained, but the clan lives to fight another day.`,
      [{ label: 'Return to Hub', fn: () => { closeModal(); showScreen('hub'); showHubSection('clan'); selectedMissionId = null; selectedParty = []; }, cls: 'confirm' }]
    );
    return;
  }

  if (result === 'victory') {
    applyMissionReputation('victory', mission);
    if (!mission.isDynamic) {
      GS.completedMissions.push(mission.id);
      // Check if this mission completes a story arc
      const completedArc = STORY_ARCS.find(a => a.capstone === mission.id);
      if (completedArc) {
        const nextArc = STORY_ARCS.find(a => a.arc === completedArc.arc + 1);
        // Store arc completion info — show AFTER hub navigation via Mission Complete button
        if (nextArc) {
          CS._pendingArcModal = {
            title: '⭐ Arc ' + completedArc.arc + ' Complete!',
            body: '<div style="font-family:Cinzel,serif;font-size:0.9rem;color:var(--gold);margin-bottom:0.8rem">' + completedArc.name + '</div>'
              + '<div class="text-xs text-mist" style="margin-bottom:1rem">All ten missions completed. Your shadow grows longer.</div>'
              + '<div style="font-family:Cinzel,serif;font-size:0.75rem;color:var(--jade-bright)">★ New Arc Unlocked: Arc ' + nextArc.arc + ' — ' + nextArc.name + '</div>'
          };
        } else {
          CS._pendingArcModal = {
            title: '🏆 All Arcs Complete!',
            body: '<div style="font-family:Cinzel,serif;font-size:0.9rem;color:var(--gold);margin-bottom:0.8rem">The Shadow Dynasty falls. Your legend is written into history.</div>'
              + '<div class="text-xs text-mist">All 50 story missions completed. The realm is yours.</div>'
          };
        }
      }
    } else {
      // Mark the active contract as completed (dim it, prevent relaunch)
      const dynM = GS.activeMissions.find(x => x.id === mission.id);
      if (dynM) dynM.completed = true;
    }
    GS.gold += mission.reward;

    let recruitMsg = '';
    if (mission.recruitReward) {
      const rec = mission.recruitReward;
      // Guard: don't add if already in clan (prevents double-add from race conditions)
      const alreadyInClan = GS.clan.some(n => n.name === rec.name && n.class === rec.class);
      if (!alreadyInClan) {
      const cls = CLASSES[rec.class];
      const special = cls.specialMoves[Math.floor(Math.random() * cls.specialMoves.length)];
      const newNinja = {
        id: 'ninja_' + Date.now(),
        name: rec.name,
        class: rec.class,
        level: Math.max(1, Math.floor(Math.max(...GS.clan.map(n => n.level)) * 0.8)),
        exp: 0, expToNext: 100,
        hp: cls.baseStats.hp, maxHp: cls.baseStats.hp,
        stamina: cls.baseStats.stamina, maxStamina: cls.baseStats.stamina,
        chi: cls.baseStats.chi, maxChi: cls.baseStats.chi,
        proficiency: { ...cls.proficiency },
        specialMove: special, weapon: null, carriedItems: [],
        training: null, isPlayer: false,
        jobs: {}, unlockedAbilities: [],
        equippedAbilities: { reaction: null, support: null, movement: null }
      };
      GS.clan.push(newNinja);
      recruitMsg = `<br><br><b style="color:var(--jade-bright)">${cls.emoji} ${rec.name} (${cls.name}) joins your clan!</b>`;
      } // end alreadyInClan guard
    }

    // Return uncollected doom bag items to inventory
    CS.doomBags.forEach(bag => {
      (bag.items || []).forEach(item => {
        const cat = getCategoryForItem(item);
        if (GS.inventory[cat]) GS.inventory[cat].push(item);
      });
      if (bag.weapon && GS.weaponStash) GS.weaponStash.push(bag.weapon);
    });
    CS.doomBags = [];

    // Final purge: remove any perished allies that weren't caught by triggerPermadeath
    const periIdSet = new Set(CS.allies.filter(a => a.perished).map(a => a.id));
    if (periIdSet.size) GS.clan = GS.clan.filter(n => !periIdSet.has(n.id));

    // Sync surviving ally HP changes back to clan
    CS.allies.filter(a => !a.perished).forEach(a => {
      const gn = GS.clan.find(x => x.id === a.id);
      if (gn) {
        gn.hp = a.doomed ? Math.max(1, Math.floor(gn.maxHp * 0.1)) : Math.max(10, a.hp);
        gn.chi = a.chi;
        gn.level = a.level;
        gn.exp = a.exp;
        gn.expToNext = a.expToNext;
        gn.maxHp = a.maxHp;
        gn.maxChi = a.maxChi;
        gn.carriedItems = a.doomed ? [] : (a.carriedItems || []);
        gn.weapon = (!a.doomed && a.weapon) ? { ...a.weapon } : null;
        if (a.jobs) gn.jobs = { ...a.jobs };
        if (a.unlockedAbilities) gn.unlockedAbilities = [...a.unlockedAbilities];
        if (a.equippedAbilities) gn.equippedAbilities = { ...a.equippedAbilities };
      }
    });

    saveGame();
    updateGoldDisplay();

    const st2 = getStealthTier(), ht2 = getHonorTier();
    const repLine = `<br><span style="font-size:0.65rem;color:var(--mist)">${st2.icon} ${st2.name} · ${ht2.icon} ${ht2.name}</span>`;
    openModal('Mission Complete!',
      `<b style="color:var(--jade-bright)">Victory!</b><br><br>
      Mission: ${mission.name}<br>
      Gold earned: <b style="color:var(--gold)">+${mission.reward} G</b>${recruitMsg}${repLine}`,
      [{ label: 'Return to Hub', fn: () => {
        closeModal(); showScreen('hub'); showHubSection('clan'); selectedMissionId = null; selectedParty = [];
        // Show pending arc completion modal after navigation
        if (CS._pendingArcModal) {
          const _am = CS._pendingArcModal; CS._pendingArcModal = null;
          setTimeout(() => openModal(_am.title, _am.body, [{ label: 'Onwards!', fn: closeModal, cls: 'confirm' }]), 300);
        }
      }, cls: 'confirm' }]
    );
  } else {
    // Return uncollected doom bags
    CS.doomBags.forEach(bag => {
      (bag.items || []).forEach(item => {
        const cat = getCategoryForItem(item);
        if (GS.inventory[cat]) GS.inventory[cat].push(item);
      });
      if (bag.weapon && GS.weaponStash) GS.weaponStash.push(bag.weapon);
    });
    CS.doomBags = [];

    // Final purge of perished allies from roster
    // Remove perished allies from roster permanently (belt-and-suspenders after triggerPermadeath)
    const defPeriSet = new Set(CS.allies.filter(a => a.perished).map(a => a.id));
    if (defPeriSet.size) {
      GS.clan = GS.clan.filter(n => !defPeriSet.has(n.id));
      defPeriSet.forEach(id => addLog('Removed perished ninja from roster.', 'system'));
    }

    // Sync HP for surviving (non-perished) allies
    CS.allies.filter(a => !a.perished).forEach(a => {
      const gn = GS.clan.find(x => x.id === a.id);
      if (gn) {
        gn.hp = Math.max(5, Math.floor(gn.maxHp * 0.1));
        gn.carriedItems = a.doomed ? [] : (a.carriedItems || []);
        gn.weapon = (!a.doomed && a.weapon) ? { ...a.weapon } : null;
        if (a.jobs) gn.jobs = { ...a.jobs };
        if (a.unlockedAbilities) gn.unlockedAbilities = [...a.unlockedAbilities];
        if (a.equippedAbilities) gn.equippedAbilities = { ...a.equippedAbilities };
      }
    });
    applyMissionReputation(result, mission);
    saveGame();  // save AFTER purge so roster is correct on disk
    const defeatMsg = result === 'timedout'
      ? `<b style="color:var(--crimson-bright)">Time's Up!</b><br><br>You failed to complete the mission in time.<br>Return to the hub and try again.`
      : `<b style="color:var(--crimson-bright)">Defeat.</b><br><br>All your ninja have fallen.<br>Return to the hub to heal and regroup.`;
    openModal(result === 'timedout' ? 'Time Expired' : 'Mission Failed',
      defeatMsg,
      [{ label: 'Retreat to Hub', fn: () => { closeModal(); showScreen('hub'); showHubSection('clan'); selectedMissionId = null; selectedParty = []; }, cls: 'danger' }]
    );
  }
}

function useItem(ally) {
  if (!ally.carriedItems || !ally.carriedItems.length) {
    // Check if we can use an item to revive a doomed teammate instead
    const doomed = CS.allies.find(a => a.doomed);
    if (doomed) {
      toast('No items on ' + ally.name + '. A teammate is dying — pick up healing items!', 'error');
    } else {
      toast(`${ally.name} carries no items.`, 'error');
    }
    CS.selectedAction = null;
    return;
  }
  // Build a picker modal
  const items = ally.carriedItems;
  openModal(`\u{1F392} ${ally.name}'s Field Kit`,
    `<div style="font-size:0.75rem;color:var(--mist);margin-bottom:0.8rem">Select an item to use (${items.length}/${MAX_CARRY} slots used)</div>
    <div class="use-item-list">
      ${items.map((item, i) => `
        <div class="use-item-btn" onclick="executeCombatItem('${ally.gridId}', ${i})">
          <span style="font-size:1.3rem">${item.icon}</span>
          <div>
            <div class="stash-item-name">${item.name}</div>
            <div class="stash-item-desc">${item.desc}</div>
          </div>
        </div>`).join('')}
    </div>`,
    [{ label: 'Cancel', fn: () => { CS.selectedAction = null; document.getElementById('actionLabel').textContent = ''; closeModal(); renderCombat(); }, cls: '' }]
  );
}

function executeCombatItem(gridId, itemIndex) {
  const ally = CS.allies.find(a => a.gridId === gridId);
  if (!ally || !ally.carriedItems) return;
  const item = ally.carriedItems[itemIndex];
  if (!item) return;

  closeModal();
  CS.selectedAction = null;
  document.getElementById('actionLabel').textContent = '';

  if (item.effect === 'heal' || item.effect === 'full_heal') {
    // If ally is doomed, healing revives them
    if (ally.doomed) {
      reviveAlly(ally, item.value || 25);
    } else {
      const healed = Math.min(ally.maxHp - ally.hp, item.value || 0);
      ally.hp = Math.min(ally.maxHp, ally.hp + (item.value || 0));
      addLog(`${ally.name} uses ${item.name}. +${healed} HP -> ${ally.hp}/${ally.maxHp}`, 'heal');
    }
  } else if (item.effect === 'aoe_heal') {
    CS.allies.forEach(a => {
      if (a.hp > 0) {
        a.hp = Math.min(a.maxHp, a.hp + (item.value || 0));
        addLog(`${a.name} healed ${item.value} HP.`, 'heal');
      }
    });
  } else if (item.effect === 'dodge' || item.effect === 'stealth' || item.effect === 'armor' || item.effect === 'shadow_armor') {
    ally.buffs = ally.buffs || [];
    ally.buffs.push({ type: item.effect, value: item.value, turns: 3 });
    addLog(`${ally.name} activates ${item.name}. Effect for 3 turns.`, 'special');
  }

  // ── SMOKE BOMB ──
  if (item.effect === 'smoke_bomb') {
    const radius = item.radius || 2;
    const blindTurns = item.blindTurns || 2;
    let blinded = 0;
    CS.enemies.filter(e => e.hp > 0).forEach(e => {
      const dist = Math.abs(e.x - ally.x) + Math.abs(e.y - ally.y);
      if (dist <= radius) {
        e.status = 'blinded';
        e.blindTurns = blindTurns;
        blinded++;
        if (item.secondEffect === 'poison') e.status = 'poisoned';
      }
    });
    addLog(`\u{1F4A8} ${ally.name} throws ${item.name}! ${blinded} enemy${blinded !== 1 ? 'ies' : ''} blinded for ${blindTurns} turns.`, 'special');
    // Ally may flee — offer retreat option
    openModal('Smoke Cloud!',
      `<div style="color:var(--jade-bright)">Smoke deployed — ${blinded} enemies blinded!</div><br>
       <div class="text-xs text-mist">Your ninja can use the cover to retreat from battle.</div>`,
      [
        { label: 'Flee under cover', fn: () => { closeModal(); endCombat('fled'); }, cls: 'confirm' },
        { label: 'Stay and fight', fn: closeModal, cls: '' }
      ]
    );
    ally.carriedItems.splice(itemIndex, 1);
    const gnS = GS.clan.find(x => x.id === ally.id);
    if (gnS && gnS.carriedItems) {
      const giS = gnS.carriedItems.findIndex(x => x.id === item.id);
      if (giS !== -1) gnS.carriedItems.splice(giS, 1);
    }
    CS.unitActed = true;
    CS.savedMove = null;  // action taken
    renderCombat();
    return;
  }

  // Consume the item from carried items AND from the clan ninja's carry too
  ally.carriedItems.splice(itemIndex, 1);
  const gn = GS.clan.find(x => x.id === ally.id);
  if (gn && gn.carriedItems) {
    const gi = gn.carriedItems.findIndex(x => x.id === item.id);
    if (gi !== -1) gn.carriedItems.splice(gi, 1);
  }

  CS.unitActed = true;
  renderCombat();
}

  openModal('Retreat?', 'Abandon this mission? Your ninja will survive but gain no reward.',
    [

function selectTrainingType(id) { selectedTrainingType = id; renderTraining(); }
function selectTrainingNinja(id) { selectedTrainingNinja = id; renderTraining(); }

function assignTraining() {
  if (!selectedTrainingType || !selectedTrainingNinja) { toast('Select a type and a ninja.', 'error'); return; }
  const ninja = GS.clan.find(n => n.id === selectedTrainingNinja);
  const tType = TRAINING_TYPES.find(t => t.id === selectedTrainingType);
  if (!ninja || !tType) return;
  if (ninja.training) { toast(`${ninja.name} is already training.`, 'error'); return; }

  const hours = tType.minHours + Math.floor(Math.random() * (tType.maxHours - tType.minHours + 1));
  const points = Math.max(1, Math.floor(hours / tType.pointsPerHour));
  ninja.training = {
    type: tType.name, stat: tType.stat, points,
    hours, endTime: Date.now() + hours * 3600000
  };
  saveGame();
  toast(`${ninja.name} begins ${tType.name} (${hours}h, +${points} ${tType.stat})`, 'success');
  selectedTrainingNinja = null;
  renderTraining();
}

  // Random selection of 8-12 weapons

function openCodex() {
  const overlay = document.getElementById('codexOverlay');
  if (!overlay) return;

  // Render content first so it's ready when overlay appears
  renderCodexContent();

  overlay.style.display = 'block';
  overlay.scrollTop = 0;
  document.body.style.overflow = 'hidden';

  // Remove any stale handlers before adding fresh ones
  if (overlay._closeHandler) overlay.removeEventListener('pointerdown', overlay._closeHandler);
  if (overlay._keyHandler) document.removeEventListener('keydown', overlay._keyHandler);

  overlay._closeHandler = function(e) {
    if (e.target === overlay) closeCodex();
  };
  overlay.addEventListener('pointerdown', overlay._closeHandler);

  overlay._keyHandler = function(e) {
    if (e.key === 'Escape') closeCodex();
  };
  document.addEventListener('keydown', overlay._keyHandler);
}

function closeCodex() {
  const overlay = document.getElementById('codexOverlay');
  if (!overlay) return;
  overlay.style.display = 'none';
  document.body.style.overflow = '';
  if (overlay._closeHandler) overlay.removeEventListener('pointerdown', overlay._closeHandler);
  if (overlay._keyHandler) document.removeEventListener('keydown', overlay._keyHandler);
}

function renderCodex() {
  // Codex is now a full-screen modal — open it
  openCodex();
}

    <div class="text-xs" style="margin-bottom:0.4rem"><b style="color:var(--mist)">Weapons:</b> ${cls.primaryWeapons.join(', ')}</div>
    <div class="text-xs text-jade" style="margin-bottom:0.2rem">${cls.strengths.join(' · ')}</div>
    <div class="text-xs text-crimson" style="margin-bottom:0.6rem">${cls.weaknesses.join(' · ')}</div>
    <div style="height:1px;background:linear-gradient(90deg,${cls.color}44,transparent);margin-bottom:0.6rem"></div>
    <div class="font-cinzel text-xs text-gold" style="margin-bottom:0.4rem">Special Moves</div>
    ${cls.specialMoves.map(s => `<div class="text-xs" style="margin-bottom:0.3rem;padding:0.3rem 0.5rem;background:rgba(0,0,0,0.2)">
      <span style="color:var(--white)">${s.name}</span> <span style="color:#88aaff;font-size:0.6rem">(${s.chi} ☯)</span><br>
      <span class="text-mist">${s.desc}</span>
    </div>`).join('')}
    <div style="height:1px;background:linear-gradient(90deg,${cls.color}44,transparent);margin:0.6rem 0"></div>
    <div class="font-cinzel text-xs text-gold" style="margin-bottom:0.4rem">Unlockable Abilities (Job System)</div>
    ${(() => {
      const slotColors = { reaction: '#ff8844', support: '#44aaff', movement: '#44dd88' };
      const classAbilities = Object.values(JOB_ABILITIES).filter(ab => !ab.classReq || ab.classReq.includes(key));
      const bySlot = { reaction: [], support: [], movement: [] };
      classAbilities.forEach(ab => { if (bySlot[ab.slot]) bySlot[ab.slot].push(ab); });
      return Object.entries(bySlot).map(([slot, abs]) => abs.length === 0 ? '' :
        '<div style="margin-bottom:0.5rem">' +
        '<div style="font-size:0.6rem;color:' + slotColors[slot] + ';font-family:Cinzel,serif;margin-bottom:0.25rem;text-transform:uppercase">' +
        (slot === 'reaction' ? '⚡ Reaction' : slot === 'support' ? '🛡 Support' : '👟 Movement') + '</div>' +
        abs.map(ab => '<div style="font-size:0.6rem;padding:0.25rem 0.4rem;background:rgba(0,0,0,0.2);margin-bottom:0.2rem">' +
          '<span style="color:var(--white)">' + ab.name + '</span> <span style="color:' + slotColors[slot] + ';font-size:0.55rem">SP ' + ab.jpCost + '</span><br>' +
          '<span style="color:var(--mist)">' + ab.desc + '</span></div>'
        ).join('') +
        '</div>'
      ).join('');
    })()}
  `, cls.color + '33'));

  // ── WEAPONS ──
  const weaponRows = Object.entries(WEAPONS).map(([typeKey, cat]) => {
    const rows = cat.items.map(w => {
      const extra = typeKey === 'thrown'
        ? `<span style="color:var(--mist);font-size:0.6rem"> · ${THROWN_COUNTS[w.tier]} shots</span>`
        : typeKey === 'ranged'
        ? `<span style="color:var(--mist);font-size:0.6rem"> · ${QUIVER_SIZES[w.tier]} arrows · Rng ${w.range}</span>`
        : `<span style="color:var(--mist);font-size:0.6rem"> · ${WEAPON_USES[w.tier]} uses</span>`;
      return `<div style="display:flex;align-items:center;gap:0.6rem;padding:0.35rem 0.5rem;border-bottom:1px solid rgba(255,255,255,0.04)">
        <span style="font-size:1.1rem">${w.icon}</span>
        <div style="flex:1">
          <div class="text-xs" style="color:${tierColor(w.tier)}">${w.name} ${tierPill(w.tier)}</div>
          <div style="font-size:0.6rem;color:var(--mist)">DMG ${w.dmg[0]}-${w.dmg[1]}${extra} · G${w.price}</div>
        </div>
      </div>`;
    }).join('');
    return card(`
      <div style="font-family:'Cinzel',serif;font-size:0.85rem;color:var(--gold);margin-bottom:0.6rem">${cat.icon} ${cat.label}</div>
      ${rows}
    `);
  });

  // ── ITEMS ──
  const allItemRows = [
    { label: '🧪 Healing', items: ITEMS.healing },
    { label: '🛡 Armor', items: ITEMS.costume },
    { label: '💨 Tactical', items: ITEMS.tactical },
  ].map(group => card(`
    <div style="font-family:'Cinzel',serif;font-size:0.8rem;color:var(--gold);margin-bottom:0.6rem">${group.label}</div>
    ${group.items.map(item => `<div style="display:flex;align-items:flex-start;gap:0.6rem;padding:0.35rem 0;border-bottom:1px solid rgba(255,255,255,0.04)">
      <span style="font-size:1.1rem">${item.icon}</span>
      <div style="flex:1">
        <div class="text-xs" style="color:var(--white)">${item.name}${item.isArmor ? ' ' + tierPill(item.tier) : ''}</div>
        <div style="font-size:0.6rem;color:var(--mist)">${item.desc}${item.isArmor ? ' · 🛡 ' + (ARMOR_DURABILITY[item.tier]||5) + ' durability' : ''} · ⚜${item.price}</div>
      </div>
    </div>`).join('')}
  `));

  // ── ENEMIES ──
  const enemyCards = Object.entries(ENEMY_TYPES).map(([key, e]) => {
    const prefs = ENEMY_WEAPON_PREFS[key] || ['blades'];
    return card(`
      <div style="display:flex;align-items:center;gap:0.6rem;margin-bottom:0.4rem">
        ${buildEnemySpriteImgLg(key, e.emoji, 40)}
        <div>
          <div style="font-family:'Cinzel',serif;font-size:0.8rem;color:var(--white)">${e.name}</div>
          <div style="font-size:0.6rem;color:var(--mist)">${e.ai.toUpperCase()} · ${e.isBoss ? '\u{1F451} BOSS' : e.isAlly ? '⚠ TARGET' : 'ENEMY'}</div>
        </div>
      </div>
      <div style="display:flex;gap:0.8rem;flex-wrap:wrap;margin-bottom:0.3rem">
        <span class="text-xs"><span style="color:var(--crimson-bright)">❤</span> ${e.hp}</span>
        <span class="text-xs">⚔ ${e.dmg[0]}-${e.dmg[1]}</span>
        <span class="text-xs">↔ ${e.moveRange} · \u{1F3AF} ${e.attackRange}</span>
        <span class="text-xs" style="color:var(--gold)">G ${e.gold} · ✦ ${e.exp} exp</span>
      </div>
      <div style="font-size:0.6rem;color:var(--mist)">Weapons: ${prefs.join(', ')}</div>
    `);
  });

  // ── TRAINING ──
  const trainingRows = TRAINING_TYPES.map(t => `
    <div style="display:flex;gap:0.8rem;align-items:flex-start;padding:0.6rem;background:var(--ink2);border:1px solid rgba(255,255,255,0.05)">
      <span style="font-size:1.4rem">${t.icon}</span>
      <div>
        <div style="font-family:'Cinzel',serif;font-size:0.8rem;color:var(--gold)">${t.name}</div>
        <div class="text-xs text-mist">${t.desc}</div>
        <div style="font-size:0.6rem;color:var(--steel);margin-top:0.2rem">⏱ ${t.minHours}-${t.maxHours} hours · +${t.pointsPerHour} pt/hr · Stat: <span style="color:var(--jade-bright)">${t.stat}</span></div>
      </div>
    </div>`).join('');

  // ── WEAPON SYSTEM ──
  const tierTable = `
    <div style="overflow-x:auto">
    <table style="width:100%;border-collapse:collapse;font-size:0.7rem">
      <thead>
        <tr style="border-bottom:1px solid rgba(201,162,39,0.2)">
          <th style="font-family:'Cinzel',serif;color:var(--gold);padding:0.4rem 0.6rem;text-align:left">Tier</th>
          <th style="font-family:'Cinzel',serif;color:var(--gold);padding:0.4rem 0.6rem;text-align:center">Uses</th>
          <th style="font-family:'Cinzel',serif;color:var(--gold);padding:0.4rem 0.6rem;text-align:center">Quiver</th>
          <th style="font-family:'Cinzel',serif;color:var(--gold);padding:0.4rem 0.6rem;text-align:center">Thrown</th>
          <th style="font-family:'Cinzel',serif;color:var(--gold);padding:0.4rem 0.6rem;text-align:center">Armor Dur.</th>
          <th style="font-family:'Cinzel',serif;color:var(--gold);padding:0.4rem 0.6rem;text-align:center">Enemy Diff.</th>
        </tr>
      </thead>
      <tbody>
        ${TIERS.map((t, i) => `<tr style="border-bottom:1px solid rgba(255,255,255,0.04)">
          <td style="padding:0.35rem 0.6rem;color:${tierColor(t)};font-family:'Cinzel',serif">${t.toUpperCase()}</td>
          <td style="padding:0.35rem 0.6rem;text-align:center;color:var(--mist)">${WEAPON_USES[t].toLocaleString()}</td>
          <td style="padding:0.35rem 0.6rem;text-align:center;color:var(--mist)">${QUIVER_SIZES[t]} arrows</td>
          <td style="padding:0.35rem 0.6rem;text-align:center;color:var(--mist)">${THROWN_COUNTS[t]} shots</td>
          <td style="padding:0.35rem 0.6rem;text-align:center;color:var(--mist)">${ARMOR_DURABILITY[t]}</td>
          <td style="padding:0.35rem 0.6rem;text-align:center;color:var(--mist)">Diff ${i+1}</td>
        </tr>`).join('')}
      </tbody>
    </table>
    </div>`;

  // ── MISSIONS ──
  const missionRows = MISSIONS.map(m => {
    const typeMap = { assassination: '💀', theft: '📜', recruit: '⛓️', agitation: '🔥', espionage: '👁️' };
    const pips = Array.from({length:5},(_,i) => `<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${i<m.difficulty?'var(--gold)':'rgba(255,255,255,0.1)'}"></span>`).join('');
    return `<div style="display:flex;gap:0.8rem;align-items:flex-start;padding:0.6rem;background:var(--ink2);border:1px solid rgba(255,255,255,0.05);margin-bottom:0.4rem">
      <span style="font-size:1.4rem;flex-shrink:0">${typeMap[m.type]||'❓'}</span>
      <div style="flex:1">
        <div style="font-family:'Cinzel',serif;font-size:0.8rem;color:var(--white)">${m.name} <span style="font-size:0.65rem;color:var(--mist)">${m.type.toUpperCase()}</span></div>
        <div class="text-xs text-mist">${m.desc}</div>
        <div style="display:flex;align-items:center;gap:0.8rem;margin-top:0.3rem;flex-wrap:wrap">
          <span style="display:inline-flex;gap:2px">${pips}</span>
          <span style="font-size:0.65rem;color:var(--gold)">G ${m.reward}</span>
          <span style="font-size:0.65rem;color:var(--mist)">Req Lv${m.requiredLevel}</span>
          ${m.recruitReward ? `<span style="font-size:0.65rem;color:var(--jade-bright)">+${m.recruitReward.name} (${m.recruitReward.class})</span>` : ''}
        </div>
      </div>
    </div>`;
  }).join('');

  // ── MECHANICS ──
  const mechanicsContent = `
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:0.8rem">
      ${[
        { title: '⚔ Combat Flow', body: 'Each turn: Move → Act (attack/special/item). Both actions can happen in any order. Enemies act after all allies pass. Chi regenerates +1 per enemy turn.' },
        { title: '\u{1F3AF} Weapon Range', body: 'Melee weapons (blades/melee) have range 1. Blades cause Bleed on hit, scaling with tier. Melee weapons can Stun or break armor. Ranged weapons use listed range. Thrown weapons deplete on use.' },
        { title: '\u{1F6E1} Armor', body: 'One armor item per kit. Applied passively for the whole mission. Loses 1 durability per hit. When durability reaches 0 armor is destroyed and its protection is lost.' },
        { title: '\u{1F4CA} Proficiency', body: 'Each class has affinities for weapon types (1-7 scale). Matching weapon type adds ±5% damage per point above/below 3. Proficiency improves via training.' },
        { title: '✦ Special Moves', body: 'Every ninja has a unique special assigned at creation. Specials cost Chi. Some specials (thrown-type) consume weapon ammo. Chi regenerates each enemy turn.' },
        { title: '\u{1F4A8} Smoke Bombs', body: 'Smoke bombs blind all enemies in a radius for several turns. Blinded enemies attack random targets. A smoke bomb also opens the option to flee — ninja escape at 50% HP with equipment intact.' },
        { title: '\u{1F480} Defeat', body: 'Fallen ninja survive at 10% HP — they are not lost forever. Equipment state (weapon ammo/durability, armor) is preserved after combat ends.' },
      ].map(m => card(`<div style="font-family:'Cinzel',serif;font-size:0.8rem;color:var(--gold);margin-bottom:0.4rem">${m.title}</div><div class="text-xs text-mist" style="line-height:1.7">${m.body}</div>`)).join('')}
    </div>`;

  el.innerHTML = `
    ${section('Ninja Classes', grid(290, classCards))}
    ${section('Weapons by Category', grid(220, weaponRows))}
    ${section('Items & Consumables', grid(220, allItemRows))}
    ${section('Training', `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:0.6rem">${trainingRows}</div>`)}
    ${section('Tier Reference', tierTable)}
    ${section('Story Missions', missionRows)}
    ${section('Enemy Roster', grid(220, enemyCards))}
    ${section('Combat Mechanics', mechanicsContent)}
  `;
}

// ==========================================
// ===== MODAL =====
// ==========================================

let _modalCallbacks = [];
function openModal(title, body, actions = []) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = body;
  _modalCallbacks = actions.map(a => a.fn);
  document.getElementById('modalActions').innerHTML = actions.map((a, i) =>
    `<button class="modal-btn ${a.cls || ''}" onclick="_modalCallbacks[${i}]()">${a.label}</button>`
  ).join('');
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ==========================================
// ===== TOAST NOTIFICATIONS =====
// ==========================================

function toast(msg, type = '') {
  const container = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  container.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity 0.3s'; setTimeout(() => t.remove(), 300); }, 3000);
}

// ==========================================
// ===== INIT =====
// ==========================================

// Select first class by default
window.addEventListener('DOMContentLoaded', () => {
  // Preload all game images immediately at page open
  preloadAllImages();

  // Restore training states
  GS.clan.forEach(n => {
    if (n.training && Date.now() > n.training.endTime) finishTraining(n);
  });

  // Generate initial mission pool if needed
  if (!GS.activeMissions || !GS.activeMissions.length) {
    GS.activeMissions = generateMissionPool();
    GS.missionNextRefresh = Date.now() + MISSION_REFRESH_INTERVAL;
  }
  if (!GS.recruitRoster || !GS.recruitRoster.length) {
    generateRecruitRoster();
  }

  showScreen('menu');
  setTimeout(() => document.getElementById('cls-shinobi')?.classList.add('selected'), 100);
});

// Auto-save periodically
let _gameActive = false;  // set true after load or new game — prevents pre-load autosave
setInterval(() => { if (_gameActive && GS.clan.length > 0) saveGame(); }, 60000);

// Live recruit roster auto-refresh
setInterval(() => {
  if (GS.recruitNextRefresh && Date.now() > GS.recruitNextRefresh && GS.recruitRoster) {
    generateRecruitRoster();
    const recruitSection = document.getElementById('section-recruit');
    if (recruitSection && recruitSection.classList.contains('active')) renderRecruitShop();
  }
}, 60000);

// Live mission countdown timer
setInterval(() => {
  const t = getMissionTimeLeft();
  // Update timer displays if on missions screen
  ['missionTimer','missionTimer2'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.textContent = t;
  });
  // Auto-refresh when time hits zero
  if (GS.missionNextRefresh && Date.now() >= GS.missionNextRefresh) {
    GS.activeMissions = generateMissionPool();
    GS.missionNextRefresh = Date.now() + MISSION_REFRESH_INTERVAL;
    saveGame();
    // Re-render if on missions screen
    const missSection = document.getElementById('section-missions');
    if (missSection && missSection.classList.contains('active')) {
      selectedMissionId = null;
      renderMissions();
      toast('New contracts available!', 'success');
    }
  }
}, 1000);

// Resize combat canvas on window resize
window.addEventListener('resize', () => {
  if (CS.active && document.getElementById('screen-combat')?.classList.contains('active')) {
    resizeCombatCanvas();
    drawCanvas();
  }
});

// Close mobile drawers on back navigation
window.addEventListener('popstate', () => closeMobileDrawers());

// Filter weapon shop by type
function filterWeaponShop(type) {
  var items = GS.shopStock.weapons.filter(function(w) { return w.type === type; });
  var grid = document.getElementById('weaponGrid');
  if (!grid) return;
  if (!items.length) { toast('No ' + type + ' weapons in stock. Refresh for new stock.', 'error'); return; }
  var html = '';
  items.forEach(function(w) {
    var rangeStr = w.range ? ' &middot; Range: ' + w.range : '';
    html += '<div class="shop-item tier-' + w.tier + '" onclick="addToWeaponCart(\''+w.id+'\')">';
    html += '<div class="item-tier-bar"></div>';
    html += '<div class="item-emoji">' + w.icon + '</div>';
    html += '<div class="item-name">' + w.name + '</div>';
    html += '<div class="item-stats">DMG: ' + w.dmg[0] + '-' + w.dmg[1] + rangeStr + '<br>' + w.tier.toUpperCase() + '</div>';
    html += '<div class="item-price"><span>' + w.desc + '</span><span>G ' + w.price + '</span></div>';
    html += '</div>';
  });
  grid.innerHTML = html;
}
</script>
</body>
