  );
  // Pre-select shinobi
  window._recruitSelectedClass = 'shinobi';
  setTimeout(() => {
    document.getElementById('rcls-shinobi')?.classList.add('selected');
  }, 50);
}

function selectRecruitClass(key) {
  window._recruitSelectedClass = key;
  document.querySelectorAll('[id^="rcls-"]').forEach(el => el.classList.remove('selected'));
  document.getElementById('rcls-' + key)?.classList.add('selected');
}

function renderRecruitShop() {
  const el = document.getElementById('section-recruit');
  if (!el) return;

  // Generate roster if empty or expired
  if (!GS.recruitRoster || !GS.recruitRoster.length) {
    generateRecruitRoster();
  }

  const now = Date.now();
  const timeLeft = Math.max(0, GS.recruitNextRefresh - now);
  const mins = Math.floor(timeLeft / 60000);
  const secs = Math.floor((timeLeft % 60000) / 1000);
  const timerStr = mins > 0 ? mins + 'm ' + secs + 's' : secs + 's';

  const clanSize = GS.clan.length;
  const maxClan = 12;

  const rosterCards = GS.recruitRoster.map(n => {
    const cls = CLASSES[n.class];
    const canAfford = GS.gold >= n.hireCost;
    const clanFull = clanSize >= maxClan;
    const alreadyHired = GS.clan.some(c => c.name === n.name);
    const blocked = clanFull || alreadyHired;
    const tierC = n.level >= 5 ? 'var(--tier-legendary)' : n.level >= 3 ? 'var(--tier-uncommon)' : 'var(--tier-common)';

    return '<div style="background:var(--ink2);border:1px solid rgba(255,255,255,0.07);padding:1rem;display:flex;flex-direction:column;gap:0.5rem">'
      + '<div style="display:flex;align-items:center;gap:0.7rem">'
      + '<div style="font-size:1.8rem;background:' + cls.color + '22;border:1px solid ' + cls.color + ';width:44px;height:44px;display:flex;align-items:center;justify-content:center;flex-shrink:0">' + cls.emoji + '</div>'
      + '<div style="flex:1">'
      + '<div style="font-family:Cinzel,serif;font-size:0.85rem">' + n.name + '</div>'
      + '<div style="font-size:0.65rem;color:' + cls.color + '">' + cls.name + '</div>'
      + '<div style="font-size:0.6rem;color:' + tierC + '">Level ' + n.level
      + (n.weapon ? ' · ' + n.weapon.icon + ' ' + n.weapon.name : '') + '</div>'
      + '</div>'
      + '<div style="text-align:right">'
      + '<div style="font-family:Cinzel,serif;font-size:0.85rem;color:' + (canAfford && !blocked ? 'var(--gold)' : 'var(--mist)') + '">G ' + n.hireCost + '</div>'
      + '</div>'
      + '</div>'
      + '<div style="font-size:0.62rem;color:var(--mist);font-style:italic">"' + n.hireTrait + '"</div>'
      + '<div style="display:flex;gap:0.5rem;flex-wrap:wrap">'
      + '<span style="font-size:0.58rem;color:var(--crimson-bright)">HP ' + n.hp + '</span>'
      + '<span style="font-size:0.58rem;color:#88aaff">CHI ' + n.chi + '</span>'
      + '<span style="font-size:0.58rem;color:var(--jade-bright)">SPD ' + (CLASSES[n.class].baseStats.spd || 5) + '</span>'
      + '<span style="font-size:0.58rem;color:var(--steel)">✦ ' + n.specialMove.name + '</span>'
      + '</div>'
      + (blocked
        ? '<div style="font-size:0.6rem;color:var(--mist)">' + (clanFull ? 'Clan is full (max ' + maxClan + ').' : 'Already in clan.') + '</div>'
        : '<button class="nav-btn' + (canAfford ? ' confirm' : '') + '" '
          + (canAfford ? '' : 'disabled style="opacity:0.4" ')
          + 'onclick="hireNinja(\'' + n.id + '\')">'
          + (canAfford ? 'Hire for G ' + n.hireCost : 'Need G ' + n.hireCost) + '</button>'
      )
      + '</div>';
  }).join('');

  el.innerHTML = '<div class="section-title">Shadow Tavern · Recruitment</div>'
    + renderRepWidget()
    + '<div style="display:flex;align-items:center;gap:0.8rem;margin-bottom:1rem;flex-wrap:wrap">'
    + '<div class="text-xs text-mist">Clan: ' + clanSize + '/' + maxClan + ' ninja</div>'
    + '<div class="text-xs text-mist">Auto-refresh in: <span style="color:var(--gold)">' + timerStr + '</span></div>'
    + '<button class="nav-btn" onclick="refreshRecruitRoster()">↺ Refresh (G ' + RECRUIT_REFRESH_COST + ')</button>'
    + '<button class="nav-btn confirm" onclick="openCustomRecruitModal()" style="margin-left:auto">⊕ Custom Recruit (G ' + RECRUIT_BASE_COST + ')</button>'
    + '</div>'
    + (GS.recruitRoster.length
      ? '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:0.8rem">' + rosterCards + '</div>'
      : '<div class="text-xs text-mist">No recruits available. Click Refresh to bring in new candidates.</div>'
    );
}


function renderClan() {
  const el = document.getElementById('section-clan');
  const clanCards = GS.clan.map(n => ninjaCard(n)).join('');
  el.innerHTML = `
    <div class="section-title">Clan Roster · ${GS.clan.length} Shadow${GS.clan.length !== 1 ? 's' : ''}</div>
    ${renderRepWidget()}
    <div class="clan-grid">
      ${clanCards}
      <div class="add-ninja-card" onclick="showHubSection('recruit')">
        <span style="font-size:2rem">⊕</span>
        <span class="font-cinzel text-xs text-mist">Recruit a Ninja</span>
      </div>
    </div>
  `;
}

function ninjaCard(n) {
  const cls = CLASSES[n.class];
  const hpPct = Math.round((n.hp / n.maxHp) * 100);
  const stmPct = Math.round((n.stamina / n.maxStamina) * 100);
  const chiPct = Math.round((n.chi / n.maxChi) * 100);
  const trainingInfo = n.training ? `<span class="training-badge">⌛ Training: ${n.training.type} (${getTrainingTimeLeft(n)})</span>` : '';
  const wpnBadge = n.weapon ? `<span class="weapon-badge" style="border-color:${tierColor(n.weapon.tier)};color:${tierColor(n.weapon.tier)}">${n.weapon.icon} ${n.weapon.name}</span>` : `<span class="weapon-badge" style="border-color:rgba(255,255,255,0.1);color:var(--mist)">No Weapon</span>`;

  return `
    <div class="ninja-card ${n.training ? 'training' : ''}" onclick="openNinjaDetail('${n.id}')">
      <div class="ninja-card-header">
        <div class="ninja-avatar" style="background:${cls.color}22;border-color:${cls.color}">${cls.emoji}</div>
        <div class="ninja-info">
          <div class="ninja-name">${n.name}</div>
          <div class="ninja-class">${cls.name}</div>
          <div class="ninja-level">Level ${n.level} · ${n.exp}/${n.expToNext} XP</div>
          <div class="ninja-level" style="color:var(--gold)">Skill Lv ${getNinjaJobData(n).level} · ${getNinjaJobData(n).jp} SP</div>
        </div>
      </div>
      <div class="stat-bars">
        <div class="stat-row"><span class="stat-label">HP</span><div class="stat-bar"><div class="stat-fill hp" style="width:${hpPct}%"></div></div><span class="stat-val">${n.hp}/${n.maxHp}</span></div>
        <div class="stat-row"><span class="stat-label">STM</span><div class="stat-bar"><div class="stat-fill stamina" style="width:${stmPct}%"></div></div><span class="stat-val">${n.stamina}/${n.maxStamina}</span></div>
        <div class="stat-row"><span class="stat-label">CHI</span><div class="stat-bar"><div class="stat-fill chi" style="width:${chiPct}%"></div></div><span class="stat-val">${n.chi}/${n.maxChi}</span></div>
      </div>
      <div class="ninja-card-footer">${wpnBadge}${trainingInfo}</div>
      <div class="special-move-info">
        <div class="special-move-name">✦ ${n.specialMove.name}</div>
        <div class="special-move-desc">${n.specialMove.desc}</div>
      </div>
    </div>
  `;
}

function tierColor(tier) {
  return { common: 'var(--tier-common)', uncommon: 'var(--tier-uncommon)', rare: 'var(--tier-rare)', legendary: 'var(--tier-legendary)', epic: 'var(--tier-epic)' }[tier] || '#fff';
}

function openNinjaDetail(id) {
  _loadoutNinjaId = id;
  renderLoadoutModal(id);
}

let _loadoutNinjaId = null;

function renderLoadoutModal(id) {
  const n = GS.clan.find(x => x.id === id);
  if (!n) return;
  const cls = CLASSES[n.class];
  if (!n.carriedItems) n.carriedItems = [];

  // Weapon list: currently equipped + weapon stash
  const weaponList = buildWeaponChoiceHTML(n);
  // Carry grid
  const carryHTML = buildCarryGridHTML(n);
  // Stash items
  const stashHTML = buildStashItemsHTML(n);
  // Use items outside combat
  const useHTML = buildUseItemsHTML(n);

  const body = `
    <div style="font-size:0.78rem;color:var(--mist);margin-bottom:0.4rem">
      Lv${n.level} · HP ${n.hp}/${n.maxHp} · Chi ${n.chi}/${n.maxChi} · STM ${n.stamina}/${n.maxStamina}
    </div>
    <div style="font-size:0.72rem;color:var(--steel);margin-bottom:0.2rem">
      ✦ <b>${n.specialMove.name}</b> — ${n.specialMove.desc}
    </div>
    <div style="font-size:0.65rem;color:var(--gold);margin-bottom:0.5rem">
      ${(() => { const s = getEquippedSlots(n); const parts = [];
        if (s.reaction && JOB_ABILITIES[s.reaction]) parts.push('⚡ ' + JOB_ABILITIES[s.reaction].name);
        if (s.support && JOB_ABILITIES[s.support]) parts.push('🛡 ' + JOB_ABILITIES[s.support].name);
        if (s.movement && JOB_ABILITIES[s.movement]) parts.push('👟 ' + JOB_ABILITIES[s.movement].name);
        return parts.length ? parts.join(' · ') : 'No abilities equipped'; })()}
    </div>
    <div class="loadout-panel">
      <div>
        <div class="loadout-section-title">⚔ Weapon Slot</div>
        ${weaponList}
      </div>
      <div>
        <div class="loadout-section-title">
          \u{1F392} Field Kit <span style="color:var(--mist);font-size:0.6rem">${n.carriedItems.length}/${MAX_CARRY} slots</span>
        </div>
        ${carryHTML}
        <div class="loadout-section-title" style="margin-top:0.8rem">From Stash</div>
        ${stashHTML}
      </div>
    </div>
    ${useHTML}
  `;
  openModal(`${cls.emoji} ${n.name} — ${cls.name}`, body,
    [{ label: 'Done', fn: () => { closeModal(); renderClan(); saveGame(); }, cls: 'confirm' }]
  );
}

function buildWeaponChoiceHTML(n) {
  const stash = GS.weaponStash || [];
  let html = '';

  // Unequip option
  if (n.weapon) {
    html += `<div class="weapon-choice-item unequip-slot" onclick="ninjaUnequipWeapon('${n.id}')">
      <div class="wci-tier" style="background:rgba(255,255,255,0.1)"></div>
      <div class="wci-info"><div class="wci-name">— Unequip (return to stash)</div></div>
    </div>`;
  }

  // Currently equipped
  if (n.weapon) {
    const ew = n.weapon;
    const eStatus = weaponStatusLabel(ew);
    const eBroken = ew.quiverEmpty || ew.usesLeft <= 0 || ew.ammo <= 0;
    const eWarning = ew.quiverEmpty ? ' style="color:var(--crimson)"' : (ew.usesLeft <= 5 || ew.ammo <= 2 ? ' style="color:#ddaa00"' : '');
    const discardBtn = eBroken
      ? `<button onclick="ninjaDiscardWeapon('${n.id}')" style="font-size:0.55rem;background:rgba(192,57,43,0.15);border:1px solid rgba(192,57,43,0.4);color:var(--crimson-bright);padding:0.15rem 0.4rem;cursor:pointer;font-family:Cinzel,serif;margin-top:0.3rem">✕ Discard</button>`
      : '';
    html += `<div class="weapon-choice-item equipped-now">
      <div class="wci-tier" style="background:${tierColor(ew.tier)}"></div>
      <div class="wci-info">
        <div class="wci-name">${ew.icon} ${ew.name} ✓${eBroken ? ' <span style="color:var(--crimson);font-size:0.55rem">DEPLETED</span>' : ''}</div>
        <div class="wci-stats">DMG ${ew.dmg[0]}-${ew.dmg[1]}${ew.range ? ' · Range '+ew.range : ''} · ${ew.tier.toUpperCase()}<br><span${eWarning}>${eStatus}</span></div>
        ${discardBtn}
      </div>
    </div>`;
  }

  // Stash weapons
  stash.forEach((w, i) => {
    const sStatus = weaponStatusLabel(w);
    const sBroken = w.quiverEmpty || w.usesLeft <= 0 || w.ammo <= 0;
    const sCanUse = ninjaCanUseWeapon(n, w);
    const sDiscardBtn = sBroken
      ? `<button onclick="event.stopPropagation();stashDiscardWeapon(${i})" style="font-size:0.55rem;background:rgba(192,57,43,0.15);border:1px solid rgba(192,57,43,0.4);color:var(--crimson-bright);padding:0.15rem 0.4rem;cursor:pointer;font-family:Cinzel,serif;margin-top:0.3rem">✕ Discard</button>`
      : '';
    const sRestricted = !sCanUse && !sBroken;
    const sClickable = !sBroken && sCanUse;
    html += `<div class="weapon-choice-item" style="opacity:${sRestricted ? '0.45' : '1'}" ${sClickable ? `onclick="ninjaEquipWeapon('${n.id}', ${i})"` : ''}>
      <div class="wci-tier" style="background:${tierColor(w.tier)}"></div>
      <div class="wci-info">
        <div class="wci-name">${w.icon} ${w.name}${sBroken ? ' <span style="color:var(--crimson);font-size:0.55rem">DEPLETED</span>' : ''}${sRestricted ? ' <span style="color:var(--mist);font-size:0.5rem">🔒 Class locked</span>' : ''}</div>
        <div class="wci-stats">DMG ${w.dmg[0]}-${w.dmg[1]}${w.range ? ' · Range '+w.range : ''} · ${w.tier.toUpperCase()} · ${WEAPONS[w.type]?.label || w.type}<br><span style="color:var(--mist)">${sStatus}</span></div>
        ${sDiscardBtn}
      </div>
    </div>`;
  });

  if (!n.weapon && stash.length === 0) {
    html = '<div class="text-xs text-mist">No weapons available. Visit the Armory.</div>';
  }
  return `<div class="weapon-choice-list">${html}</div>`;
}

function buildCarryGridHTML(n) {
  let html = '<div class="carry-grid">';
  for (let i = 0; i < MAX_CARRY; i++) {
    const item = n.carriedItems[i];
    if (item) {
      const durLabel = (item.isArmor && item.durability !== undefined)
        ? `<div style="font-size:0.44rem;color:${item.durability <= 2 ? 'var(--crimson-bright)' : 'var(--jade-bright)'}">${item.durability}/${item.maxDurability||ARMOR_DURABILITY[item.tier]||5}\u{1F6E1}</div>` : '';
      html += `<div class="carry-slot filled" title="${item.name}" onclick="removeItemFromCarry('${n.id}', ${i})">
        <div class="carry-slot-icon">${item.icon}</div>
        <div class="carry-slot-label">${item.name.split(' ')[0]}</div>
        ${durLabel}
        <div class="carry-slot-remove">✕</div>
      </div>`;
    } else {
      html += `<div class="carry-slot"><div class="carry-empty">+</div></div>`;
    }
  }
  html += '</div>';
  html += '<div class="text-xs text-mist">Click item to remove · Max ' + MAX_CARRY + ' items</div>';
  return html;
}

function buildStashItemsHTML(n) {
  const allItems = [...ITEMS.healing, ...ITEMS.costume, ...ITEMS.tactical];
  const isFull = n.carriedItems.length >= MAX_CARRY;
  const hasArmor = n.carriedItems.some(x => x.isArmor);
  let html = '<div class="stash-item-list">';
  let hasAny = false;

  allItems.forEach(item => {
    const cat = getCategoryForItem(item);
    const owned = (GS.inventory[cat] || []).filter(x => x.id === item.id).length;
    if (owned === 0) return;
    hasAny = true;
    // Items are removed from inventory when carried, so owned IS the available count
    const armorBlocked = item.isArmor && hasArmor && !n.carriedItems.some(x => x.id === item.id);
    const available = owned;
    if (available <= 0) return;
    const stashBlocked = isFull || armorBlocked;
    const durInfo = item.isArmor ? (' \u00b7 \ud83d\udee1' + (ARMOR_DURABILITY[item.tier] || 5) + ' dur') : '';
    const clickAttr = stashBlocked ? '' : ('addItemToCarry(\'' + n.id + '\',\'' + cat + '\',\'' + item.id + '\')');
    const titleAttr = armorBlocked ? 'Only one armor per kit' : '';
    html += '<div class="stash-item ' + (stashBlocked ? 'full' : '') + '"'
          + ' onclick="' + clickAttr + '"'
          + ' title="' + titleAttr + '">'
          + '<div class="stash-item-icon">' + item.icon + '</div>'
          + '<div class="stash-item-info">'
          + '<div class="stash-item-name">' + item.name
          + (item.isArmor ? ' <span style="color:rgba(201,162,39,0.6);font-size:0.55rem">ARMOR</span>' : '')
          + '</div>'
          + '<div class="stash-item-desc">' + item.desc + durInfo + '</div>'
          + '</div>'
          + '<div class="stash-item-owned">' + available + ' avail</div>'
          + '</div>';
  });
  if (!hasAny) html += '<div class="text-xs text-mist">Stash empty. Visit Supplies.</div>';
  html += '</div>';
  return html;
}


function buildUseItemsHTML(n) {
  if (!n.carriedItems.length) return '';
  const healItems = n.carriedItems.filter(i => i.effect === 'heal' || i.effect === 'full_heal');
  if (!healItems.length) return '';
  if (n.hp >= n.maxHp) return '<div class="text-xs text-mist mt-1">HP is full — no healing needed.</div>';

  let html = '<div class="separator"></div><div class="loadout-section-title">Use Item Now (outside mission)</div><div class="use-item-list">';
  n.carriedItems.forEach((item, i) => {
    if (item.effect !== 'heal' && item.effect !== 'full_heal') return;
    html += `<div class="use-item-btn" onclick="useItemOutsideMission('${n.id}', ${i})">
      <span style="font-size:1.2rem">${item.icon}</span>
      <div><div class="stash-item-name">${item.name}</div><div class="stash-item-desc">+${item.value} HP · Current: ${n.hp}/${n.maxHp}</div></div>
    </div>`;
  });
  html += '</div>';
  return html;
}

function ninjaCanUseWeapon(ninja, weapon) {
  const cls = CLASSES[ninja.class];
  if (!cls) return true;
  const allowed = cls.primaryWeapons || [];
  if (allowed.includes(weapon.type)) return true;
  // Check job ability unlock
  const slots = getEquippedSlots(ninja);
  if (slots.support) {
    const ab = JOB_ABILITIES[slots.support];
    if (ab?.effect === 'unlock_weapon' && ab.weaponType === weapon.type) return true;
  }
  return false;
}

function ninjaEquipWeapon(ninjaId, stashIndex) {
  const n = GS.clan.find(x => x.id === ninjaId);
  if (!n) return;
  if (!GS.weaponStash) GS.weaponStash = [];
  const w = GS.weaponStash[stashIndex];
  if (!w) return;
  // Class restriction check
  if (!ninjaCanUseWeapon(n, w)) {
    const cls = CLASSES[n.class];
    const allowed = (cls?.primaryWeapons || []).map(t => WEAPONS[t]?.label || t).join(', ');
    toast(n.name + ' cannot use ' + (WEAPONS[w.type]?.label || w.type) + '. Class uses: ' + allowed, 'error');
    return;
  }
  // Return current weapon to stash if any
  if (n.weapon) GS.weaponStash.push({ ...n.weapon });
  n.weapon = { ...w };
  GS.weaponStash.splice(stashIndex, 1);
  toast(n.name + ' equipped ' + w.name, 'success');
  renderLoadoutModal(ninjaId);
}

function ninjaUnequipWeapon(ninjaId) {
  const n = GS.clan.find(x => x.id === ninjaId);
  if (!n || !n.weapon) return;
  if (!GS.weaponStash) GS.weaponStash = [];
  GS.weaponStash.push({ ...n.weapon });
  toast(`${n.weapon.name} returned to stash`, 'success');
  n.weapon = null;
  renderLoadoutModal(ninjaId);
}


function ninjaDiscardWeapon(ninjaId) {
  const n = GS.clan.find(x => x.id === ninjaId);
  if (!n || !n.weapon) return;
  openModal('Discard Weapon?',
    '<b style="color:var(--crimson-bright)">' + n.weapon.icon + ' ' + n.weapon.name + '</b> is depleted. Discard permanently?',
    [
      { label: 'Discard', fn: () => { n.weapon = null; saveGame(); closeModal(); renderLoadoutModal(ninjaId); }, cls: 'danger' },
      { label: 'Cancel', fn: closeModal }
    ]);
}

function stashDiscardWeapon(stashIdx) {
  const stash = GS.weaponStash || [];
  const w = stash[stashIdx];
  if (!w) return;
  openModal('Discard Weapon?',
    '<b style="color:var(--crimson-bright)">' + w.icon + ' ' + w.name + '</b> is depleted. Discard permanently?',
    [
      { label: 'Discard', fn: () => {
          GS.weaponStash.splice(stashIdx, 1); saveGame(); closeModal();
          if (window._loadoutNinjaId) renderLoadoutModal(window._loadoutNinjaId);
      }, cls: 'danger' },
      { label: 'Cancel', fn: closeModal }
    ]);
}

function addItemToCarry(ninjaId, category, itemId) {
  const n = GS.clan.find(x => x.id === ninjaId);
  if (!n) return;
  if (!n.carriedItems) n.carriedItems = [];
  if (n.carriedItems.length >= MAX_CARRY) { toast('Field kit full!', 'error'); return; }
  const inv = GS.inventory[category] || [];
  const idx = inv.findIndex(x => x.id === itemId);
  if (idx === -1) { toast('Item not in stash.', 'error'); return; }
  const item = inv[idx];
  // Enforce one armor per kit
  if (item.isArmor) {
    const alreadyHasArmor = n.carriedItems.some(x => x.isArmor);
    if (alreadyHasArmor) { toast('Only one armor item per mission kit.', 'error'); return; }
  }
  const prepared = item.isArmor ? initArmorItem(item) : { ...item };
  n.carriedItems.push(prepared);
  inv.splice(idx, 1);
  renderLoadoutModal(ninjaId);
}

function removeItemFromCarry(ninjaId, carryIndex) {
  const n = GS.clan.find(x => x.id === ninjaId);
  if (!n || !n.carriedItems) return;
  const item = n.carriedItems[carryIndex];
  if (!item) return;
  const cat = getCategoryForItem(item);
  if (!GS.inventory[cat]) GS.inventory[cat] = [];
  GS.inventory[cat].push({ ...item });
  n.carriedItems.splice(carryIndex, 1);
  toast(`${item.name} returned to stash`, 'success');
  renderLoadoutModal(ninjaId);
}

function useItemOutsideMission(ninjaId, carryIndex) {
  const n = GS.clan.find(x => x.id === ninjaId);
  if (!n || !n.carriedItems) return;
  const item = n.carriedItems[carryIndex];
  if (!item) return;
  if (n.hp >= n.maxHp) { toast(`${n.name} is already at full HP.`, 'error'); return; }
  n.hp = Math.min(n.maxHp, n.hp + (item.value || 0));
  if (item.effect === 'full_heal' && item.clearPoison) n.status = null;
  n.carriedItems.splice(carryIndex, 1);
  toast(`${n.name} used ${item.name}. HP: ${n.hp}/${n.maxHp}`, 'success');
  saveGame();
  renderLoadoutModal(ninjaId);
}

function getTrainingTimeLeft(n) {
  if (!n.training) return '';
  const now = Date.now();
  const end = n.training.endTime;
  const left = Math.max(0, Math.ceil((end - now) / 3600000));
  if (left <= 0) {
    finishTraining(n);
    return 'Complete!';
  }
  return `${left}h left`;
}

function finishTraining(n) {
  if (!n.training) return;
  const t = n.training;
  if (t.stat === 'hp') { n.maxHp += t.points * 2; n.hp = n.maxHp; }
  else if (t.stat === 'stamina') { n.maxStamina += t.points; }
  else if (t.stat === 'chi') { n.maxChi += t.points; }
  n.training = null;
  toast(`${n.name} finished training!`, 'success');
  saveGame();
}

];

function getCurrentArc() {
  const done = new Set(GS.completedMissions);
  for (const arc of STORY_ARCS) {
    // Arc is complete if its capstone is done
    if (!done.has(arc.capstone)) return arc;
  }
  // All arcs complete — return last arc
  return STORY_ARCS[STORY_ARCS.length - 1];
}

function isArcComplete(arc) {
  const done = new Set(GS.completedMissions);
  return done.has(arc.capstone);
}

function getArcMissions(arc) {
  return MISSIONS.filter(m => arc.ids.includes(m.id));
}

function getAvailableMissions() {
  const maxLevel = GS.clan.length ? Math.max(...GS.clan.map(n => n.level)) : 1;
  const done = new Set(GS.completedMissions);
  const curArc = getCurrentArc();
  const curArcIds = new Set(curArc.ids);

  return getAllMissions().filter(m => {
    if (m.requiredLevel > maxLevel) return false;
    if (m.requiresMissions && !m.requiresMissions.every(id => done.has(id))) return false;
    // Story missions: only those in the current arc are selectable
    if (!m.isDynamic && !curArcIds.has(m.id)) return false;
    return true;
  }).map(m => m.id);
}

function selectMission(id) {
  selectedMissionId = id;
  renderMissions();
  restoreSidebarIfOpen();
}

function toggleParty(id) {
  if (selectedParty.includes(id)) {
    selectedParty = selectedParty.filter(x => x !== id);
  } else if (selectedParty.length < 3) {
    selectedParty.push(id);
  } else {
    toast('Maximum 3 ninja per mission.', 'error'); return;
  }
  renderMissions();
  restoreSidebarIfOpen();
}

// After any renderMissions() call, restore the open sidebar and re-attach listeners
function restoreSidebarIfOpen() {
  if (!window._missionSidebarOpen || window.innerWidth > 700) return;
  const sb = document.querySelector('.mission-sidebar');
  if (!sb) return;
  sb.classList.add('open');
  // Re-attach listeners to the freshly rebuilt element
  attachMissionSidebarListeners(sb);
}

function renderMissionIntro() {
  const m = getAllMissions().find(x => x.id === selectedMissionId);
  const el = document.getElementById('missionIntro');
  if (el && m) el.textContent = `"${m.intro}"`;
}

function selectFormation(key) {
  selectedFormation = key;
  renderMissions();
  restoreSidebarIfOpen();
}

function launchMission() {
  if (!selectedMissionId) { toast('Select a mission first.', 'error'); return; }
  if (selectedParty.length === 0) { toast('Select at least one ninja.', 'error'); return; }

  const m = getAllMissions().find(x => x.id === selectedMissionId);
  if (!m) { toast('Mission not found.', 'error'); return; }

  if (!m.isDynamic && GS.completedMissions.includes(m.id)) {
    toast('Story mission already completed. Replay coming soon.', 'error'); return;
  }
  if (m.isDynamic && m.completed) {
    toast('Contract already fulfilled. Wait for the next refresh.', 'error'); return;
  }

  initCombat(m, selectedParty);
}

const TERRAIN_TILES = {
  empty:  { color: '#1a1a26', passable: true,  moveCost: 1,  label: '' },
  wall:   { color: '#0a0a12', passable: false, moveCost: 99, label: '▪' },
  forest: { color: '#1a2a1a', passable: true,  moveCost: 2,  label: '🌲' },
  rubble: { color: '#2a1a0a', passable: true,  moveCost: 2,  label: '∷' },
  exit:   { color: '#0a2a1a', passable: true,  moveCost: 1,  label: '⬡', isExit: true }
};

const TERRAIN_PRESETS = {
  village:  { base: 'empty', features: ['wall', 'rubble'] },
  castle:   { base: 'empty', features: ['wall', 'wall'] },
  dungeon:  { base: 'empty', features: ['wall', 'rubble', 'wall'] },
  fortress: { base: 'empty', features: ['wall', 'wall', 'rubble'] },
  palace:   { base: 'empty', features: ['wall', 'rubble'] },
  docks:    { base: 'empty', features: ['wall', 'rubble'] },
  forest:   { base: 'forest', features: ['wall', 'forest', 'forest'] },
  keep:     { base: 'empty', features: ['wall', 'wall', 'wall'] }
};

function initCombat(mission, partyIds) {
  CS.active = true;
  CS.mission = mission;
  CS.turn = 0;
  CS.phase = 'enemy_acting';
  CS.activeUnit = null;
  CS.unitMoved = false;
  CS.unitActed = false;
  CS.log = [];
  CS.selectedAlly = null;
  CS.selectedAction = null;
  CS.highlightedTiles = [];

  // Reset objective state
  CS.objectivePhase = 'fight';
  CS.exitsActive = false;
  CS.exitTiles = [];
  CS.lootOnFloor = null;
  CS.allyWithLoot = null;
  CS.alliesEscaped = [];
  CS.turnLimit = mission.turnLimit || 0;
  CS.doomBags = [];
  CS.currentFloor = 0;
  CS.totalFloors = mission.floors ? mission.floors.length : 1;
  CS.prisoner = null;
  CS.prisonerFreed = false;
  initMissionStats();

  // Build grid
  CS.grid = generateGrid(mission.terrain);

  // Carve exit openings on the left wall (always present, activate later)
  const exitYs = [2, Math.floor(CS.gridH / 2), CS.gridH - 3];
  CS.exitTiles = exitYs.map(y => ({ x: 0, y }));
  CS.exitTiles.forEach(t => { CS.grid[t.y][t.x] = 'exit'; });

  // Place allies
  CS.allies = partyIds.map((id, i) => {
    const n = GS.clan.find(x => x.id === id);
    const cls = CLASSES[n.class];
    const ally = {
      ...JSON.parse(JSON.stringify(n)),
      gridId: 'ally_' + id,
      ...(() => {
        const f = FORMATIONS[selectedFormation] || FORMATIONS.line;
        const pts = f.positions(partyIds.length, CS.gridH);
        return pts[i] || { x: 1 + i, y: Math.floor(CS.gridH / 2) };
      })(),
      buffs: [], status: null,
      carriedItems: JSON.parse(JSON.stringify(n.carriedItems || [])),

      armorItem: null,
      facing: 'south',
      ct: Math.floor(Math.random() * 40),  // ATB charge (0-100 = ready)
      spd: CLASSES[n.class]?.baseStats?.spd || 5,
      // Job system fields (copied from GS ninja)
      jobs: JSON.parse(JSON.stringify(n.jobs || {})),
      unlockedAbilities: [...(n.unlockedAbilities || [])],
      equippedAbilities: JSON.parse(JSON.stringify(n.equippedAbilities || { reaction: null, support: null, movement: null }))
    };
    // Migrate weapon runtime fields
    if (ally.weapon) migrateWeapon(ally.weapon);
    // Find and apply armor from carriedItems
    const armorIdx = ally.carriedItems.findIndex(x => x.isArmor);
    if (armorIdx !== -1) {
      const armor = ally.carriedItems[armorIdx];
      if (armor.durability === undefined) initArmorItem(armor);
      ally.armorItem = armor; // reference (same object in carriedItems)
      // Apply passive buff so calcDamage can see it
      ally.buffs.push({ type: 'armor_passive', effect: armor.effect, value: armor.value, permanent: true });
    }
    return ally;
  });

  // Place enemies
  CS.enemies = [];
  let eCount = 0;
  // Multi-floor: use this floor's enemy list if available
  const _floorData = CS.mission.floors ? CS.mission.floors[CS.currentFloor] : null;
  const _enemySpecs = _floorData ? _floorData.enemies : (CS.mission.enemies || []);
  const _floorTarget = _floorData ? (_floorData.targetEnemy || null) : (CS.mission.targetEnemy || null);
  const _floorCarrier = _floorData ? (_floorData.carrierEnemy || null) : (CS.mission.carrierEnemy || null);
  const _floorLoot = _floorData ? (_floorData.lootItem || null) : (CS.mission.lootItem || null);
  if (_floorData && _floorData.turnLimit) CS.turnLimit = _floorData.turnLimit;
  _enemySpecs.forEach(group => {
    const type = ENEMY_TYPES[group.type];
    for (let i = 0; i < group.count; i++) {
      const pos = findEmptyPos(CS.gridW - 3, CS.gridW - 1, 1, CS.gridH - 2);
      const eWeapon = spawnEnemyWeapon(group.type, mission.difficulty || 1);
      // Weapon upgrades enemy attack range for ranged/thrown
      const eAttackRange = eWeapon && (eWeapon.type === 'ranged' || eWeapon.type === 'thrown')
        ? Math.max(type.attackRange, eWeapon.range || 3)
        : type.attackRange;
      CS.enemies.push({
        id: 'enemy_' + eCount++,
        name: type.name, emoji: type.emoji,
        hp: type.hp, maxHp: type.hp,
        dmg: [...type.dmg],
        moveRange: type.moveRange, attackRange: eAttackRange,
        x: pos.x, y: pos.y,
        gold: type.gold, exp: type.exp,
        ai: type.ai, isBoss: type.isBoss || false, isRecruitTarget: type.isAlly || false,
        status: null, type: group.type,
        weapon: eWeapon,
        facing: 'west',
        ct: Math.floor(Math.random() * 40),
        spd: type.spd || 5
      });
    }
  });

  // Tag the target enemy (assassination) and carrier (theft)
  if (_floorTarget) {
    const t = CS.enemies.find(e => e.type === _floorTarget);
    if (t) { t.isTarget = true; t.name = '★ ' + t.name; }
  }
  if (_floorCarrier && _floorLoot) {
    const c = CS.enemies.find(e => e.type === _floorCarrier);
    if (c) { c.isCarrier = true; c.carriedLoot = _floorLoot; c.name = '📦 ' + c.name; }
  }

  // Preload PNGs for this session (async, non-blocking)
  preloadCombatImages();

  addLog(`⚔ Mission: ${mission.name}`, 'system');
  addLog(`${CS.allies.length} allies deployed. ${CS.enemies.length} enemies spotted.`, 'system');

  // Log mission-specific objective hint
  if (mission.floors && mission.floors.length > 1) {
    addLog('\u{1F3AF} Multi-floor mission: ' + mission.floors.length + ' floors. Clear each floor and reach the exit to advance.', 'system');
  } else if (mission.type === 'assassination' && mission.targetEnemy) {
    addLog('\u{1F3AF} Objective: Kill the target, then reach the exit.', 'system');
  } else if (mission.type === 'theft' && mission.carrierEnemy) {
    addLog('\u{1F4E6} Objective: Steal the ' + (mission.lootItem?.name || 'item') + ', then escape.', 'system');
  } else if (mission.turnLimit) {
    addLog('\u23f3 Objective: Defeat all enemies within ' + mission.turnLimit + ' turns!', 'system');
  }

  showScreen('combat');
  renderCombat();
  setTimeout(advanceCT, 100);
}



function generateGrid(terrainName) {
  const preset = TERRAIN_PRESETS[terrainName] || TERRAIN_PRESETS.village;
  const grid = [];
  for (let y = 0; y < CS.gridH; y++) {
    grid.push([]);
    for (let x = 0; x < CS.gridW; x++) {
      grid[y].push(preset.base);
    }
  }
  // Add walls/borders
  for (let x = 0; x < CS.gridW; x++) { grid[0][x] = 'wall'; grid[CS.gridH-1][x] = 'wall'; }
  for (let y = 0; y < CS.gridH; y++) { grid[y][0] = 'wall'; grid[y][CS.gridW-1] = 'wall'; }

  // Random features
  const featureCount = 8 + Math.floor(Math.random() * 8);
  for (let i = 0; i < featureCount; i++) {
    const x = 2 + Math.floor(Math.random() * (CS.gridW - 4));
    const y = 1 + Math.floor(Math.random() * (CS.gridH - 2));
    const feat = preset.features[Math.floor(Math.random() * preset.features.length)];
    grid[y][x] = feat;
  }
  return grid;
}

function findEmptyPos(x1, x2, y1, y2, attempts = 30) {
  for (let i = 0; i < attempts; i++) {
    const x = x1 + Math.floor(Math.random() * (x2 - x1 + 1));
    const y = y1 + Math.floor(Math.random() * (y2 - y1 + 1));
    if (isPosEmpty(x, y)) return { x, y };
  }
  return { x: Math.floor((x1 + x2) / 2), y: Math.floor((y1 + y2) / 2) };
}

function isPosEmpty(x, y, excludeId = null) {
  if (x < 0 || y < 0 || x >= CS.gridW || y >= CS.gridH) return false;
  const tile = CS.grid[y]?.[x];
  if (!tile || !TERRAIN_TILES[tile].passable) return false;
  // Only living units block tiles — dead enemies/escaped allies don't occupy space
  const allUnits = [...CS.allies, ...CS.enemies].filter(u => u.hp > 0 && !u.escaped);
  return !allUnits.some(u => u.x === x && u.y === y && u.id !== excludeId && u.gridId !== excludeId);
}

function renderCTQueue() {
  const el = document.getElementById('ctQueue');
  if (!el) return;
  const order = calcTurnOrder(8);
  const allUnits = getAllLiveUnits();
  el.innerHTML = order.map((u, i) => {
    const isAlly = !!u.gridId;
    const isActive = (u.gridId || u.id) === CS.activeUnit;
    const cls = isAlly ? CLASSES[u.class] : null;
    const emoji = cls ? cls.emoji : u.emoji;
    const color = isAlly ? (cls?.color || '#5a8a5a') : '#8a2a2a';
    const pct = Math.min(100, Math.round(((u.ct || 0) / 100) * 100));
    return '<div class="ct-slot' + (isActive ? ' active' : '') + (isAlly ? ' ally' : ' enemy') + '" style="border-color:' + color + '33">'
      + '<div class="ct-emoji">' + emoji + '</div>'
      + '<div class="ct-name">' + u.name.split(' ')[0] + '</div>'
      + (i === 0 ? '<div class="ct-bar-wrap"><div class="ct-bar-fill" style="width:100%;background:' + color + '"></div></div>' : '')
      + '</div>';
  }).join('');
  // Also show current unit CT bars for all live units
  const barEl = document.getElementById('ctBars');
  if (barEl) {
    barEl.innerHTML = allUnits.map(u => {
      const isAlly = !!u.gridId;
      const isActive = (u.gridId || u.id) === CS.activeUnit;
      const cls = isAlly ? CLASSES[u.class] : null;
      const color = isAlly ? (cls?.color || '#5a8a5a') : '#8a2a2a';
      const pct = Math.min(100, Math.round(((u.ct || 0) / 100) * 100));
      return '<div class="ctb-row" title="' + u.name + ' CT: ' + pct + '%">'
        + '<div class="ctb-label" style="color:' + (isAlly ? '#aac' : '#c88') + '">'
        + (isAlly ? CLASSES[u.class]?.emoji : u.emoji)
        + '</div>'
        + '<div class="ctb-track"><div class="ctb-fill' + (isActive ? ' ctb-active' : '') + '" style="width:' + pct + '%;background:' + color + '"></div></div>'
        + '</div>';
    }).join('');
  }
}

function renderCombat() {
  const _fn = CS.mission?.floors?.[CS.currentFloor]?.name;
  document.getElementById('missionNameDisplay').textContent = CS.mission ? (CS.mission.name + (_fn ? ' — ' + _fn : '')) : '';
  const _floorLabel = CS.totalFloors > 1 ? ' · Floor ' + (CS.currentFloor + 1) + '/' + CS.totalFloors : '';
  document.getElementById('turnDisplay').textContent = 'Turn ' + CS.turn + _floorLabel;
  const _activeU = CS.activeUnit
    ? (CS.allies.find(a => a.gridId === CS.activeUnit) || CS.enemies.find(e => e.id === CS.activeUnit))
    : null;
  const _phaseText = _activeU
    ? ((_activeU.gridId ? '👤 ' : '⚔ ') + _activeU.name + "'s Turn")
    : (CS.phase === 'player' ? '👤 Player Phase' : '⏳ Advancing...');
  document.getElementById('phaseDisplay').textContent = _phaseText;
  renderCTQueue();

  // Objective status bar
  const objEl = document.getElementById('objectiveDisplay');
  if (objEl && CS.mission) {
    const m = CS.mission;
    let objText = '', objColor = 'var(--mist)';
    if (m.type === 'assassination' && m.targetEnemy) {
      const target = CS.enemies.find(e => e.isTarget);
      if (!target || target.hp <= 0) {
        const remaining = CS.allies.filter(a => a.hp > 0 && !a.escaped).length;
        objText = remaining > 0 ? `\u{1F3AF} Target down · ${remaining} ninja must escape →` : '✓ All escaped!';
        objColor = 'var(--jade-bright)';
      } else {
        objText = `\u{1F3AF} Kill: ${target.name} (${target.hp}/${target.maxHp} HP)`;
        objColor = 'var(--crimson-bright)';
      }
    } else if (m.floors && m.floors[CS.currentFloor]?.isRescueFloor) {
      if (CS.prisonerFreed) {
        objText = 'Prisoner freed! Guide them to the exit!'; objColor = 'var(--jade-bright)';
      } else if (CS.allyWithLoot) {
        objText = 'Key secured — move to the prisoner!'; objColor = 'var(--gold)';
      } else if (CS.lootOnFloor) {
        objText = '🔑 Key on floor — pick it up!'; objColor = 'var(--gold)';
      } else {
        objText = 'Clear the guards and get the cell key.'; objColor = 'var(--steel)';
      }
  } else if (m.type === 'theft' && m.carrierEnemy) {
      if (CS.objectivePhase === 'done') {
        objText = '✓ Loot extracted!'; objColor = 'var(--jade-bright)';
      } else if (CS.allyWithLoot) {
        objText = `\u{1F4E6} Carrying loot — reach the exit →`; objColor = 'var(--gold)';
      } else if (CS.lootOnFloor) {
        objText = `\u{1F4E6} Loot at (${CS.lootOnFloor.x},${CS.lootOnFloor.y}) — pick it up!`; objColor = 'var(--gold)';
      } else {
        const carrier = CS.enemies.find(e => e.isCarrier);
        objText = carrier && carrier.hp > 0
          ? `\u{1F4E6} Steal from: ${carrier.name} (${carrier.hp}/${carrier.maxHp} HP)`
          : '📦 Kill carrier to drop loot';
        objColor = 'var(--crimson-bright)';
      }
    } else if (CS.turnLimit > 0) {
      const left = Math.max(0, CS.turnLimit - CS.turn + 1);
      objText = `⏳ ${left} turn${left !== 1 ? 's' : ''} left · Eliminate all enemies`;
      objColor = left <= 3 ? 'var(--crimson-bright)' : left <= 6 ? 'var(--gold)' : 'var(--mist)';
    }
    objEl.textContent = objText;
    objEl.style.color = objColor;
  }

  renderAllyList();
  renderEnemyList();
  renderSelectedInfo();
  syncMobileCombatPanels();
  resizeCombatCanvas();
  drawCanvas();
  updateActionButtons();
  // Kick off pulse animation for exits/loot if needed
  if (CS.exitsActive || CS.lootOnFloor || CS.doomBags.length || CS.allies.some(a => a.doomed) || (CS.prisoner && !CS.prisoner.escaped)) schedulePulseRedraw();
}

function resizeCombatCanvas() {
  const canvas = document.getElementById('combatCanvas');
  const container = canvas.parentElement;
  if (!container) return;
  const isMobile = window.innerWidth <= 700;
  if (isMobile) {
    // Reserve space for header + controls + toggle buttons
    const headerH = document.querySelector('.combat-header')?.offsetHeight || 40;
    const controlsH = document.querySelector('.combat-controls')?.offsetHeight || 60;
    const availH = window.innerHeight - headerH - controlsH - 32;
    const availW = container.clientWidth - 8;
    // Fit grid into available space maintaining aspect ratio
    const scaleW = availW / CS.gridW;
    const scaleH = availH / CS.gridH;
    CS.cellSize = Math.max(28, Math.floor(Math.min(scaleW, scaleH)));
  } else {
    const availW = container.clientWidth - 24;
    const availH = container.clientHeight - 24;
    const scaleW = availW / CS.gridW;
    const scaleH = availH / CS.gridH;
    CS.cellSize = Math.max(36, Math.min(64, Math.floor(Math.min(scaleW, scaleH))));
  }
}

function updateActionButtons() {
  const ally = CS.allies.find(a => a.gridId === CS.activeUnit);
  const isMyTurn = CS.phase === 'player' && !!ally;
  const moved = CS.unitMoved;
  const acted = CS.unitActed;
  const hasChi = ally ? ally.chi >= (ally.specialMove?.chi || 99) : false;
  const weaponOut = ally && ally.weapon && !weaponUsable(ally);

  document.getElementById('btnMove').disabled = !isMyTurn || moved || !ally || ally.hp <= 0;
  document.getElementById('btnAttack').disabled = !isMyTurn || acted || !ally || ally.hp <= 0 || weaponOut;
  document.getElementById('btnSpecial').disabled = !isMyTurn || acted || !ally || !hasChi || ally.hp <= 0;
  document.getElementById('btnItem').disabled = !isMyTurn || !ally || ally.hp <= 0;
  const endBtn = document.getElementById('btnEndTurn');
  if (endBtn) endBtn.disabled = !isMyTurn;
  const undoBtn = document.getElementById('btnUndoMove');
  if (undoBtn) {
    // Undo available only if moved but not yet acted
    undoBtn.disabled = !isMyTurn || !CS.savedMove || CS.unitActed;
    undoBtn.style.opacity = (!isMyTurn || !CS.savedMove || CS.unitActed) ? '0.3' : '1';
  }

  const canFace = isMyTurn && ally && ally.hp > 0;
  ['north','south','east','west'].forEach(d => {
    const btn = document.getElementById('facing' + d.charAt(0).toUpperCase() + d.slice(1));
    if (!btn) return;
    btn.disabled = !canFace;
    btn.classList.toggle('active', canFace && ally.facing === d);
  });
  syncFacingUI(canFace ? ally.facing : null);
}

let _pulseRAF = null;
function schedulePulseRedraw() {
  if (_pulseRAF) return;
  _pulseRAF = requestAnimationFrame(() => {
    _pulseRAF = null;
    if (CS.active && (CS.exitsActive || CS.lootOnFloor || CS.doomBags.length || CS.allies.some(a => a.doomed) || (CS.prisoner && !CS.prisoner.escaped))) {
      drawCanvas();
      schedulePulseRedraw();
    }
  });
}

function drawCanvas() {
  const canvas = document.getElementById('combatCanvas');
  const cs = CS.cellSize;
  canvas.width = CS.gridW * cs;
  canvas.height = CS.gridH * cs;
  const ctx = canvas.getContext('2d');

  // Draw grid
  for (let y = 0; y < CS.gridH; y++) {
    for (let x = 0; x < CS.gridW; x++) {
      const tileKey = CS.grid[y][x] || 'empty';
      const tile = TERRAIN_TILES[tileKey];
      // Skip exit tiles here — drawn later with glow
      if (tileKey === 'exit') continue;
      const px = x * cs, py = y * cs;
      const tImg = getImg(tilePng(tileKey));
      if (tImg) {
        ctx.drawImage(tImg, px, py, cs, cs);
        // Darken walls so they read as impassable
        if (tileKey === 'wall') {
          ctx.fillStyle = 'rgba(0,0,0,0.25)';
          ctx.fillRect(px, py, cs, cs);
        } else {
          // Passable floor/forest/rubble: subtle bright overlay so they stand out
          ctx.fillStyle = 'rgba(255,255,255,0.07)';
          ctx.fillRect(px, py, cs, cs);
        }
      } else {
        // Fallback: solid color + slight brightening for passable tiles
        ctx.fillStyle = tile.color;
        ctx.fillRect(px, py, cs, cs);
        if (tile.passable) {
          ctx.fillStyle = 'rgba(255,255,255,0.06)';
          ctx.fillRect(px, py, cs, cs);
        }
        if (tile.label && tile.label.length === 1 && tile.label !== '▪') {
          ctx.fillStyle = 'rgba(255,255,255,0.15)';
          ctx.font = `${cs * 0.4}px serif`;
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          ctx.fillText(tile.label, px + cs / 2, py + cs / 2);
        }
      }
      ctx.strokeStyle = 'rgba(255,255,255,0.06)';
      ctx.strokeRect(px, py, cs, cs);
    }
  }

  // Highlight tiles
  CS.highlightedTiles.forEach(({ x, y, color }) => {
    ctx.fillStyle = color;
    ctx.fillRect(x * cs, y * cs, cs, cs);
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.strokeRect(x * cs + 1, y * cs + 1, cs - 2, cs - 2);
  });

  // Draw enemies
  CS.enemies.filter(e => e.hp > 0).forEach(e => {
    drawUnit(ctx, e, '#8b1a1a', '#ff4444', false);
    // Target marker
    if (e.isTarget) {
      ctx.strokeStyle = '#ff2222';
      ctx.lineWidth = 2.5;
      ctx.setLineDash([4, 3]);
      ctx.beginPath();
      ctx.arc(e.x * cs + cs / 2, e.y * cs + cs / 2, cs * 0.46, 0, Math.PI * 2);
      ctx.stroke();
      ctx.setLineDash([]);
    }
    // Carrier marker
    if (e.isCarrier && e.carriedLoot) {
      ctx.font = `${cs * 0.28}px serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'top';
      ctx.fillText(e.carriedLoot.icon, e.x * cs + cs * 0.75, e.y * cs + 2);
    }
  });

  // Draw loot on floor
  if (CS.lootOnFloor) {
    const lx = CS.lootOnFloor.x * cs + cs / 2;
    const ly = CS.lootOnFloor.y * cs + cs / 2;
    // Pulsing glow
    const pulse = 0.5 + 0.5 * Math.sin(Date.now() / 300);
    ctx.fillStyle = `rgba(240,200,0,${0.15 + pulse * 0.15})`;
    ctx.beginPath(); ctx.arc(lx, ly, cs * 0.4, 0, Math.PI * 2); ctx.fill();
    ctx.font = `${cs * 0.5}px serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(CS.lootOnFloor.icon, lx, ly);
  }

  // Draw exit tiles with glow when active
  CS.exitTiles.forEach(exit => {
    const ex = exit.x * cs;
    const ey = exit.y * cs;
    // Draw floor PNG (or fallback color) underneath
    const floorImg = getImg('floor.png');
    if (floorImg) {
      ctx.drawImage(floorImg, ex, ey, cs, cs);
    } else {
      ctx.fillStyle = TERRAIN_TILES.empty.color;
      ctx.fillRect(ex, ey, cs, cs);
    }
    if (CS.exitsActive) {
      const pulse = 0.5 + 0.5 * Math.sin(Date.now() / 400);
      ctx.fillStyle = `rgba(61,170,125,${0.22 + pulse * 0.18})`;
      ctx.fillRect(ex, ey, cs, cs);
      ctx.strokeStyle = `rgba(61,220,140,${0.6 + pulse * 0.3})`;
      ctx.lineWidth = 2;
      ctx.strokeRect(ex + 1, ey + 1, cs - 2, cs - 2);
      ctx.fillStyle = `rgba(61,200,125,${0.8 + pulse * 0.2})`;
      ctx.font = `${cs * 0.45}px serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('⬡', ex + cs / 2, ey + cs / 2);
    } else {
      ctx.fillStyle = 'rgba(0,0,0,0.35)';
      ctx.fillRect(ex, ey, cs, cs);
      ctx.fillStyle = 'rgba(61,170,125,0.25)';
      ctx.font = `${cs * 0.35}px serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('⬡', ex + cs / 2, ey + cs / 2);
    }
  });

  // Draw prisoner (rescue floor 2)
  if (CS.prisoner && !CS.prisoner.escaped) {
    const _pr = CS.prisoner;
    const _prx = _pr.x * cs, _pry = _pr.y * cs;
    // Pulsing glow — gold if freed, red if still chained
    const _prPulse = 0.5 + 0.5 * Math.sin(Date.now() / 400);
    ctx.fillStyle = _pr.freed
      ? 'rgba(61,170,125,' + (0.2 + _prPulse * 0.15) + ')'
      : 'rgba(200,100,0,' + (0.15 + _prPulse * 0.12) + ')';
    ctx.fillRect(_prx, _pry, cs, cs);
    ctx.font = (cs * 0.52) + 'px serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(_pr.freed ? '🧍' : '⛓️', _prx + cs / 2, _pry + cs / 2);
    // Label
    ctx.fillStyle = _pr.freed ? '#88ffcc' : '#ffaa44';
    ctx.font = (cs * 0.18) + 'px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    ctx.fillText(_pr.freed ? 'FREED' : 'PRISONER', _prx + cs / 2, _pry + 1);
  }

  // Draw doom bags (fallen ally loot)
  CS.doomBags.forEach(bag => {
    const bx = bag.x * cs, by = bag.y * cs;
    const pulse = 0.5 + 0.5 * Math.sin(Date.now() / 350);
    ctx.fillStyle = "rgba(180,0,0," + (0.15 + pulse * 0.12) + ")";
    ctx.fillRect(bx, by, cs, cs);
    ctx.font = (cs * 0.5) + "px serif";
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText("💀", bx + cs / 2, by + cs / 2);
    const itemCount = (bag.items?.length || 0) + (bag.weapon ? 1 : 0);
    if (itemCount > 0) {
      ctx.fillStyle = "#ff4444";
      ctx.beginPath(); ctx.arc(bx + cs * 0.78, by + cs * 0.22, cs * 0.18, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#fff"; ctx.font = (cs * 0.2) + "px sans-serif";
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.fillText(String(itemCount), bx + cs * 0.78, by + cs * 0.22);
    }
  });

  // Draw allies (doomed flash red; escaped ghost; normal otherwise)
  CS.allies.filter(a => !a.perished).forEach(a => {
    const cls = CLASSES[a.class];
    const selected = CS.selectedAlly === a.gridId;
    if (a.escaped) {
      ctx.globalAlpha = 0.3;
      drawUnit(ctx, a, cls.color, "#88ffcc", true, false);
      ctx.globalAlpha = 1;
    } else if (a.doomed) {
      const pulse = 0.5 + 0.5 * Math.sin(Date.now() / 200);
      ctx.globalAlpha = 0.35 + pulse * 0.35;
      drawUnit(ctx, a, "#aa2222", "#ff4444", true, false);
      ctx.globalAlpha = 1;
      // Countdown circle
      const dcx = a.x * cs + cs / 2, dcy = a.y * cs + cs / 2;
      ctx.fillStyle = "rgba(0,0,0,0.65)";
      ctx.beginPath(); ctx.arc(dcx, dcy, cs * 0.3, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#ff3333";
      ctx.font = "bold " + (cs * 0.36) + "px sans-serif";
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.fillText(String(a.doomCountdown), dcx, dcy);
      ctx.font = (cs * 0.24) + "px serif";
      ctx.fillText("💀", dcx, a.y * cs + cs * 0.12);
    } else {
      drawUnit(ctx, a, cls.color, selected ? "#f0c040" : "#aabbcc", true, selected);
    }
    if (a.hasLoot) {
      ctx.font = (cs * 0.28) + "px serif";
      ctx.textAlign = "center"; ctx.textBaseline = "top";
      ctx.fillText("📦", a.x * cs + cs * 0.75, a.y * cs + 2);
    }
  });
}

function drawUnit(ctx, unit, fillColor, textColor, isAlly, selected = false) {
  const cs = CS.cellSize;
  const px = unit.x * cs;
  const py = unit.y * cs;
  const cx = px + cs / 2;
  const cy = py + cs / 2;
  const r = cs * 0.42;

  // Resolve sprite sheet: allies use class sheet, enemies use type sheet
  const sheet = isAlly ? getImg(classPng(unit.class)) : getImg(enemySheetKey(unit.type));
  const facing = unit.facing || 'south';

  // ── Selection glow ──
  if (selected) {
    ctx.save();
    ctx.shadowColor = '#f0c040';
    ctx.shadowBlur = 14;
    ctx.fillStyle = 'rgba(240,192,64,0.12)';
    ctx.beginPath();
    ctx.arc(cx, cy, r + 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    ctx.strokeStyle = '#f0c040';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(cx, cy, r + 4, 0, Math.PI * 2);
    ctx.stroke();
  }

  // Only use sprite if image is fully decoded (naturalWidth > 0)
  if (sheet && sheet.naturalWidth > 0) {
    // ── Sprite sheet frame clipped to circle, preserving aspect ratio ──
    const frameW = sheet.naturalWidth / 4;
    const frameH = sheet.naturalHeight;
    const aspect = frameW > 0 ? frameH / frameW : 1;

    // Fit within the cell — scale so the wider dimension fills cs*0.88
    const maxSize = cs * 0.88;
    let dw, dh;
    if (aspect >= 1) {
      // Taller than wide: constrain by height
      dh = maxSize;
      dw = maxSize / aspect;
    } else {
      // Wider than tall: constrain by width
      dw = maxSize;
      dh = maxSize * aspect;
    }
    const sx = cx - dw / 2;
    const sy = cy - dh / 2;

    ctx.save();
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.clip();
    drawSpriteFrame(ctx, sheet, facing, sx, sy, dw, dh);
    ctx.restore();

    // Ring
    ctx.strokeStyle = isAlly
      ? (selected ? '#f0c040' : 'rgba(180,200,220,0.55)')
      : (selected ? '#f0c040' : 'rgba(220,80,80,0.55)');
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.stroke();
  } else {
    // ── Fallback: colored circle + emoji ──
    ctx.fillStyle = fillColor + 'cc';
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = isAlly ? (selected ? '#f0c040' : '#aabbcc55') : '#ff444455';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.font = `${cs * 0.38}px serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(isAlly ? CLASSES[unit.class]?.emoji || '🥷' : unit.emoji, cx, cy);
  }

  // ── HP bar ──
  const barW = cs * 0.76;
  const barH = Math.max(3, cs * 0.07);
  const barX = cx - barW / 2;
  const barY = py + cs - barH - 2;
  const hpPct = unit.hp / unit.maxHp;
  ctx.fillStyle = 'rgba(0,0,0,0.65)';
  ctx.fillRect(barX - 1, barY - 1, barW + 2, barH + 2);
  ctx.fillStyle = hpPct > 0.5 ? '#3daa7d' : hpPct > 0.25 ? '#ddaa00' : '#e74c3c';
  ctx.fillRect(barX, barY, barW * hpPct, barH);

  // ── Status badge ──
  const badges = [];
  if (unit.status === 'poisoned') badges.push('☠');
  else if (unit.status === 'stunned') badges.push('💫');
  else if (unit.status === 'confused') badges.push('❓');
  else if (unit.status === 'blinded') badges.push('🌫');
  if (unit.bleeds > 0) badges.push('🩸');
  if (badges.length) {
    ctx.font = `${cs * 0.22}px serif`;
    ctx.textAlign = 'right'; ctx.textBaseline = 'top';
    ctx.fillText(badges.join(''), px + cs - 2, py + 2);
  }
}

// ===== COMBAT INTERACTION =====

function selectAlly(gridId) {
  if (CS.phase !== 'player') return;
  // Allow clicking doomed allies to remind player to use items
  const clicked = CS.allies.find(a => a.gridId === gridId);
  if (clicked && clicked.doomed && clicked.gridId !== CS.activeUnit) {
    toast(clicked.name + ' is DYING (' + clicked.doomCountdown + ' turns)! Use a healing item to revive!', 'error');
    return;
  }
  if (gridId && gridId !== CS.activeUnit) return;
  CS.selectedAlly = gridId;
  CS.selectedAction = null;
  CS.highlightedTiles = [];
  document.getElementById('actionLabel').textContent = '';
  renderCombat();
}

const FACING_LABEL = { south: '↓ South', east: '→ East', west: '← West', north: '↑ North' };

function setFacing(dir) {
  const ally = CS.allies.find(a => a.gridId === CS.activeUnit);
  if (!ally || ally.hp <= 0 || CS.phase !== 'player' || ally.gridId !== CS.activeUnit) return;
  ally.facing = dir;
  syncFacingUI(dir);
  drawCanvas();
}

function syncFacingUI(dir) {
  ['north','south','east','west'].forEach(d => {
    const btn = document.getElementById('facing' + d.charAt(0).toUpperCase() + d.slice(1));
    if (btn) btn.classList.toggle('active', d === dir);
  });
  const lbl = document.getElementById('facingLabel');
  if (lbl) lbl.textContent = dir ? ('Facing ' + FACING_LABEL[dir]) : '';
}

function setAction(action) {
  if (CS.phase !== 'player' || !CS.activeUnit) return;
  const ally = CS.allies.find(a => a.gridId === CS.activeUnit);
  if (!ally || ally.hp <= 0) return;

  CS.selectedAction = action;
  CS.highlightedTiles = [];

  const label = { move: '⊕ Click tile to Move', attack: '⚔ Click enemy to Attack', special: `✦ ${ally.specialMove.name} — click target`, item: '⊛ Using item...' };
  document.getElementById('actionLabel').textContent = label[action] || '';

  if (action === 'move') {
    const range = getEffectiveMoveRange(ally);
    CS.highlightedTiles = getReachableTiles(ally.x, ally.y, range, ally.gridId);
  } else if (action === 'attack') {
    const range = ally.weapon?.range || 1;
    CS.highlightedTiles = getAttackTiles(ally.x, ally.y, range);
  } else if (action === 'special') {
    const range = ally.weapon?.range || 2;
    CS.highlightedTiles = getAttackTiles(ally.x, ally.y, range + 1);
  } else if (action === 'item') {
    useItem(ally);
  }

  renderCombat();
}


function buildEnemySpriteImg(typeKey, emoji, size) {
  const src = getEnemySpriteDataURL(typeKey, size);
  if (!src) return '<span style="font-size:' + (size * 0.7) + 'px">' + emoji + '</span>';
  return '<img src="' + src + '" width="' + size + '" height="' + size + '" style="border-radius:50%;border:1px solid rgba(220,80,80,0.45);object-fit:cover">';
}

function buildEnemySpriteImgLg(typeKey, emoji, size) {
  const src = getEnemySpriteDataURL(typeKey, size);
  if (!src) return '<span style="font-size:' + Math.round(size * 0.8) + 'px">' + emoji + '</span>';
  return '<img src="' + src + '" width="' + size + '" height="' + size + '" style="border-radius:4px;border:1px solid rgba(255,255,255,0.1);object-fit:cover">';
}

// Bresenham line-of-sight check — returns false if a wall blocks the path between two tiles.
// Tiles on non-passable terrain block LoS; forest/rubble do NOT (they're concealing, not blocking).
function hasLineOfSight(x1, y1, x2, y2) {
  if (x1 === x2 && y1 === y2) return true;
  const dx = Math.abs(x2 - x1), dy = Math.abs(y2 - y1);
  const sx = x1 < x2 ? 1 : -1, sy = y1 < y2 ? 1 : -1;
  let err = dx - dy;
  let cx = x1, cy = y1;
  while (true) {
    // Don't check the start or end tile themselves
    if (!(cx === x1 && cy === y1) && !(cx === x2 && cy === y2)) {
      const tile = CS.grid?.[cy]?.[cx];
      if (tile && tile !== 'empty' && tile !== 'exit' && tile !== 'forest' && tile !== 'rubble') {
        return false; // wall blocks LoS
      }
    }
    if (cx === x2 && cy === y2) break;
    const e2 = 2 * err;
    if (e2 > -dy) { err -= dy; cx += sx; }
    if (e2 <  dx) { err += dx; cy += sy; }
  }
  return true;
}

function getReachableTiles(startX, startY, range, excludeId) {
  const tiles = [];
  for (let dy = -range; dy <= range; dy++) {
    for (let dx = -range; dx <= range; dx++) {
      if (Math.abs(dx) + Math.abs(dy) <= range) {
        const nx = startX + dx, ny = startY + dy;
        if (isPosEmpty(nx, ny, excludeId)) {
          tiles.push({ x: nx, y: ny, color: 'rgba(61,170,125,0.25)' });
        }
      }
    }
  }
  return tiles;
}

function getAttackTiles(cx, cy, range) {
  const tiles = [];
  CS.enemies.filter(e => e.hp > 0).forEach(e => {
    const dist = Math.abs(e.x - cx) + Math.abs(e.y - cy);
    if (dist <= range && hasLineOfSight(cx, cy, e.x, e.y))
      tiles.push({ x: e.x, y: e.y, color: 'rgba(192,57,43,0.3)' });
  });
  CS.allies.filter(a => a.hp > 0).forEach(a => {
    const dist = Math.abs(a.x - cx) + Math.abs(a.y - cy);
    if (dist <= range && a.gridId !== CS.activeUnit && hasLineOfSight(cx, cy, a.x, a.y))
      tiles.push({ x: a.x, y: a.y, color: 'rgba(61,170,125,0.2)' });
  });
  return tiles;
}

document.getElementById('combatCanvas').addEventListener('click', function(e) {
  if (CS.phase !== 'player' || !CS.selectedAction || !CS.activeUnit) return;
  const rect = this.getBoundingClientRect();
  // Use rendered display size for accurate touch coords
  const gx = Math.floor((e.clientX - rect.left) / (rect.width / CS.gridW));
  const gy = Math.floor((e.clientY - rect.top) / (rect.height / CS.gridH));

  const ally = CS.allies.find(a => a.gridId === CS.activeUnit);
  if (!ally || ally.hp <= 0) return;

  if (CS.selectedAction === 'move') {
    handleMove(ally, gx, gy);
  } else if (CS.selectedAction === 'attack') {
    handleAttack(ally, gx, gy);
  } else if (CS.selectedAction === 'special') {
    handleSpecial(ally, gx, gy);
  }
});

// Touch support for canvas
document.getElementById('combatCanvas').addEventListener('touchstart', function(e) {
  e.preventDefault();
  const touch = e.touches[0];
  this.dispatchEvent(new MouseEvent('click', {
    clientX: touch.clientX, clientY: touch.clientY, bubbles: true
  }));
}, { passive: false });

function handleMove(ally, tx, ty) {
  if (CS.unitMoved) { toast('Already moved this turn.', 'error'); return; }
  const reachable = CS.highlightedTiles.find(t => t.x === tx && t.y === ty);
  if (!reachable) { toast('Cannot move there.', 'error'); return; }

  // Snapshot position for undo (before any side-effects)
  CS.savedMove = { x: ally.x, y: ally.y, facing: ally.facing };

  // Auto-update facing based on movement direction
  const dx = tx - ally.x, dy = ty - ally.y;
  if (Math.abs(dx) >= Math.abs(dy)) {
    ally.facing = dx > 0 ? 'east' : 'west';
  } else {
    ally.facing = dy > 0 ? 'south' : 'north';
  }
  ally.x = tx; ally.y = ty;
  CS.unitMoved = true;
  CS.selectedAction = null;
  CS.highlightedTiles = [];
  addLog(`${ally.name} moves to (${tx},${ty}).`);

  // ── RESCUE: prisoner follows the ally who freed them ──
  if (CS.prisoner && CS.prisoner.freed && CS.prisonerFreed) {
    // Prisoner moves to where the ally just came from (one step behind)
    const _prevX = ally.x - (tx - ally.x);  // ally.x is already updated, recalculate old pos
    // Simpler: prisoner just snaps to adjacent-to-ally in direction ally came from
    // We stored ally's old pos before move — we need to track it
    // Instead: prisoner moves toward ally each time any ally moves
    const _distP = Math.abs(CS.prisoner.x - ally.x) + Math.abs(CS.prisoner.y - ally.y);
    if (_distP > 1) {
      // Step prisoner one tile toward this ally
      const _pdx = Math.sign(ally.x - CS.prisoner.x);
      const _pdy = Math.sign(ally.y - CS.prisoner.y);
      if (Math.abs(ally.x - CS.prisoner.x) >= Math.abs(ally.y - CS.prisoner.y)) {
        CS.prisoner.x += _pdx;
      } else {
        CS.prisoner.y += _pdy;
      }
    }
  }

  // ── DOOM BAG: step on a fallen ally's bag to recover it ──
  const doomBag = getDoomBagAt(tx, ty);
  if (doomBag) pickupDoomBag(ally, doomBag);

  // ── RESCUE: key-holder walks onto prisoner tile to free them ──
  if (CS.prisoner && !CS.prisoner.freed && ally.hasLoot
      && tx === CS.prisoner.x && ty === CS.prisoner.y) {
    CS.prisoner.freed = true;
    CS.prisonerFreed = true;
    ally.hasLoot = false;       // key consumed
    CS.allyWithLoot = null;
    CS.exitsActive = true;
    CS.objectivePhase = 'extract';
    addLog('⛓ Prisoner freed! Guide them to the exit!', 'system');
    toast('Prisoner freed — reach the exit!', 'success');
    // Spawn reinforcements on prisoner freed
    spawnReinforcements('rescue_freed');
    renderCombat();
    // DON'T return — let unitMoved stay true so turn can be ended normally
  }

  // ── THEFT: step on dropped loot to pick it up ──
  if (CS.lootOnFloor && tx === CS.lootOnFloor.x && ty === CS.lootOnFloor.y) {
    ally.hasLoot = true;
    CS.allyWithLoot = ally.gridId;
    const lootName = CS.lootOnFloor.name;
    CS.lootOnFloor = null;
    // Activate exits now that loot is secured
    CS.exitsActive = true;
    addLog(`${ally.name} picks up the ${lootName}! Reach the exit!`, 'system');
    toast(`${lootName} secured — reach the exit!`, 'success');
  }

  // ── ESCAPE: step onto active exit tile ──
  const onExit = CS.exitTiles.some(e => e.x === tx && e.y === ty);
  if (onExit && CS.exitsActive && !CS.alliesEscaped.includes(ally.gridId)) {
    CS.alliesEscaped.push(ally.gridId);
    ally.escaped = true;

    // If on rescue floor, prisoner exits with this ally if freed
    if (CS.prisonerFreed && CS.prisoner && CS.prisoner.freed) {
      CS.prisoner.escaped = true;
      addLog(`✓ ${ally.name} escapes with the prisoner!`, 'system');
      CS.objectivePhase = 'done';
    } else if (ally.gridId === CS.allyWithLoot) {
      CS.objectivePhase = 'done';
      addLog(`✓ ${ally.name} escapes with the loot!`, 'system');
    } else {
      addLog(`✓ ${ally.name} reaches the exit!`, 'system');
    }
    toast(`${ally.name} escaped!`, 'success');

    // Multi-floor: advance when all alive allies escaped
    const _mission = CS.mission;
    const _isMulti = !!(_mission.floors && _mission.floors.length > 1);
    const _isLastFloor = !_isMulti || CS.currentFloor >= CS.totalFloors - 1;
    if (_isMulti && !_isLastFloor) {
      const _remaining = CS.allies.filter(a => isAllyAlive(a) && !a.escaped);
      if (_remaining.length === 0) setTimeout(advanceFloor, 600);
    } else {
      checkCombatEnd();
    }
  }

  renderCombat();
}

// Apply on-hit weapon effects (bleed, stun, poison, armor_break, stun_chance)
function applyWeaponEffect(weapon, target) {
  if (!weapon || !weapon.effect || !target || target.hp <= 0) return;

  const effect = weapon.effect;
  const name = weapon.name;

  if (effect === 'bleed' && weapon.bleedDmg) {
    // Stack bleed — store highest bleedDmg
    const existing = target.bleeds || 0;
    target.bleeds = Math.max(existing, weapon.bleedDmg);
    target.bleedTurns = 3;
    addLog(`\u{1FA78} ${target.name} is bleeding! (${target.bleeds} HP/turn)`, 'damage');
  }

  if (effect === 'stun' || (effect === 'stun_chance' && Math.random() < (weapon.stunChance || 0.25))) {
    target.status = 'stunned';
    target.stunTurns = weapon.stunTurns || 1;
    addLog(`\u{1F4AB} ${target.name} is stunned by ${name}!`, 'special');
  }

  if (effect === 'armor_break') {
    // Remove one armor_passive buff if present
    if (target.buffs) {
      const idx = target.buffs.findIndex(b => b.type === 'armor_passive');
      if (idx !== -1) {
        target.buffs.splice(idx, 1);
        addLog(`\u{1F6E1} ${name} shatters ${target.name}'s armor!`, 'special');
      }
    }
  }

  // Secondary effect
  if (weapon.secondEffect) {
    if (weapon.secondEffect === 'poison' && target.status !== 'poisoned') {
      target.status = 'poisoned';
      addLog(`☠ ${target.name} is poisoned by ${name}!`, 'special');
    }
    if (weapon.secondEffect === 'stun_chance' && Math.random() < (weapon.stunChance || 0.3)) {
      target.status = 'stunned';
      target.stunTurns = 1;
      addLog(`\u{1F4AB} ${target.name} is stunned!`, 'special');
    }
  }
}

function handleAttack(ally, tx, ty) {
  if (CS.unitActed) { toast('Already acted this turn.', 'error'); return; }
  const target = CS.enemies.find(e => e.x === tx && e.y === ty && e.hp > 0);
  if (!target) { toast('No valid target there.', 'error'); return; }

  // Check weapon usable (empty quiver etc.)
  if (ally.weapon && !weaponUsable(ally)) {
    toast(ally.weapon.name + ' is out of ammo / unusable!', 'error'); return;
  }

  const range = ally.weapon?.range || 1;
  const dist = Math.abs(target.x - ally.x) + Math.abs(target.y - ally.y);
  if (dist > range) { toast('Out of range.', 'error'); return; }

  // Face toward target
  const adx = target.x - ally.x, ady = target.y - ally.y;
  if (Math.abs(adx) >= Math.abs(ady)) ally.facing = adx > 0 ? 'east' : 'west';
  else ally.facing = ady > 0 ? 'south' : 'north';

  const dmg = calcDamage(ally, target);
  applyDamage(target, dmg, ally.name);
  applyWeaponEffect(ally.weapon, target);  // bleed, stun, poison etc.
  consumeWeaponUse(ally);
  CS.unitActed = true;
  CS.savedMove = null;  // action taken — can no longer undo move
  CS.selectedAction = null;
  CS.highlightedTiles = [];
  giveJP(ally, target.hp <= 0 ? JP_AWARDS.kill + JP_AWARDS.attack : JP_AWARDS.attack, 'attack');
  // On-hit poison check from support ability
  checkOnHitPoison(ally, target);
  checkCombatEnd();
  renderCombat();
  if (CS.unitMoved && CS.unitActed) setTimeout(finishAllyTurn, 400);
}

function handleSpecial(ally, tx, ty) {
  if (CS.unitActed) { toast('Already acted this turn.', 'error'); return; }
  const move = ally.specialMove;
  if (ally.chi < move.chi) { toast(`Not enough Chi. Need ${move.chi}.`, 'error'); return; }

  ally.chi = Math.max(0, ally.chi - move.chi);
  CS.unitActed = true;
  CS.savedMove = null;
  CS.selectedAction = null;
  CS.highlightedTiles = [];

  const target = CS.enemies.find(e => e.x === tx && e.y === ty && e.hp > 0);
  const allyTarget = CS.allies.find(a => a.x === tx && a.y === ty && a.hp > 0 && a.gridId !== ally.gridId);

  // Face toward clicked tile
  const sfx = tx - ally.x, sfy = ty - ally.y;
  if (sfx !== 0 || sfy !== 0) {
    if (Math.abs(sfx) >= Math.abs(sfy)) ally.facing = sfx > 0 ? 'east' : 'west';
    else ally.facing = sfy > 0 ? 'south' : 'north';
  }

  executeSpecial(ally, move, target, allyTarget);
  checkCombatEnd();
  renderCombat();
  giveJP(ally, JP_AWARDS.special, 'special');
  if (CS.unitMoved && CS.unitActed) setTimeout(finishAllyTurn, 400);
}

function executeSpecial(caster, move, target, allyTarget) {
  switch (move.effect) {
    case 'triple_dmg':
      if (target) { const d = calcDamage(caster, target) * 3; applyDamage(target, d, caster.name); addLog(`✦ ${move.name}: ${d} damage!`, 'special'); } break;
    case 'heavy_strike':
      if (target) { const d = Math.floor(calcDamage(caster, target) * 2.5); applyDamage(target, d, caster.name); addLog(`✦ ${move.name}: ${d} damage!`, 'special'); } break;
    case 'spin_attack':
      CS.enemies.filter(e => e.hp > 0).forEach(e => {
        if (Math.abs(e.x - caster.x) <= 1 && Math.abs(e.y - caster.y) <= 1) {
          const d = calcDamage(caster, e); applyDamage(e, d, caster.name);
        }
      });
      addLog(`✦ ${move.name}: hits all nearby enemies!`, 'special'); break;
    case 'aoe_thrown': {
      // Level-scaled base damage — works with or without a thrown weapon equipped
      const _aoeBaseDmg = 8 + (caster.level || 1) * 3;
      const hitsAoe = CS.enemies.filter(e => e.hp > 0 && Math.abs(e.x - caster.x) <= 2 && Math.abs(e.y - caster.y) <= 2);
      if (hitsAoe.length === 0) { addLog('✦ ' + move.name + ': no enemies in range!', 'system'); break; }
      hitsAoe.forEach(e => {
        const d = Math.floor((caster.weapon && weaponUsable(caster) ? calcDamage(caster, e) : _aoeBaseDmg) * 0.5);
        applyDamage(e, Math.max(1, d), caster.name);
      });
      if (caster.weapon && weaponUsable(caster)) consumeWeaponUse(caster, hitsAoe.length);
      addLog('✦ ' + move.name + ': ' + hitsAoe.length + ' target' + (hitsAoe.length > 1 ? 's' : '') + ' hit!', 'special'); break;
    }
    case 'poison':
      if (target) { target.status = 'poisoned'; addLog(`✦ ${move.name}: ${target.name} poisoned!`, 'special'); } break;
    case 'stun':
      if (target) { target.status = 'stunned'; addLog(`✦ ${move.name}: ${target.name} stunned!`, 'special'); } break;
    case 'confuse':
      if (target) { target.status = 'confused'; addLog(`✦ ${move.name}: ${target.name} confused!`, 'special'); } break;
    case 'paralyze':
      if (target) { target.status = 'stunned'; addLog(`✦ ${move.name}: ${target.name} paralyzed!`, 'special'); } break;
    case 'heal_ally': {
      const healTarget = allyTarget || caster;
      if (healTarget.doomed) {
        reviveAlly(healTarget, 30);
        addLog('✦ ' + move.name + ': ' + healTarget.name + ' revived!', 'heal');
      } else {
        const h = 30; healTarget.hp = Math.min(healTarget.maxHp, healTarget.hp + h);
        addLog('✦ ' + move.name + ': ' + healTarget.name + ' healed ' + h + ' HP.', 'heal');
      }
      break; }
    case 'chi_bolt':
    case 'void_bolt':
      if (target) { const d = 25 + Math.floor(Math.random() * 15); applyDamage(target, d, caster.name); addLog(`✦ ${move.name}: ${d} chi damage!`, 'special'); } break;
    case 'life_drain':
      if (target) { const d = 20; applyDamage(target, d, caster.name); caster.hp = Math.min(caster.maxHp, caster.hp + d); addLog(`✦ ${move.name}: drained ${d} HP!`, 'special'); } break;
    case 'multi_thrown': {
      const _multiBaseDmg = 10 + (caster.level || 1) * 4;
      const _multiTargets = CS.enemies.filter(e => e.hp > 0);
      if (!_multiTargets.length) { addLog('✦ ' + move.name + ': no enemies!', 'system'); break; }
      let hits = 0;
      for (let i = 0; i < 5; i++) {
        const _alive = CS.enemies.filter(e => e.hp > 0);
        if (!_alive.length) break;
        const e = _alive[Math.floor(Math.random() * _alive.length)];
        const d = Math.floor((caster.weapon && weaponUsable(caster) ? calcDamage(caster, e) : _multiBaseDmg) * 0.65);
        applyDamage(e, Math.max(1, d), caster.name); hits++;
      }
      if (hits && caster.weapon && weaponUsable(caster)) consumeWeaponUse(caster, hits);
      addLog('✦ ' + move.name + ': ' + hits + ' shurikens fly!', 'special'); break;
    }
    case 'rage':
      caster.buffs.push({ type: 'rage', turns: 2 }); addLog(`✦ ${move.name}: ${caster.name} enters RAGE!`, 'special'); break;
    case 'defend':
      caster.buffs.push({ type: 'defend', turns: 2 }); addLog(`✦ ${move.name}: ${caster.name} hardens!`, 'special'); break;
    case 'iron_body':
      caster.buffs.push({ type: 'iron_body', turns: 2 }); addLog(`✦ ${move.name}: ${caster.name} becomes iron!`, 'special'); break;
    case 'battle_cry':
      CS.allies.forEach(a => { if (a.hp > 0) a.buffs.push({ type: 'damage_up', turns: 2 }); });
      addLog(`✦ ${move.name}: all allies empowered!`, 'special'); break;
    case 'meditate':
      caster.chi = Math.min(caster.maxChi, caster.chi + 5); addLog(`✦ ${move.name}: ${caster.name} restores 5 Chi!`, 'special'); break;
    case 'teleport':
      if (isPosEmpty(tx, ty, caster.gridId)) { caster.x = tx; caster.y = ty; addLog(`✦ ${move.name}: ${caster.name} teleports!`, 'special'); } break;
    case 'execute':
      if (target && target.hp < target.maxHp * 0.3) { applyDamage(target, target.hp, caster.name); addLog(`✦ ${move.name}: EXECUTED!`, 'special'); } break;
    case 'charge':
      if (target) { const d = calcDamage(caster, target) * 1.5; applyDamage(target, Math.floor(d), caster.name); addLog(`✦ ${move.name}: charge hit!`, 'special'); } break;
    case 'stomp':
      CS.enemies.filter(e => e.hp > 0).forEach(e => {
        if (Math.abs(e.x - caster.x) <= 1 && Math.abs(e.y - caster.y) <= 1) {
          e.stamina = Math.max(0, (e.moveRange || 2) - 2); addLog(`${e.name} stumbles!`, 'damage');
        }
      });
      addLog(`✦ ${move.name}: ground shakes!`, 'special'); break;
    case 'bloodlust':
      caster.buffs.push({ type: 'bloodlust', turns: 2 }); addLog(`✦ ${move.name}: bloodlust!`, 'special'); break;
    case 'decoy': case 'invisible': case 'blind_all': case 'mirror': case 'darkness': case 'phase_walk': case 'counter': case 'last_stand': case 'rage':
      addLog(`✦ ${move.name} activated! Effect applied.`, 'special'); break;
    default:
      addLog(`✦ ${move.name} — effect activates!`, 'special');
  }
}

function calcDamage(attacker, defender) {
  const weapon = attacker.weapon;
  let baseDmg;
  if (weapon) {
    baseDmg = weapon.dmg[0] + Math.floor(Math.random() * (weapon.dmg[1] - weapon.dmg[0] + 1));
    const profType = getWeaponProfType(weapon);
    const prof = attacker.proficiency?.[profType] || 1;
    baseDmg = Math.floor(baseDmg * (1 + (prof - 3) * 0.05));
  } else {
    baseDmg = 3 + Math.floor(Math.random() * 5);
  }
  if (attacker.buffs?.some(b => b.type === 'rage' || b.type === 'damage_up')) baseDmg = Math.floor(baseDmg * 2);
  // Support damage bonus (Attack Up ability)
  if (attacker.gridId) baseDmg = Math.floor(baseDmg * getSupportDmgBonus(attacker));

  // Directional bonus on enemy (ally attacking enemy from behind/side)
  if (attacker.gridId && defender && defender.x !== undefined) {
    const dirMult = getDirDamageMult(defender, attacker.x, attacker.y);
    if (dirMult !== 1) baseDmg = Math.round(baseDmg * dirMult);
  }
  if (defender.buffs?.some(b => b.type === 'defend' || b.type === 'iron_body')) baseDmg = Math.floor(baseDmg * 0.33);
  // Armor passive: apply reduction while durability > 0
  const armorBuff = defender.buffs?.find(b => b.type === 'armor_passive');
  if (armorBuff) {
    if (armorBuff.effect === 'armor' || armorBuff.effect === 'shadow_armor') {
      baseDmg = Math.floor(baseDmg * (1 - armorBuff.value / 100));
    }
  }
  return Math.max(1, baseDmg);
}

function getWeaponProfType(weapon) {
  const type = weapon.type || Object.keys(WEAPONS).find(k => WEAPONS[k].items.find(i => i.id === weapon.id));
  return type || 'blades';
}

// ── REINFORCEMENT SYSTEM ──
// Returns how many reinforcements to send based on current arc
function getReinforcementCount() {
  const curArc = getCurrentArc();
  return curArc ? curArc.arc : 1;  // Arc 1=1, Arc 2=2, ... Arc 5=5
}

// Spawn reinforcement enemies from the right-side "door" tile
// trigger: 'loot_dropped' | 'rescue_freed'
function spawnReinforcements(trigger) {
  const mission = CS.mission;
  // Only on rescue (floor 1 key drop / floor 2 freed) and theft loot drop
  const isRescue = mission?.type === 'rescue' || CS.mission?.floors?.[CS.currentFloor]?.isRescueFloor;
  const isTheft  = mission?.type === 'theft';
  if (!isRescue && !isTheft) return;

  const count = getReinforcementCount();
  if (count <= 0) return;

  // Pick a reinforcement enemy type from living enemies or use 'guard' fallback
  const aliveTypes = CS.enemies.filter(e => e.hp > 0).map(e => e.type);
  const baseType = aliveTypes.length ? aliveTypes[Math.floor(Math.random() * aliveTypes.length)] : 'guard';
  const type = ENEMY_TYPES[baseType] || ENEMY_TYPES.guard;

  addLog('⚠ Reinforcements incoming! (' + count + ' enemy' + (count > 1 ? 's' : '') + ')', 'system');
  toast('Reinforcements incoming!', 'error');

  // Spawn from right-edge "door" tiles (top and bottom area on right side)
  const doorX = CS.gridW - 1;
  const doorYs = [1, Math.floor(CS.gridH / 2), CS.gridH - 2];
  let ec = CS.enemies.length;

  for (let i = 0; i < count; i++) {
    const dy = doorYs[i % doorYs.length];
    // Find nearest empty tile on the right edge
    let rx = doorX, ry = dy;
    for (let attempt = 0; attempt < 8; attempt++) {
      if (isPosEmpty(rx, ry, null)) break;
      ry = (ry + 1) % (CS.gridH - 1);
      if (ry < 1) ry = 1;
    }

    const w = spawnEnemyWeapon(baseType, mission.difficulty || 1);
    const ar = w && (w.type === 'ranged' || w.type === 'thrown') ? Math.max(type.attackRange, w.range || 3) : type.attackRange;

    CS.enemies.push({
      id: 'reinforce_' + ec++,
      name: type.name, emoji: type.emoji,
      hp: type.hp, maxHp: type.hp, dmg: [...type.dmg],
      moveRange: type.moveRange, attackRange: ar,
      x: rx, y: ry,
      gold: Math.floor(type.gold * 0.5), exp: Math.floor(type.exp * 0.5),
      ai: type.ai, isBoss: false, isRecruitTarget: false,
      status: null, type: baseType,
      weapon: w, facing: 'west',
      ct: 20 + Math.floor(Math.random() * 30),
      spd: type.spd || 5,
      isReinforcement: true
    });

    // Flash the entry tile briefly
    CS.highlightedTiles.push({ x: rx, y: ry, color: 'rgba(220,50,50,0.5)' });
  }

  renderCombat();
  setTimeout(() => { CS.highlightedTiles = CS.highlightedTiles.filter(t => !CS.enemies.some(e => e.x === t.x && e.y === t.y && e.isReinforcement)); renderCombat(); }, 800);
}

function applyDamage(target, dmg, attackerName = '') {
  target.hp = Math.max(0, target.hp - dmg);
  addLog(`${attackerName ? attackerName + ' → ' : ''}${target.name}: ${dmg} damage. (${target.hp}/${target.maxHp} HP)`, 'damage');
  if (target.hp <= 0) {
    addLog(`${target.name} is defeated!`, 'death');
    recordKill(target); // reputation tracking
    if (target.gold) { GS.gold += target.gold; updateGoldDisplay(); }
    if (target.exp) {
      const ally = CS.allies.find(a => a.gridId === CS.activeUnit);
      if (ally) giveExp(ally, target.exp);
    }
    // ── ASSASSINATION: target killed → open exits ──
    if (target.isTarget) {
      CS.objectivePhase = 'extract';
      CS.exitsActive = true;
      addLog('🎯 TARGET ELIMINATED. Reach the exit!', 'system');
      toast('Target eliminated — escape now!', 'success');
    }
    // ── THEFT/RESCUE: carrier killed → drop loot on floor ──
    if (target.isCarrier && target.carriedLoot) {
      CS.lootOnFloor = { x: target.x, y: target.y, ...target.carriedLoot };
      target.carriedLoot = null;
      addLog('\u{1F4E6} Loot dropped at (' + target.x + ',' + target.y + ')! Move onto it to pick up.', 'system');
      toast('Loot dropped — pick it up!', 'success');
      // Spawn reinforcements when loot drops
      setTimeout(() => spawnReinforcements('loot_dropped'), 400);
    }
  }
}
