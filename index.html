<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NINDO — Shadow Arts</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<style>
:root {
  --ink: #0a0a0f;
  --ink2: #12121a;
  --ink3: #1a1a26;
  --paper: #e8dcc8;
  --paper2: #d4c4a0;
  --blood: #8b1a1a;
  --crimson: #c0392b;
  --crimson-bright: #e74c3c;
  --gold: #c9a227;
  --gold-bright: #f0c040;
  --jade: #2e7d5e;
  --jade-bright: #3daa7d;
  --shadow: #252535;
  --mist: #6b7080;
  --steel: #8899aa;
  --white: #f0e8d8;
  --tier-common: #aabbcc;
  --tier-uncommon: #44cc66;
  --tier-rare: #4488ff;
  --tier-legendary: #aa44ff;
  --tier-epic: #ff8800;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--ink);
  color: var(--white);
  font-family: 'Crimson Text', serif;
  font-size: 16px;
  min-height: 100vh;
  overflow-x: hidden;
  background-image:
    radial-gradient(ellipse at 20% 80%, rgba(139,26,26,0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(42,42,70,0.3) 0%, transparent 50%);
}

#app { min-height: 100vh; position: relative; }

.screen { display: none; min-height: 100vh; animation: fadeIn 0.3s ease; }
.screen.active { display: block; min-height: 100vh; }
#screen-menu.active { display: flex; }
#screen-hub.active { display: flex; }
#screen-combat.active { display: flex; }
#screen-create.active { display: flex; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--ink2); }
::-webkit-scrollbar-thumb { background: var(--blood); border-radius: 3px; }

/* ===== TYPOGRAPHY ===== */
h1, h2, h3 { font-family: 'Cinzel Decorative', serif; letter-spacing: 0.05em; }
h4, h5, .label { font-family: 'Cinzel', serif; letter-spacing: 0.08em; }

/* ===== MAIN MENU ===== */
#screen-menu {
  align-items: center; justify-content: center; flex-direction: column;
  position: relative; overflow: hidden;
}
.menu-bg {
  position: absolute; inset: 0; overflow: hidden;
}
.menu-bg-kanji {
  position: absolute; font-size: 20vw; color: rgba(139,26,26,0.04);
  font-family: serif; user-select: none; line-height: 1;
}
.menu-bg-kanji:nth-child(1) { top: -5%; left: -5%; transform: rotate(-15deg); }
.menu-bg-kanji:nth-child(2) { top: 30%; right: -3%; transform: rotate(10deg); font-size: 15vw; color: rgba(201,162,39,0.03); }
.menu-bg-kanji:nth-child(3) { bottom: -5%; left: 20%; transform: rotate(5deg); font-size: 25vw; color: rgba(30,30,50,0.3); }

.menu-seal {
  width: 120px; height: 120px; border: 3px solid var(--blood);
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 60px; margin-bottom: 1.5rem; position: relative;
  box-shadow: 0 0 30px rgba(192,57,43,0.3), inset 0 0 30px rgba(139,26,26,0.1);
  animation: sealPulse 3s ease-in-out infinite;
}
@keyframes sealPulse {
  0%, 100% { box-shadow: 0 0 30px rgba(192,57,43,0.3), inset 0 0 30px rgba(139,26,26,0.1); }
  50% { box-shadow: 0 0 60px rgba(192,57,43,0.5), inset 0 0 40px rgba(139,26,26,0.2); }
}
.menu-seal::before {
  content: ''; position: absolute; inset: 5px; border-radius: 50%;
  border: 1px solid rgba(201,162,39,0.3);
}

.menu-title {
  font-family: 'Cinzel Decorative', serif;
  font-size: clamp(3rem, 8vw, 6rem); font-weight: 900;
  color: var(--white); letter-spacing: 0.15em;
  text-shadow: 0 0 40px rgba(192,57,43,0.5), 0 4px 0 rgba(0,0,0,0.5);
  margin-bottom: 0.3rem;
}
.menu-subtitle {
  font-family: 'Cinzel', serif; font-size: 0.9rem; letter-spacing: 0.4em;
  color: var(--gold); text-transform: uppercase; margin-bottom: 3rem;
}
.menu-line {
  width: 200px; height: 1px; background: linear-gradient(90deg, transparent, var(--blood), transparent);
  margin-bottom: 3rem;
}
.menu-options { display: flex; flex-direction: column; gap: 0.8rem; width: 280px; z-index: 1; }
.menu-btn {
  background: transparent; border: 1px solid rgba(201,162,39,0.2);
  color: var(--white); font-family: 'Cinzel', serif; font-size: 0.85rem;
  letter-spacing: 0.2em; padding: 0.9rem 2rem; cursor: pointer;
  transition: all 0.2s; position: relative; text-transform: uppercase;
  clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
}
.menu-btn::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(139,26,26,0) 0%, rgba(139,26,26,0) 100%);
  transition: all 0.2s;
  clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
}
.menu-btn:hover { border-color: var(--gold); color: var(--gold); letter-spacing: 0.3em; }
.menu-btn:hover::before { background: linear-gradient(135deg, rgba(139,26,26,0.3) 0%, rgba(139,26,26,0.1) 100%); }
.menu-btn.primary { border-color: var(--blood); background: rgba(139,26,26,0.15); }
.menu-btn.primary:hover { background: rgba(139,26,26,0.3); }

/* ===== HUB ===== */
#screen-hub { flex-direction: column; }

.hub-nav {
  background: var(--ink2); border-bottom: 1px solid rgba(201,162,39,0.15);
  display: flex; align-items: center; padding: 0 1.5rem; height: 56px; gap: 1rem;
  position: sticky; top: 0; z-index: 100;
}
.hub-logo {
  font-family: 'Cinzel Decorative', serif; font-size: 1.3rem;
  color: var(--gold); letter-spacing: 0.1em; margin-right: auto;
}
.hub-logo span { color: var(--crimson); }
.nav-btn {
  background: transparent; border: 1px solid transparent;
  color: var(--mist); font-family: 'Cinzel', serif; font-size: 0.7rem;
  letter-spacing: 0.15em; padding: 0.4rem 0.9rem; cursor: pointer;
  transition: all 0.2s; text-transform: uppercase;
  clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
}
.nav-btn:hover, .nav-btn.active { border-color: rgba(201,162,39,0.4); color: var(--gold); }
.gold-display {
  font-family: 'Cinzel', serif; font-size: 0.8rem; color: var(--gold);
  background: rgba(201,162,39,0.1); border: 1px solid rgba(201,162,39,0.3);
  padding: 0.3rem 0.8rem; display: flex; align-items: center; gap: 0.4rem;
}

.hub-content { flex: 1; padding: 1.5rem; }
.hub-section { display: none; }
.hub-section.active { display: block; animation: fadeIn 0.2s ease; }

/* ===== CLAN ROSTER ===== */
.section-title {
  font-family: 'Cinzel', serif; font-size: 0.7rem; letter-spacing: 0.4em;
  color: var(--gold); text-transform: uppercase; margin-bottom: 1.5rem;
  display: flex; align-items: center; gap: 1rem;
}
.section-title::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, rgba(201,162,39,0.4), transparent); }

.clan-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }
.ninja-card {
  background: var(--ink2); border: 1px solid rgba(255,255,255,0.06);
  padding: 1.2rem; position: relative; cursor: pointer;
  clip-path: polygon(10px 0%, 100% 0%, calc(100% - 10px) 100%, 0% 100%);
  transition: all 0.2s;
}
.ninja-card:hover { border-color: rgba(201,162,39,0.3); transform: translateY(-2px); }
.ninja-card.training { opacity: 0.6; }
.ninja-card-header { display: flex; align-items: flex-start; gap: 1rem; margin-bottom: 1rem; }
.ninja-avatar {
  width: 52px; height: 52px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.6rem; flex-shrink: 0; border: 2px solid transparent;
}
.ninja-info { flex: 1; }
.ninja-name { font-family: 'Cinzel', serif; font-size: 1rem; color: var(--white); }
.ninja-class { font-size: 0.75rem; color: var(--mist); margin-top: 0.1rem; }
.ninja-level { font-family: 'Cinzel', serif; font-size: 0.7rem; color: var(--gold); margin-top: 0.2rem; }

.stat-bars { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 0.8rem; }
.stat-row { display: flex; align-items: center; gap: 0.6rem; }
.stat-label { font-family: 'Cinzel', serif; font-size: 0.6rem; color: var(--mist); width: 20px; text-align: right; letter-spacing: 0.05em; }
.stat-bar { flex: 1; height: 6px; background: rgba(255,255,255,0.07); border-radius: 3px; overflow: hidden; }
.stat-fill { height: 100%; border-radius: 3px; transition: width 0.4s; }
.stat-fill.hp { background: linear-gradient(90deg, #c0392b, #e74c3c); }
.stat-fill.stamina { background: linear-gradient(90deg, #2e7d5e, #3daa7d); }
.stat-fill.chi { background: linear-gradient(90deg, #2255aa, #4488ff); }
.stat-val { font-size: 0.65rem; color: var(--steel); width: 36px; text-align: right; font-family: monospace; }

.ninja-card-footer { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
.weapon-badge {
  font-size: 0.6rem; font-family: 'Cinzel', serif; letter-spacing: 0.1em;
  padding: 0.2rem 0.5rem; border-radius: 2px; border: 1px solid;
}
.training-badge {
  font-size: 0.6rem; font-family: 'Cinzel', serif; letter-spacing: 0.1em;
  padding: 0.2rem 0.5rem; background: rgba(201,162,39,0.1);
  border: 1px solid rgba(201,162,39,0.3); color: var(--gold);
}
.add-ninja-card {
  background: transparent; border: 1px dashed rgba(255,255,255,0.1);
  padding: 1.2rem; display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 0.5rem; cursor: pointer; min-height: 160px;
  transition: all 0.2s; color: var(--mist);
  clip-path: polygon(10px 0%, 100% 0%, calc(100% - 10px) 100%, 0% 100%);
}
.add-ninja-card:hover { border-color: rgba(201,162,39,0.3); color: var(--gold); }

/* ===== MISSIONS ===== */
.missions-layout { display: grid; grid-template-columns: 1fr 320px; gap: 1.5rem; }
.mission-list { display: flex; flex-direction: column; gap: 0.8rem; }
.mission-card {
  background: var(--ink2); border: 1px solid rgba(255,255,255,0.06);
  padding: 1.2rem; cursor: pointer; transition: all 0.2s;
  clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
  display: flex; gap: 1rem; align-items: flex-start;
}
.mission-card:hover:not(.locked) { border-color: rgba(201,162,39,0.3); transform: translateX(4px); }
.mission-card.locked { opacity: 0.4; cursor: not-allowed; }
.mission-card.completed { opacity: 0.5; }
.mission-type-icon { font-size: 2rem; flex-shrink: 0; width: 44px; text-align: center; }
.mission-details { flex: 1; }
.mission-name { font-family: 'Cinzel', serif; font-size: 0.95rem; color: var(--white); margin-bottom: 0.3rem; }
.mission-desc { font-size: 0.8rem; color: var(--mist); line-height: 1.5; margin-bottom: 0.6rem; }
.mission-meta { display: flex; gap: 0.8rem; align-items: center; flex-wrap: wrap; }
.mission-tag {
  font-size: 0.6rem; font-family: 'Cinzel', serif; letter-spacing: 0.1em;
  padding: 0.2rem 0.5rem; border: 1px solid; border-radius: 1px;
}
.tag-assassination { border-color: var(--blood); color: var(--crimson-bright); }
.tag-theft { border-color: #aa8800; color: #ddaa00; }
.tag-espionage { border-color: #2255aa; color: #4488ff; }
.tag-agitation { border-color: #554400; color: #aa7700; }
.tag-recruit { border-color: var(--jade); color: var(--jade-bright); }
.difficulty-pip { display: inline-flex; gap: 2px; }
.pip { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.1); }
.pip.active { background: var(--gold); }
.mission-reward { font-family: 'Cinzel', serif; font-size: 0.75rem; color: var(--gold); }

.mission-sidebar { background: var(--ink2); border: 1px solid rgba(255,255,255,0.06); padding: 1.2rem; height: fit-content; }
.party-select { margin-top: 1rem; }
.party-slot {
  display: flex; align-items: center; gap: 0.8rem; padding: 0.6rem;
  border: 1px solid rgba(255,255,255,0.05); margin-bottom: 0.5rem;
  background: rgba(0,0,0,0.2); cursor: pointer; transition: all 0.2s;
}
.party-slot:hover { border-color: rgba(201,162,39,0.3); }
.party-slot.selected { border-color: var(--gold); background: rgba(201,162,39,0.05); }
.party-slot-avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1rem; }
.party-slot-info { flex: 1; }
.party-slot-name { font-family: 'Cinzel', serif; font-size: 0.75rem; }
.party-slot-class { font-size: 0.65rem; color: var(--mist); }

/* ===== COMBAT ===== */
#screen-combat { flex-direction: column; }
.combat-layout { display: flex; flex: 1; gap: 0; overflow: hidden; }
.combat-sidebar-left {
  width: 200px; background: var(--ink2); border-right: 1px solid rgba(255,255,255,0.05);
  padding: 0.8rem; overflow-y: auto; flex-shrink: 0;
}
.combat-main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1rem; background: var(--ink); position: relative; overflow: hidden; }
.combat-sidebar-right {
  width: 200px; background: var(--ink2); border-left: 1px solid rgba(255,255,255,0.05);
  padding: 0.8rem; overflow-y: auto; flex-shrink: 0;
}

#combatCanvas {
  border: 2px solid rgba(201,162,39,0.2);
  box-shadow: 0 0 40px rgba(0,0,0,0.8);
  cursor: pointer; display: block;
  image-rendering: pixelated;
}

.combat-header {
  background: var(--ink2); border-bottom: 1px solid rgba(255,255,255,0.05);
  padding: 0.5rem 1rem; display: flex; align-items: center; gap: 1rem;
  font-family: 'Cinzel', serif; font-size: 0.7rem; color: var(--mist);
}
.turn-display { color: var(--gold); font-size: 0.8rem; }
.phase-display { color: var(--steel); }
.combat-controls {
  background: var(--ink2); border-top: 1px solid rgba(255,255,255,0.05);
  padding: 0.7rem 1rem; display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; justify-content: center;
}
.action-btn {
  background: transparent; border: 1px solid rgba(255,255,255,0.1);
  color: var(--white); font-family: 'Cinzel', serif; font-size: 0.65rem;
  letter-spacing: 0.1em; padding: 0.4rem 0.9rem; cursor: pointer;
  transition: all 0.2s; text-transform: uppercase;
  clip-path: polygon(5px 0%, 100% 0%, calc(100% - 5px) 100%, 0% 100%);
}
.action-btn:hover:not(:disabled) { border-color: rgba(201,162,39,0.5); color: var(--gold); }
.action-btn.attack { border-color: rgba(192,57,43,0.4); }
.action-btn.attack:hover { border-color: var(--crimson); color: var(--crimson-bright); }
.action-btn.special { border-color: rgba(68,136,255,0.4); color: #88aaff; }
.action-btn.special:hover { border-color: #4488ff; color: #88aaff; }
.action-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.action-btn.end-turn { border-color: rgba(201,162,39,0.4); color: var(--gold); }

/* CT / ATB queue */
.ct-slot {
  display: flex; flex-direction: column; align-items: center;
  width: 36px; flex-shrink: 0;
  padding: 2px 2px 3px;
  border: 1px solid rgba(255,255,255,0.08);
  font-size: 0.55rem;
}
.ct-slot.active { border-color: var(--gold); background: rgba(201,162,39,0.12); }
.ct-slot.ally { }
.ct-slot.enemy { opacity: 0.85; }
.ct-emoji { font-size: 0.85rem; line-height: 1; }
.ct-name { font-family: 'Cinzel',serif; font-size: 0.44rem; color: var(--mist); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 34px; text-align: center; }
.ct-bar-wrap { width: 30px; height: 3px; background: rgba(255,255,255,0.1); margin-top: 2px; }
.ct-bar-fill { height: 3px; transition: width 0.3s; }

/* CT progress bars in sidebar */
.ctb-row { display: flex; align-items: center; gap: 3px; margin-bottom: 2px; }
.ctb-label { font-size: 0.75rem; width: 16px; flex-shrink: 0; text-align: center; }
.ctb-track { flex: 1; height: 5px; background: rgba(255,255,255,0.08); border-radius: 1px; }
.ctb-fill { height: 5px; border-radius: 1px; transition: width 0.3s; min-width: 1px; }
.ctb-fill.ctb-active { box-shadow: 0 0 4px currentColor; }

@keyframes doom-pulse {
  from { opacity: 1; }
  to   { opacity: 0.45; }
}
.facing-btn {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.12);
  color: var(--steel);
  font-size: 0.55rem;
  width: 18px; height: 18px;
  padding: 0; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}
.facing-btn:hover:not(:disabled) { background: rgba(201,162,39,0.15); border-color: var(--gold); color: var(--gold); }
.facing-btn.active { background: rgba(201,162,39,0.22); border-color: var(--gold); color: var(--gold); }
.facing-btn:disabled { opacity: 0.25; cursor: not-allowed; }

.combatant-card {
  background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.05);
  padding: 0.5rem; margin-bottom: 0.4rem; font-size: 0.7rem;
  cursor: pointer; transition: all 0.15s;
}
.combatant-card.active-turn { border-color: var(--gold); background: rgba(201,162,39,0.05); }
.combatant-card.selected { border-color: var(--jade-bright); }
.combatant-card.dead { opacity: 0.3; }
.combatant-name { font-family: 'Cinzel', serif; font-size: 0.7rem; display: flex; align-items: center; gap: 0.4rem; }
.combatant-mini-hp { height: 3px; border-radius: 2px; background: rgba(255,255,255,0.1); margin-top: 0.3rem; }
.combatant-mini-hp-fill { height: 100%; border-radius: 2px; background: var(--crimson); transition: width 0.3s; }

.combat-log {
  background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.05);
  padding: 0.6rem; height: 120px; overflow-y: auto; margin-top: 0.5rem;
}
.log-entry { font-size: 0.65rem; color: var(--steel); line-height: 1.6; padding: 0.1rem 0; }
.log-entry.damage { color: var(--crimson-bright); }
.log-entry.heal { color: var(--jade-bright); }
.log-entry.special { color: #88aaff; }
.log-entry.system { color: var(--gold); font-family: 'Cinzel', serif; font-size: 0.6rem; letter-spacing: 0.1em; }
.log-entry.death { color: #ff4444; font-weight: bold; }

/* ===== SHOPS ===== */
.shop-layout { display: grid; grid-template-columns: 1fr 300px; gap: 1.5rem; }
.shop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 0.8rem; }
.shop-item {
  background: var(--ink2); border: 1px solid rgba(255,255,255,0.05);
  padding: 1rem; cursor: pointer; transition: all 0.2s;
  clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
}
.shop-item:hover { border-color: rgba(201,162,39,0.3); transform: translateY(-2px); }
.item-tier-bar { height: 2px; width: 100%; margin-bottom: 0.6rem; border-radius: 1px; }
.tier-common .item-tier-bar { background: var(--tier-common); }
.tier-uncommon .item-tier-bar { background: var(--tier-uncommon); }
.tier-rare .item-tier-bar { background: var(--tier-rare); }
.tier-legendary .item-tier-bar { background: var(--tier-legendary); }
.tier-epic .item-tier-bar { background: var(--tier-epic); }
.item-emoji { font-size: 2rem; margin-bottom: 0.4rem; }
.item-name { font-family: 'Cinzel', serif; font-size: 0.85rem; margin-bottom: 0.3rem; }
.tier-common .item-name { color: var(--tier-common); }
.tier-uncommon .item-name { color: var(--tier-uncommon); }
.tier-rare .item-name { color: var(--tier-rare); }
.tier-legendary .item-name { color: var(--tier-legendary); }
.tier-epic .item-name { color: var(--tier-epic); }
.item-stats { font-size: 0.7rem; color: var(--mist); margin-bottom: 0.5rem; line-height: 1.6; }
.item-price { font-family: 'Cinzel', serif; font-size: 0.8rem; color: var(--gold); display: flex; align-items: center; gap: 0.3rem; justify-content: space-between; }

.shop-cart {
  background: var(--ink2); border: 1px solid rgba(255,255,255,0.05);
  padding: 1.2rem; height: fit-content;
}
.cart-item { display: flex; justify-content: space-between; align-items: center; padding: 0.4rem 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.75rem; }
.cart-item-name { font-family: 'Cinzel', serif; }
.remove-btn { background: none; border: none; color: var(--crimson); cursor: pointer; font-size: 0.8rem; }
.buy-btn {
  background: linear-gradient(135deg, rgba(139,26,26,0.3), rgba(139,26,26,0.1));
  border: 1px solid var(--blood); color: var(--white);
  font-family: 'Cinzel', serif; font-size: 0.7rem; letter-spacing: 0.15em;
  padding: 0.6rem 1.5rem; cursor: pointer; transition: all 0.2s; width: 100%; margin-top: 1rem;
  text-transform: uppercase;
}
.buy-btn:hover { background: linear-gradient(135deg, rgba(139,26,26,0.5), rgba(139,26,26,0.2)); }

/* ===== TRAINING ===== */
.training-layout { display: grid; grid-template-columns: 1fr 280px; gap: 1.5rem; align-items: start; }
.training-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 1rem; }
.training-type-card {
  background: var(--ink2); border: 1px solid rgba(255,255,255,0.05);
  padding: 1rem; cursor: pointer; transition: all 0.2s;
}
.training-type-card:hover { border-color: rgba(201,162,39,0.3); }
.training-type-card.selected { border-color: var(--jade); }
.training-type-icon { font-size: 2rem; margin-bottom: 0.5rem; }
.training-type-name { font-family: 'Cinzel', serif; font-size: 0.9rem; margin-bottom: 0.3rem; }
.training-type-desc { font-size: 0.75rem; color: var(--mist); line-height: 1.5; }
.training-type-time { font-family: 'Cinzel', serif; font-size: 0.7rem; color: var(--gold); margin-top: 0.5rem; }

.assign-training-btn {
  background: linear-gradient(135deg, rgba(46,125,94,0.3), rgba(46,125,94,0.1));
  border: 1px solid var(--jade); color: var(--white);
  font-family: 'Cinzel', serif; font-size: 0.7rem; letter-spacing: 0.15em;
  padding: 0.5rem 1.2rem; cursor: pointer; transition: all 0.2s;
  text-transform: uppercase;
}
.assign-training-btn:hover { background: linear-gradient(135deg, rgba(46,125,94,0.5), rgba(46,125,94,0.2)); }

/* ===== EXCHANGE SHOP ===== */
.exchange-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1rem; }
.exchange-card {
  background: var(--ink2); border: 1px solid rgba(201,162,39,0.15);
  padding: 1.5rem; text-align: center; cursor: pointer; transition: all 0.2s;
  clip-path: polygon(10px 0%, 100% 0%, calc(100% - 10px) 100%, 0% 100%);
}
.exchange-card:hover { border-color: var(--gold); transform: translateY(-3px); box-shadow: 0 8px 30px rgba(201,162,39,0.1); }
.exchange-card.featured { border-color: rgba(201,162,39,0.4); background: linear-gradient(135deg, rgba(201,162,39,0.08), var(--ink2)); }
.exchange-gold-amount { font-family: 'Cinzel Decorative', serif; font-size: 2.5rem; color: var(--gold); }
.exchange-bonus { font-size: 0.7rem; color: var(--jade-bright); margin: 0.3rem 0; font-family: 'Cinzel', serif; }
.exchange-price { font-family: 'Cinzel', serif; font-size: 1.1rem; color: var(--white); margin-top: 0.8rem; }
.exchange-note { font-size: 0.6rem; color: var(--mist); margin-top: 1rem; font-style: italic; text-align: center; }

/* ===== CHARACTER CREATE ===== */
#screen-create { align-items: center; justify-content: center; }
.create-panel {
  background: var(--ink2); border: 1px solid rgba(201,162,39,0.15);
  padding: 2rem; max-width: 860px; width: 100%;
  clip-path: polygon(16px 0%, 100% 0%, calc(100% - 16px) 100%, 0% 100%);
}
.create-title { font-family: 'Cinzel Decorative', serif; font-size: 1.8rem; color: var(--gold); margin-bottom: 0.5rem; }
.create-subtitle { font-size: 0.8rem; color: var(--mist); margin-bottom: 2rem; font-family: 'Cinzel', serif; letter-spacing: 0.2em; }
.class-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.8rem; margin-bottom: 1.5rem; }
.class-card {
  background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.05);
  padding: 1rem; cursor: pointer; transition: all 0.2s; text-align: center;
}
.class-card:hover { border-color: rgba(201,162,39,0.3); }
.class-card.selected { border-color: var(--gold); background: rgba(201,162,39,0.05); }
.class-emoji { font-size: 2.5rem; display: block; margin-bottom: 0.5rem; }
.class-name { font-family: 'Cinzel', serif; font-size: 0.85rem; color: var(--white); margin-bottom: 0.3rem; }
.class-desc { font-size: 0.68rem; color: var(--mist); line-height: 1.5; }
.class-stats-mini { display: flex; gap: 0.4rem; margin-top: 0.5rem; justify-content: center; flex-wrap: wrap; }
.mini-stat { font-size: 0.6rem; font-family: 'Cinzel', serif; padding: 0.15rem 0.4rem; border-radius: 2px; }
.mini-stat.hp { background: rgba(192,57,43,0.2); color: #e74c3c; border: 1px solid rgba(192,57,43,0.3); }
.mini-stat.stam { background: rgba(46,125,94,0.2); color: #3daa7d; border: 1px solid rgba(46,125,94,0.3); }
.mini-stat.chi { background: rgba(68,136,255,0.2); color: #88aaff; border: 1px solid rgba(68,136,255,0.3); }

.name-input {
  background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1);
  color: var(--white); font-family: 'Cinzel', serif; font-size: 1.1rem;
  padding: 0.7rem 1rem; width: 100%; margin-bottom: 1.5rem; outline: none;
  letter-spacing: 0.1em;
}
.name-input:focus { border-color: rgba(201,162,39,0.4); }
.name-input::placeholder { color: rgba(255,255,255,0.2); }

.confirm-btn {
  background: linear-gradient(135deg, rgba(139,26,26,0.4), rgba(139,26,26,0.15));
  border: 1px solid var(--blood); color: var(--white);
  font-family: 'Cinzel', serif; font-size: 0.8rem; letter-spacing: 0.2em;
  padding: 0.8rem 2.5rem; cursor: pointer; transition: all 0.2s; text-transform: uppercase;
  clip-path: polygon(10px 0%, 100% 0%, calc(100% - 10px) 100%, 0% 100%);
}
.confirm-btn:hover { background: linear-gradient(135deg, rgba(139,26,26,0.6), rgba(139,26,26,0.3)); letter-spacing: 0.25em; }

/* ===== MODAL ===== */
#codexOverlay::-webkit-scrollbar { width: 6px; }
#codexOverlay::-webkit-scrollbar-track { background: rgba(255,255,255,0.03); }
#codexOverlay::-webkit-scrollbar-thumb { background: rgba(201,162,39,0.3); border-radius: 3px; }

.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.85);
  display: none; align-items: center; justify-content: center; z-index: 1000;
}
.modal-overlay.open { display: flex; animation: fadeIn 0.2s; }
.modal {
  background: var(--ink2); border: 1px solid rgba(201,162,39,0.2);
  padding: 2rem; max-width: 500px; width: 90%;
  clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%);
  animation: slideUp 0.3s ease;
}
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal-title { font-family: 'Cinzel', serif; font-size: 1.2rem; color: var(--gold); margin-bottom: 1rem; }
.modal-body { font-size: 0.85rem; color: var(--mist); line-height: 1.7; margin-bottom: 1.5rem; }
.modal-actions { display: flex; gap: 0.8rem; justify-content: flex-end; }
.modal-btn {
  background: transparent; border: 1px solid rgba(255,255,255,0.15);
  color: var(--white); font-family: 'Cinzel', serif; font-size: 0.7rem;
  letter-spacing: 0.1em; padding: 0.5rem 1.2rem; cursor: pointer; transition: all 0.2s;
}
.modal-btn:hover { border-color: var(--gold); color: var(--gold); }
.modal-btn.danger { border-color: var(--blood); color: var(--crimson-bright); }
.modal-btn.confirm { border-color: var(--jade); color: var(--jade-bright); }

/* ===== NOTIFICATIONS ===== */
.toast {
  position: fixed; top: 80px; right: 20px; z-index: 2000;
  background: var(--ink3); border: 1px solid rgba(201,162,39,0.3);
  padding: 0.8rem 1.2rem; font-family: 'Cinzel', serif; font-size: 0.75rem;
  color: var(--gold); letter-spacing: 0.1em; animation: toastIn 0.3s ease;
  clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
  max-width: 300px;
}
.toast.error { border-color: rgba(192,57,43,0.5); color: var(--crimson-bright); }
.toast.success { border-color: rgba(46,125,94,0.5); color: var(--jade-bright); }
@keyframes toastIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }


/* ===== LOADOUT MODAL ===== */
.loadout-panel { display: grid; grid-template-columns: 1fr 1fr; gap: 1.2rem; margin-top: 0.8rem; }
.loadout-section-title { font-family: "Cinzel", serif; font-size: 0.65rem; letter-spacing: 0.2em; color: var(--gold); text-transform: uppercase; margin-bottom: 0.6rem; display: flex; justify-content: space-between; align-items: center; }
.weapon-choice-list { display: flex; flex-direction: column; gap: 0.3rem; max-height: 200px; overflow-y: auto; }
.weapon-choice-item { display: flex; align-items: center; gap: 0.6rem; padding: 0.45rem 0.6rem; border: 1px solid rgba(255,255,255,0.06); background: rgba(0,0,0,0.2); cursor: pointer; transition: all 0.15s; font-size: 0.72rem; }
.weapon-choice-item:hover { border-color: rgba(201,162,39,0.35); background: rgba(201,162,39,0.05); }
.weapon-choice-item.equipped-now { border-color: rgba(201,162,39,0.6); background: rgba(201,162,39,0.08); }
.weapon-choice-item.unequip-slot { border-color: rgba(255,255,255,0.06); color: var(--mist); }
.wci-tier { width: 3px; border-radius: 2px; align-self: stretch; flex-shrink: 0; }
.wci-info { flex: 1; }
.wci-name { font-family: "Cinzel", serif; font-size: 0.72rem; }
.wci-stats { font-size: 0.6rem; color: var(--mist); }
.carry-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.4rem; margin-bottom: 0.6rem; }
.carry-slot { aspect-ratio: 1; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.07); display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 1px; cursor: pointer; position: relative; transition: all 0.15s; border-radius: 2px; }
.carry-slot:hover { border-color: rgba(192,57,43,0.4); }
.carry-slot.filled { border-color: rgba(201,162,39,0.25); }
.carry-slot-icon { font-size: 1.3rem; line-height: 1; }
.carry-slot-label { font-size: 0.48rem; color: var(--mist); text-align: center; line-height: 1.2; font-family: "Cinzel", serif; padding: 0 2px; }
.carry-slot-remove { position: absolute; top: 1px; right: 2px; font-size: 0.55rem; color: var(--crimson); display: none; }
.carry-slot:hover .carry-slot-remove { display: block; }
.carry-empty { font-size: 1.4rem; opacity: 0.2; }
.stash-item-list { display: flex; flex-direction: column; gap: 0.3rem; max-height: 180px; overflow-y: auto; }
.stash-item { display: flex; align-items: center; gap: 0.6rem; padding: 0.4rem 0.6rem; border: 1px solid rgba(255,255,255,0.06); background: rgba(0,0,0,0.2); cursor: pointer; transition: all 0.15s; font-size: 0.72rem; }
.stash-item:hover { border-color: rgba(61,170,125,0.4); background: rgba(61,170,125,0.04); }
.stash-item.full { opacity: 0.35; cursor: not-allowed; }
.stash-item-icon { font-size: 1.2rem; }
.stash-item-info { flex: 1; }
.stash-item-name { font-family: "Cinzel", serif; font-size: 0.7rem; }
.stash-item-desc { font-size: 0.6rem; color: var(--mist); }
.stash-item-owned { font-size: 0.6rem; color: var(--steel); margin-left: auto; }
.use-item-list { display: flex; flex-direction: column; gap: 0.4rem; }
.use-item-btn { display: flex; align-items: center; gap: 0.7rem; padding: 0.5rem 0.8rem; border: 1px solid rgba(61,170,125,0.25); background: rgba(61,170,125,0.05); cursor: pointer; transition: all 0.15s; }
.use-item-btn:hover { border-color: rgba(61,170,125,0.55); background: rgba(61,170,125,0.1); }
.party-loadout-bar { display: flex; gap: 0.3rem; flex-wrap: wrap; margin-top: 0.3rem; }
.loadout-pip { font-size: 0.65rem; border: 1px solid rgba(255,255,255,0.08); padding: 0.1rem 0.35rem; border-radius: 2px; color: var(--mist); }
.loadout-pip.weapon { border-color: rgba(201,162,39,0.3); color: var(--gold); }
.configure-btn { background: transparent; border: 1px solid rgba(201,162,39,0.25); color: var(--gold); font-family: "Cinzel", serif; font-size: 0.6rem; letter-spacing: 0.1em; padding: 0.2rem 0.6rem; cursor: pointer; margin-left: auto; flex-shrink: 0; transition: all 0.15s; }
.configure-btn:hover { border-color: var(--gold); background: rgba(201,162,39,0.08); }
/* ===== SPECIAL MOVE DISPLAY ===== */
.special-move-info {
  background: rgba(68,136,255,0.05); border: 1px solid rgba(68,136,255,0.2);
  padding: 0.6rem; margin-top: 0.5rem;
}
.special-move-name { font-family: 'Cinzel', serif; font-size: 0.7rem; color: #88aaff; }
.special-move-desc { font-size: 0.65rem; color: var(--mist); margin-top: 0.2rem; }

/* ===== INVENTORY ===== */
.inventory-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.3rem; }
.inv-slot {
  aspect-ratio: 1; background: rgba(0,0,0,0.3);
  border: 1px solid rgba(255,255,255,0.05); display: flex;
  align-items: center; justify-content: center; font-size: 1.2rem;
  cursor: pointer; position: relative; transition: all 0.15s;
}
.inv-slot:hover { border-color: rgba(201,162,39,0.3); }
.inv-slot.equipped { border-color: rgba(201,162,39,0.5); background: rgba(201,162,39,0.05); }
.inv-slot-count { position: absolute; bottom: 1px; right: 2px; font-size: 0.55rem; color: var(--mist); font-family: monospace; }

/* ===== MISC UTILS ===== */
.flex { display: flex; } .gap-1 { gap: 0.5rem; } .gap-2 { gap: 1rem; }
.mt-1 { margin-top: 0.5rem; } .mt-2 { margin-top: 1rem; } .mt-3 { margin-top: 1.5rem; }
.mb-1 { margin-bottom: 0.5rem; } .mb-2 { margin-bottom: 1rem; }
.text-gold { color: var(--gold); } .text-crimson { color: var(--crimson-bright); }
.text-jade { color: var(--jade-bright); } .text-mist { color: var(--mist); }
.text-sm { font-size: 0.75rem; } .text-xs { font-size: 0.65rem; }
.font-cinzel { font-family: 'Cinzel', serif; }
.w-full { width: 100%; }
.separator { height: 1px; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent); margin: 1rem 0; }

/* =============================================
   RESPONSIVE / MOBILE
   ============================================= */

/* Mobile nav bottom bar */
.mobile-nav {
  display: none;
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
  background: var(--ink2); border-top: 1px solid rgba(201,162,39,0.2);
  padding: 0 0 env(safe-area-inset-bottom, 0);
}
.mobile-nav-inner {
  display: flex; align-items: stretch; height: 56px;
}
.mob-nav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 2px; background: none; border: none;
  color: var(--mist); cursor: pointer; font-family: 'Cinzel', serif;
  font-size: 0.48rem; letter-spacing: 0.06em; text-transform: uppercase;
  padding: 4px 0; transition: color 0.15s; border-top: 2px solid transparent;
  -webkit-tap-highlight-color: transparent;
}
.mob-nav-btn .icon { font-size: 1.2rem; line-height: 1; }
.mob-nav-btn.active { color: var(--gold); border-top-color: var(--gold); }
.mob-nav-gold {
  display: none; position: absolute; top: 8px; right: 12px;
  font-family: 'Cinzel', serif; font-size: 0.7rem; color: var(--gold);
  background: rgba(201,162,39,0.1); border: 1px solid rgba(201,162,39,0.3);
  padding: 0.2rem 0.6rem;
}

/* Combat mobile overlay panels */
.combat-panel-toggle {
  display: none; position: absolute; z-index: 10;
  background: var(--ink2); border: 1px solid rgba(201,162,39,0.3);
  color: var(--gold); font-family: 'Cinzel', serif; font-size: 0.6rem;
  letter-spacing: 0.1em; padding: 0.3rem 0.6rem; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.combat-panel-toggle.left { top: 8px; left: 8px; }
.combat-panel-toggle.right { top: 8px; right: 8px; }
.combat-overlay-panel {
  display: none; position: absolute; top: 0; bottom: 0; z-index: 20;
  background: rgba(10,10,18,0.97); width: 220px; overflow-y: auto;
  padding: 0.8rem; border: 1px solid rgba(201,162,39,0.2);
  animation: slideInPanel 0.2s ease;
}
.combat-overlay-panel.left-panel { left: 0; }
.combat-overlay-panel.right-panel { right: 0; }
.combat-overlay-panel.open { display: block; }
@keyframes slideInPanel {
  from { opacity: 0; transform: translateX(-10px); }
  to { opacity: 1; transform: translateX(0); }
}
.close-panel-btn {
  display: block; width: 100%; background: none;
  border: none; border-bottom: 1px solid rgba(255,255,255,0.06);
  color: var(--mist); font-family: 'Cinzel', serif; font-size: 0.6rem;
  text-align: right; padding: 0 0 0.4rem; cursor: pointer; margin-bottom: 0.6rem;
}

@media (max-width: 900px) {
  /* Hub nav — hide text labels, keep icons via data attrs */
  .hub-nav { padding: 0 0.8rem; gap: 0.3rem; height: 48px; }
  .hub-nav .nav-btn { font-size: 0.58rem; padding: 0.35rem 0.5rem; letter-spacing: 0.08em; }
  .hub-logo { font-size: 1rem; }
  .gold-display { font-size: 0.7rem; padding: 0.25rem 0.5rem; }
  .hub-content { padding: 1rem 0.8rem; }
}

@media (max-width: 700px) {
  /* Hide desktop hub nav, show mobile bottom bar */
  .hub-nav .nav-btn, .hub-nav .hub-logo { display: none; }
  .hub-nav { justify-content: flex-end; height: 44px; padding: 0 0.8rem; background: var(--ink2); }
  .gold-display { font-size: 0.75rem; }
  .mobile-nav { display: block; }
  .hub-content { padding: 0.8rem 0.75rem; padding-bottom: 70px; }

  /* Character create */
  .create-panel {
    padding: 1.2rem 1rem; margin: 0;
    clip-path: none; border-radius: 0;
    min-height: 100dvh; overflow-y: auto;
    display: flex; flex-direction: column;
  }
  #screen-create { align-items: flex-start; }
  .create-title { font-size: 1.3rem; }
  .create-subtitle { font-size: 0.7rem; margin-bottom: 1rem; }
  .class-grid { grid-template-columns: repeat(2, 1fr); gap: 0.6rem; margin-bottom: 1rem; }
  .class-card { padding: 0.7rem; }
  .class-emoji { font-size: 1.8rem; }
  .class-name { font-size: 0.78rem; }
  .class-desc { font-size: 0.6rem; }

  /* Clan roster */
  .clan-grid { grid-template-columns: 1fr; gap: 0.8rem; }
  .ninja-card { clip-path: none; }

  /* Missions */
  .missions-layout { grid-template-columns: 1fr; gap: 1rem; }
  .mission-sidebar {
    position: fixed; bottom: 56px; left: 0; right: 0; z-index: 150;
    border-radius: 0; border-left: none; border-right: none; border-bottom: none;
    max-height: 55dvh; overflow-y: auto; padding: 0.8rem;
    background: var(--ink2); border-top: 2px solid rgba(201,162,39,0.25);
    transform: translateY(100%); transition: transform 0.25s ease;
  }
  .mission-sidebar.open { transform: translateY(0); }
  .mission-sidebar-handle {
    display: block; width: 40px; height: 4px; border-radius: 2px;
    background: rgba(255,255,255,0.2); margin: 0 auto 0.8rem;
  }
  .deploy-fab {
    display: flex !important; position: fixed; bottom: 72px; right: 16px; z-index: 160;
    width: 56px; height: 56px; border-radius: 50%;
    background: var(--blood); border: 2px solid rgba(192,57,43,0.6);
    align-items: center; justify-content: center; font-size: 1.4rem;
    box-shadow: 0 4px 20px rgba(139,26,26,0.5); cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  /* Mission card tweak */
  .mission-type-icon { font-size: 1.5rem; width: 32px; }
  .mission-name { font-size: 0.85rem; }
  .mission-desc { font-size: 0.75rem; }

  /* Training */
  .training-grid { grid-template-columns: 1fr 1fr; gap: 0.6rem; }
  .training-layout { grid-template-columns: 1fr !important; }
  .training-sidebar { position: static !important; width: 100% !important; margin-top: 1rem; }

  /* Shops */
  .shop-layout { grid-template-columns: 1fr; gap: 0.8rem; }
  .shop-grid { grid-template-columns: repeat(2, 1fr); gap: 0.6rem; }
  /* Cart always visible inline on mobile — no hidden drawer needed */
  .shop-cart {
    position: static; transform: none; max-height: none;
    border: 1px solid rgba(201,162,39,0.25); border-radius: 0;
    margin-top: 0; padding: 1rem;
  }
  .shop-cart .mission-sidebar-handle { display: none !important; }
  .cart-fab { display: none !important; }

  /* Exchange */
  .exchange-grid { grid-template-columns: repeat(2, 1fr); gap: 0.7rem; }
  .exchange-gold-amount { font-size: 1.8rem; }
  .exchange-card { padding: 1rem; }

  /* Modal - full screen on mobile */
  .modal-overlay { align-items: flex-end; }
  .modal {
    max-width: 100%; width: 100%; max-height: 92dvh; overflow-y: auto;
    border-radius: 0; clip-path: none;
    border-left: none; border-right: none; border-bottom: none;
    border-top: 2px solid rgba(201,162,39,0.3);
    padding: 1.2rem 1rem 1.5rem;
    padding-bottom: calc(1.5rem + env(safe-area-inset-bottom, 0));
    animation: slideUpModal 0.25s ease;
  }
  @keyframes slideUpModal { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-title { font-size: 1rem; }
  .modal-actions { flex-wrap: wrap; gap: 0.5rem; }
  .modal-btn { flex: 1; min-width: 0; text-align: center; padding: 0.6rem 0.5rem; font-size: 0.7rem; }

  /* Loadout modal */

function initWeapon(templateWeapon, typeKey) {
  const w = { ...templateWeapon, type: typeKey };
  w.usesLeft = WEAPON_USES[w.tier] || 20;
  if (typeKey === 'thrown') w.ammo = THROWN_COUNTS[w.tier] || 5;
  if (typeKey === 'ranged') { w.ammo = QUIVER_SIZES[w.tier] || 10; w.quiverEmpty = false; }
  return w;
}

function migrateWeapon(w) {
  if (!w) return w;
  if (w.usesLeft === undefined) w.usesLeft = WEAPON_USES[w.tier] || 20;
  if (!w.type) w.type = Object.keys(WEAPONS).find(k => WEAPONS[k].items.find(i => i.id === w.id)) || 'blades';
  if (w.type === 'thrown' && w.ammo === undefined) w.ammo = THROWN_COUNTS[w.tier] || 5;
  if (w.type === 'ranged' && w.ammo === undefined) { w.ammo = QUIVER_SIZES[w.tier] || 10; w.quiverEmpty = false; }
  return w;
}

function consumeWeaponUse(ally, count) {
  count = count || 1;
  const w = ally.weapon;
  if (!w) return false;
  if (w.type === 'thrown') {
    w.ammo = Math.max(0, (w.ammo || 1) - count);
    if (w.ammo <= 0) {
      addLog(ally.name + "'s " + w.name + " — last projectile used. Destroyed!", 'system');
      ally.weapon = null;
      const gn = GS.clan.find(x => x.id === ally.id);
      if (gn) gn.weapon = null;
      return true;
    }
    return false;
  }
  if (w.type === 'ranged') {
    w.ammo = Math.max(0, (w.ammo || 1) - count);
    if (w.ammo <= 0) {
      w.quiverEmpty = true;
      addLog(ally.name + "'s " + w.name + " — quiver empty! Bow unusable.", 'system');
    }
    return false;
  }
  w.usesLeft = Math.max(0, (w.usesLeft || 1) - count);
  if (w.usesLeft <= 0) {
    addLog(ally.name + "'s " + w.name + " — weapon broken!", 'system');
    ally.weapon = null;
    const gn = GS.clan.find(x => x.id === ally.id);
    if (gn) gn.weapon = null;
    return true;
  }
  return false;
}

function weaponUsable(ally) {
  const w = ally.weapon;
  if (!w) return false;
  if (w.type === 'ranged' && w.quiverEmpty) return false;
  return true;
}

function weaponStatusLabel(w) {
  if (!w) return 'Unarmed';
  if (w.type === 'thrown') return w.ammo + ' left';
  if (w.type === 'ranged') return w.quiverEmpty ? 'Empty quiver' : w.ammo + ' arrows';
  return w.usesLeft + ' uses left';
}

const TERRAIN_NAMES = ['village','castle','dungeon','fortress','palace','docks','forest','keep'];

function generateDynamicMission(seed, difficultyBias, forcedType) {
  const types = Object.keys(MISSION_TEMPLATES);
  const tKey = forcedType && MISSION_TEMPLATES[forcedType]
    ? forcedType
    : types[Math.floor(seed * types.length) % types.length];
  const tmpl = MISSION_TEMPLATES[tKey];

  // Deterministic-ish random from seed
  const r = (n) => { seed = (seed * 1664525 + 1013904223) & 0xffffffff; return Math.abs(seed % n); };

  const nameTemplate = tmpl.names[r(tmpl.names.length)];
  const targetWord = tmpl.targets[r(tmpl.targets.length)];
  const name = nameTemplate.replace('{target}', targetWord);
  const intro = tmpl.intros[r(tmpl.intros.length)];

  const baseDiff = 1 + (difficultyBias % 4);
  const difficulty = Math.min(5, Math.max(1, baseDiff + r(2)));
  const baseReward = 80 + difficulty * 70 + r(difficulty * 40);
  const terrain = TERRAIN_NAMES[r(TERRAIN_NAMES.length)];
  const enemyGroup = tmpl.enemyGroups[r(tmpl.enemyGroups.length)];

  // Scale enemies by difficulty
  const scaledEnemies = enemyGroup.map(g => ({
    type: g.type,
    count: Math.max(1, g.count + Math.floor(difficulty / 2))
  }));

  const requiredLevel = Math.max(1, difficulty - 1);
  const id = 'dyn_' + Math.abs(seed).toString(16).slice(0, 8);

  // Derive objective fields from mission type
  let targetEnemy = null, carrierEnemy = null, lootItem = null, turnLimit = 0;
  if (tKey === 'assassination') {
    const lastGroup = scaledEnemies[scaledEnemies.length - 1];
    if (lastGroup) targetEnemy = lastGroup.type;
  } else if (tKey === 'theft') {
    const carrier = scaledEnemies.find(g => g.type === 'scribe' || g.type === 'advisor');
    if (carrier) {
      carrierEnemy = carrier.type;
      const lootNames = ['Sacred Scroll','War Chest','Poison Formula','Clan Seal','Trade Ledger','Forbidden Map','Jade Cipher','Ancestral Blade'];
      lootItem = { name: lootNames[r(lootNames.length)], icon: ['📜','💰','🧪','🔖','📒','🗺️','💎','⚔️'][r(8)] };
    }
  } else if (tKey === 'espionage') {
    turnLimit = 16 + difficulty * 4;
  } else if (tKey === 'agitation') {
    turnLimit = 20 + difficulty * 4;
  } else if (tKey === 'rescue') {
    // Rescue missions: jailer is the key enemy (carries "keys")
    const jailerGroup = scaledEnemies.find(g => g.type === 'jailer');
    if (jailerGroup) {
      carrierEnemy = 'jailer';
      lootItem = { name: 'Prison Key', icon: '🔑' };
    }
  }

  return {
    id, name, type: tKey,
    desc: `${['A shadow contract has been issued.','Intel from a trusted source.','The clan needs this done.','Urgent — time-sensitive operation.','High-value target identified.'][r(5)]} ${intro}`,
    difficulty, reward: baseReward,
    recruitReward: null,
    requiredLevel,
    enemies: scaledEnemies,
    targetEnemy, carrierEnemy, lootItem,
    turnLimit: turnLimit || 0,
    terrain,
    tags: tmpl.tags,
    intro,
    isDynamic: true
  };
}


// ==========================================
// ===== SHADOW REPUTATION SYSTEM =====
// ==========================================

// Reputation bands:
//   Stealth: -100 (FEARED) ... 0 (NEUTRAL) ... 100 (PHANTOM)
//   Honor:   -100 (RUTHLESS) ... 0 (NEUTRAL) ... 100 (RIGHTEOUS)

const REP_EVENTS = {
  // Stealth
  KILL_UNDETECTED:        { stealth: +8,  honor:  0,  label: 'Silent kill' },
  DETECTED_BEFORE_STRIKE: { stealth: -5,  honor:  0,  label: 'Detected!' },
  MISSION_UNDETECTED:     { stealth: +15, honor: +5,  label: 'Mission: undetected' },
  OBJECTIVE_UNDETECTED:   { stealth: +20, honor: +8,  label: 'Objective: ghost run' },
  ENEMY_ALERTED:          { stealth: -3,  honor:  0,  label: 'Enemy alerted' },
  SMOKE_FLEE:             { stealth: -5,  honor: -5,  label: 'Fled the field' },

  // Honor
  MISSION_SUCCESS:        { stealth:  0,  honor: +10, label: 'Mission completed' },
  MISSION_FAILED:         { stealth:  0,  honor: -8,  label: 'Mission failed' },
  MISSION_TIMED_OUT:      { stealth:  0,  honor: -6,  label: 'Time expired' },
  TARGET_ONLY_KILL:       { stealth: +5,  honor: +12, label: 'Target eliminated precisely' },
  ESCORT_UNDAMAGED:       { stealth:  0,  honor: +15, label: 'Escort protected' },
  RESCUE_SUCCESS:         { stealth: +5,  honor: +12, label: 'Rescue successful' },
  ALLY_PERISHED:          { stealth:  0,  honor: -10, label: 'Ally lost permanently' },
};

function gainRep(eventKey) {
  const ev = REP_EVENTS[eventKey];
  if (!ev) return;
  if (!GS.reputation) GS.reputation = { stealth: 0, honor: 0 };
  GS.reputation.stealth = Math.max(-100, Math.min(100, GS.reputation.stealth + ev.stealth));
  GS.reputation.honor   = Math.max(-100, Math.min(100, GS.reputation.honor   + ev.honor));
  if (ev.stealth !== 0 || ev.honor !== 0) {
    const parts = [];
    if (ev.stealth > 0) parts.push('+' + ev.stealth + ' Stealth');
    if (ev.stealth < 0) parts.push(ev.stealth + ' Stealth');
    if (ev.honor > 0)   parts.push('+' + ev.honor   + ' Honor');
    if (ev.honor < 0)   parts.push(ev.honor   + ' Honor');
    if (parts.length) addLog('\u2605 Rep: ' + ev.label + ' (' + parts.join(', ') + ')', 'system');
  }
}

function getStealthTier() {
  const s = (GS.reputation || {}).stealth || 0;
  if (s >= 80)  return { name: 'Phantom',     color: '#88aaff', icon: '\u{1F47B}', desc: 'You are a ghost. Enemies rarely see you coming.' };
  if (s >= 50)  return { name: 'Shadow',      color: '#6688cc', icon: '\u{1F30D}', desc: 'Your movements are whisper-quiet.' };
  if (s >= 20)  return { name: 'Shinobi',     color: '#5566aa', icon: '\u{1F977}', desc: 'Trained in the ways of stealth.' };
  if (s >= -20) return { name: 'Wanderer',    color: '#888',    icon: '\u{1F6B6}', desc: 'Neither feared nor hidden.' };
  if (s >= -50) return { name: 'Reckless',    color: '#cc6633', icon: '\u{1F525}', desc: 'You leave chaos in your wake.' };
  if (s >= -80) return { name: 'Feared',      color: '#cc3333', icon: '\u{1F480}', desc: 'Enemies attack harder when they see you.' };
  return              { name: 'Terror',       color: '#ff2222', icon: '\u{1F47F}', desc: 'Your name alone strikes fear.' };
}

function getHonorTier() {
  const h = (GS.reputation || {}).honor || 0;
  if (h >= 80)  return { name: 'Righteous',   color: '#ffdd44', icon: '\u{1F31F}', desc: 'A legend of duty and virtue.' };
  if (h >= 50)  return { name: 'Honorable',   color: '#ddaa22', icon: '\u2605',   desc: 'Your word is your bond.' };
  if (h >= 20)  return { name: 'Reliable',    color: '#aabb55', icon: '\u2714',   desc: 'Trusted to deliver results.' };
  if (h >= -20) return { name: 'Mercenary',   color: '#888',    icon: '\u26AA',   desc: 'You work for gold, nothing more.' };
  if (h >= -50) return { name: 'Treacherous', color: '#aa5522', icon: '\u{1F5E1}\uFE0F', desc: 'You cannot be trusted.' };
  if (h >= -80) return { name: 'Ruthless',    color: '#cc2222', icon: '\u{1F480}', desc: 'Victory at any cost.' };
  return              { name: 'Disgraced',    color: '#990000', icon: '\u{1F6AB}', desc: 'Shunned by shadow and light alike.' };
}

// Active combat tracking flags reset at mission start
// CS.missionStats tracks per-mission events for rep calculation
function initMissionStats() {
  CS.missionStats = {
    detectedCount: 0,        // times enemy saw an ally before being hit
    undetectedKills: 0,      // enemies killed without being detected first
    totalKills: 0,
    nonTargetKills: 0,       // kills that weren't the assassination target
    alliesAlerted: false,    // were enemies ever alerted?
  };
}

// Called when an enemy attacks an ally (enemy saw ally before ally struck)
function recordDetection() {
  if (!CS.missionStats) return;
  CS.missionStats.detectedCount++;
  CS.missionStats.alliesAlerted = true;
  gainRep('DETECTED_BEFORE_STRIKE');
}

// Called when ally kills enemy
function recordKill(target) {
  if (!CS.missionStats) return;
  CS.missionStats.totalKills++;
  if (!CS.missionStats.alliesAlerted) {
    CS.missionStats.undetectedKills++;
    gainRep('KILL_UNDETECTED');
  }
  if (CS.mission?.type === 'assassination' && !target.isTarget) {
    CS.missionStats.nonTargetKills++;
  }
}

// Called in endCombat to apply end-of-mission reputation
function applyMissionReputation(result, mission) {
  if (!GS.reputation) GS.reputation = { stealth: 0, honor: 0 };
  const stats = CS.missionStats || {};
  const wasUndetected = !stats.alliesAlerted;

  if (result === 'victory') {
    gainRep('MISSION_SUCCESS');

    // Stealth bonuses
    if (wasUndetected) {
      gainRep('MISSION_UNDETECTED');
      if (mission.type === 'espionage' || mission.type === 'theft') {
        gainRep('OBJECTIVE_UNDETECTED');
      }
    }

    // Honor bonuses per mission type
    if (mission.type === 'assassination' && stats.nonTargetKills === 0 && stats.totalKills <= 1) {
      gainRep('TARGET_ONLY_KILL');
    }
    if (mission.type === 'rescue') {
      gainRep('RESCUE_SUCCESS');
    }

    // Permadeath penalty
    const perished = CS.allies.filter(a => a.perished).length;
    for (let i = 0; i < perished; i++) gainRep('ALLY_PERISHED');

  } else if (result === 'defeat') {
    gainRep('MISSION_FAILED');
  } else if (result === 'timedout') {
    gainRep('MISSION_TIMED_OUT');
  } else if (result === 'fled') {
    gainRep('SMOKE_FLEE');
  }

  saveGame();
}

// ── Reputation combat modifiers ──

// Call in beginUnitTurn or calcDamage to apply stealth/fear bonuses
function getRepCombatMods(ally) {
  const s = (GS.reputation || {}).stealth || 0;
  const mods = { dmgMult: 1, firstStrikeBonus: false, enemyDmgMult: 1 };

  // High stealth: bonus on first strike (ally acts before enemy spots them)
  if (s >= 20 && !CS.missionStats?.alliesAlerted) {
    mods.firstStrikeBonus = true; // +25% dmg on undetected attacks
    mods.dmgMult *= 1.25;
  }
  if (s >= 50 && !CS.missionStats?.alliesAlerted) {
    mods.dmgMult *= 1.15; // stack further
  }

  // Fear (negative stealth): enemies deal more damage to feared clan
  if (s <= -30) mods.enemyDmgMult = 1.15; // enemies hit harder (+15%)
  if (s <= -70) mods.enemyDmgMult = 1.30; // extreme fear (+30%)

  // Phantom (extreme positive stealth): bonus SPD in combat
  return mods;
}

// ── Reputation-weighted class pool for recruit screen ──
function getRepWeightedClasses() {
  const s = (GS.reputation || {}).stealth || 0;
  const h = (GS.reputation || {}).honor   || 0;

  const weights = {
    shinobi:   4,
    kunoichi:  3,
    ronin:     3,
    monk:      3,
    shadow:    2,
    berserker: 2,
  };

  // High stealth → more shadow/shinobi/kunoichi
  if (s >= 20) { weights.shadow += 2; weights.shinobi += 2; weights.kunoichi += 1; }
  if (s >= 50) { weights.shadow += 3; weights.shinobi += 1; }

  // Feared → more berserker/ronin
  if (s <= -20) { weights.berserker += 2; weights.ronin += 2; }
  if (s <= -50) { weights.berserker += 3; }

  // High honor → more monk/ronin
  if (h >= 20) { weights.monk += 2; weights.ronin += 2; }
  if (h >= 50) { weights.monk += 3; }

  // Low honor → more berserker/shadow
  if (h <= -20) { weights.berserker += 2; weights.shadow += 1; }

  const pool = [];
  for (const [cls, w] of Object.entries(weights)) {
    for (let i = 0; i < Math.max(0, w); i++) pool.push(cls);
  }
  return pool;
}

function repBar(value, posColor, negColor, label) {

    + '</div>'
    + '<div style="height:6px;background:rgba(255,255,255,0.08);border-radius:2px;position:relative">'
    + '<div style="position:absolute;' + (value >= 0 ? 'left:50%;width:' + (pct/2) + '%' : 'right:50%;width:' + (pct/2) + '%') + ';height:6px;background:' + col + ';border-radius:2px"></div>'
    + '<div style="position:absolute;left:50%;top:-2px;width:1px;height:10px;background:rgba(255,255,255,0.2)"></div>'

function getRepWeightedTypes() {
  // Build a weighted pool of mission types based on shadow reputation
  const rep = GS.reputation || { stealth: 0, honor: 0 };
  const stealth = rep.stealth;
  const honor = rep.honor;

  // Base weights for all types
  const weights = {
    assassination: 3,
    theft: 3,
    espionage: 3,
    agitation: 3,
    rescue: 2
  };

  // High stealth → more espionage/theft; Low stealth (feared) → more assassination/agitation
  if (stealth >= 20)  { weights.espionage += 3; weights.theft += 2; }
  if (stealth >= 50)  { weights.espionage += 4; weights.theft += 2; weights.assassination -= 1; }
  if (stealth <= -20) { weights.assassination += 3; weights.agitation += 2; }
  if (stealth <= -50) { weights.assassination += 3; weights.agitation += 3; weights.espionage -= 1; }

  // High honor → more rescue/escort; Low honor → less rescue
  if (honor >= 20)  { weights.rescue += 3; }
  if (honor >= 50)  { weights.rescue += 4; }
  if (honor <= -20) { weights.rescue = Math.max(0, weights.rescue - 2); weights.agitation += 2; }

  // Flatten to array pool
  const pool = [];
  for (const [type, w] of Object.entries(weights)) {
    for (let j = 0; j < Math.max(0, w); j++) pool.push(type);
  }
  return pool.length ? pool : ['assassination', 'theft', 'espionage', 'agitation', 'rescue'];
}

function generateMissionPool() {
  const maxLevel = GS.clan.length ? Math.max(...GS.clan.map(n => n.level)) : 1;
  const now = Date.now();
  const hourSeed = Math.floor(now / MISSION_REFRESH_INTERVAL);
  const typePool = getRepWeightedTypes();
  const missions = [];
  const used = new Set();
  for (let i = 0; i < DYNAMIC_MISSION_COUNT; i++) {
    let seed = (hourSeed * 7919 + i * 1000003) | 0;
    const diffBias = Math.min(4, Math.max(0, maxLevel - 1 + Math.floor(i / 2)));
    // Pick mission type from rep-weighted pool (use seed % pool length)
    const forcedType = typePool[Math.abs(seed) % typePool.length];
    const m = generateDynamicMission(Math.abs(seed), diffBias, forcedType);
    // Avoid exact duplicate ids
    if (!used.has(m.id)) { used.add(m.id); missions.push(m); }
    else {
      const m2 = generateDynamicMission(Math.abs(seed + 999), diffBias, forcedType);
      used.add(m2.id); missions.push(m2);
    }
  }
  return missions;
}

function checkMissionRefresh() {
  const now = Date.now();
  if (!GS.missionNextRefresh || now >= GS.missionNextRefresh) {
    GS.activeMissions = generateMissionPool();
    GS.missionNextRefresh = Math.ceil(now / MISSION_REFRESH_INTERVAL) * MISSION_REFRESH_INTERVAL;
    saveGame();
  }
}

function manualRefreshMissions() {
  if (GS.gold < MISSION_MANUAL_REFRESH_COST) {
    toast(`Need G${MISSION_MANUAL_REFRESH_COST} gold to refresh missions.`, 'error');
    return;
  }
  openModal('Refresh Missions?',
    `Spend <b style="color:var(--gold)">G${MISSION_MANUAL_REFRESH_COST} gold</b> to receive a new set of contracts immediately?`,
    [
      { label: `G Spend ${MISSION_MANUAL_REFRESH_COST} Gold`, fn: () => {
        GS.gold -= MISSION_MANUAL_REFRESH_COST;
        GS.activeMissions = generateMissionPool();
        // Push next auto-refresh time forward
        GS.missionNextRefresh = Date.now() + MISSION_REFRESH_INTERVAL;
        selectedMissionId = null;
        saveGame(); updateGoldDisplay(); closeModal();
        renderMissions();
        toast('New contracts received.', 'success');
      }, cls: 'confirm' },
      { label: 'Cancel', fn: closeModal, cls: '' }
    ]
  );
}

function getMissionTimeLeft() {
  const left = Math.max(0, GS.missionNextRefresh - Date.now());
  const mins = Math.floor(left / 60000);
  const secs = Math.floor((left % 60000) / 1000);
  if (mins >= 60) {
    const hrs = Math.floor(mins / 60);
    const m = mins % 60;
    return `${hrs}h ${m}m`;
  }
  return `${mins}m ${secs}s`;
}

function getAllMissions() {
  return [...MISSIONS, ...GS.activeMissions];

const DIFFICULTY_TIER = ['common', 'common', 'uncommon', 'rare', 'legendary', 'epic'];

function spawnEnemyWeapon(enemyTypeKey, difficulty) {
  const prefs = ENEMY_WEAPON_PREFS[enemyTypeKey] || ['blades'];
  const tier = DIFFICULTY_TIER[Math.min(difficulty, 5)] || 'common';
  // Try preferred weapon types first, fall back to any
  for (const wType of prefs) {
    const pool = (WEAPONS[wType]?.items || []).filter(w => w.tier === tier);
    if (pool.length) {
      const template = pool[Math.floor(Math.random() * pool.length)];
      return initWeapon(template, wType);
    }
  }
  // Fallback: pick anything at this tier
  const allAtTier = Object.entries(WEAPONS).flatMap(([wType, cat]) =>
    cat.items.filter(w => w.tier === tier).map(w => ({ w, wType }))
  );
  if (allAtTier.length) {
    const pick = allAtTier[Math.floor(Math.random() * allAtTier.length)];
    return initWeapon(pick.w, pick.wType);
  }
  return null;
}

const IMG_CACHE = {};  // key → HTMLImageElement (null if failed/not ready)

// Sprite sheet layout: 4 frames horizontal — south(0) east(1) west(2) north(3)
const FACING_FRAME = { south: 0, east: 1, west: 2, north: 3 };

function classPng(className) {
  return className.charAt(0).toUpperCase() + className.slice(1) + '.png';
}

function enemySheetKey(typeName) {
  return typeName.split('_').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join('_') + '.png';
}

// All filenames the game may ever need — loaded once at page open
function getAllGameImages() {
  const files = new Set();

  files.add('wall.png');
  Object.keys(CLASSES).forEach(k => files.add(classPng(k)));
  Object.keys(ENEMY_TYPES).forEach(k => files.add(enemySheetKey(k)));
  return [...files];
}

function loadImg(filename) {
  if (IMG_CACHE[filename] !== undefined) return;
  IMG_CACHE[filename] = null; // placeholder while loading
  const img = new Image();
  img.onload  = () => { IMG_CACHE[filename] = img; };
  img.onerror = () => { IMG_CACHE[filename] = null; };
  img.src = filename;
}

function getImg(filename) {
  return IMG_CACHE[filename] || null;
}

// Draw one frame from a 4-frame horizontal sprite sheet.
// Guards against zero-dimension images that would throw on ctx.drawImage.
// Returns an img element src data-url of a sprite's south-facing frame, or empty string
function getEnemySpriteDataURL(typeKey, size) {
  const img = getImg(enemySheetKey(typeKey));
  if (!img || img.naturalWidth <= 0) return '';
  try {
    const c = document.createElement('canvas');
    c.width = size; c.height = size;
    const ctx2 = c.getContext('2d');
    const fw = img.naturalWidth / 4;
    const fh = img.naturalHeight;
    // South = frame 0
    ctx2.drawImage(img, 0, 0, fw, fh, 0, 0, size, size);
    return c.toDataURL();
  } catch(e) { return ''; }
}

function getClassSpriteDataURL(classKey, size) {
  const img = getImg(classPng(classKey));
  if (!img || img.naturalWidth <= 0) return '';
  try {
    const c = document.createElement('canvas');
    c.width = size; c.height = size;
    const ctx2 = c.getContext('2d');
    const fw = img.naturalWidth / 4;
    const fh = img.naturalHeight;
    ctx2.drawImage(img, 0, 0, fw, fh, 0, 0, size, size);
    return c.toDataURL();
  } catch(e) { return ''; }
}

function drawSpriteFrame(ctx, img, facing, dx, dy, dw, dh) {
  const fw = img.naturalWidth / 4;
  const fh = img.naturalHeight;
  if (fw <= 0 || fh <= 0 || dw <= 0 || dh <= 0) return; // not decoded yet
  const frameIdx = FACING_FRAME[facing] ?? 0;
  ctx.drawImage(img, frameIdx * fw, 0, fw, fh, dx, dy, dw, dh);
}

}

// Global handler reference so we can always remove the stale one on DOM rebuild
let _sidebarOutsideHandler = null;

function attachMissionSidebarListeners(sb) {
  // Remove any stale global outside-click handler
  if (_sidebarOutsideHandler) {
    document.removeEventListener('pointerdown', _sidebarOutsideHandler);
    _sidebarOutsideHandler = null;
  }

  // Fresh outside-click handler pointing at the current sb element
  _sidebarOutsideHandler = function(e) {
    const currentSb = document.querySelector('.mission-sidebar');
    if (!currentSb || !currentSb.classList.contains('open')) return;
    if (currentSb.contains(e.target)) return; // click inside — do nothing
    const fab = document.querySelector('.deploy-fab');
    if (fab && fab.contains(e.target)) return; // FAB toggles, don't double-close
    closeMissionSidebar();
  };
  setTimeout(() => document.addEventListener('pointerdown', _sidebarOutsideHandler), 80);

  // Drag-to-close — only attach once per element (new element = new sb each rebuild)
  if (sb._dragAttached) return;
  sb._dragAttached = true;
  let startY = null, currentY = null;

  sb.addEventListener('touchstart', e => {
    const handle = sb.querySelector('.mission-sidebar-handle');
    if (!handle || !handle.contains(e.target)) return;
    startY = e.touches[0].clientY;
    currentY = startY;
  }, { passive: true });

  sb.addEventListener('touchmove', e => {
    if (startY === null) return;
    currentY = e.touches[0].clientY;
    const delta = currentY - startY;
    if (delta > 0) {
      sb.style.transform = 'translateY(' + delta + 'px)';
      sb.style.transition = 'none';
    }
  }, { passive: true });

  sb.addEventListener('touchend', () => {
    if (startY === null) return;
    const delta = currentY - startY;
    sb.style.transform = '';
    sb.style.transition = '';
    if (delta > 80) closeMissionSidebar();
    startY = null; currentY = null;
  });
}

function usedNinjaNames() {
  return new Set(GS.clan.map(n => n.name));
}

function pickUnusedName() {
  const used = usedNinjaNames();
  const pool = NINJA_NAMES.filter(n => !used.has(n));
  if (!pool.length) {
    // All names used — add a number suffix
    const base = NINJA_NAMES[Math.floor(Math.random() * NINJA_NAMES.length)];
    return base + ' II';
  }
  return pool[Math.floor(Math.random() * pool.length)];
}

function generateHireableNinja(targetLevel) {
  const classPool = getRepWeightedClasses();
  const classKey = classPool[Math.floor(Math.random() * classPool.length)];
  const cls = CLASSES[classKey];
  const level = Math.max(1, targetLevel + Math.floor(Math.random() * 3) - 1);
  const special = cls.specialMoves[Math.floor(Math.random() * cls.specialMoves.length)];

  // Scale HP with level
  const bonus = (level - 1) * 10;
  const cost = RECRUIT_BASE_COST + (level - 1) * RECRUIT_PER_LEVEL;

  // Give a small chance of a random weapon
  let weapon = null;
  if (Math.random() < 0.4) {
    const weapTypes = Object.keys(WEAPONS);
    const wType = weapTypes[Math.floor(Math.random() * weapTypes.length)];
    // Match tier to level
    const tierMap = [null, 'common', 'common', 'uncommon', 'uncommon', 'rare'];
    const tier = tierMap[Math.min(5, level)] || 'common';
    const pool = WEAPONS[wType].items.filter(w => w.tier === tier);
    if (pool.length) weapon = initWeapon(pool[Math.floor(Math.random() * pool.length)], wType);
  }

  // Random trait for flavour
  const traits = [
    'Former palace guard. Reliable in tight spaces.',
    'Street brawler who fights dirty and wins.',
    'Wandering ronin seeking purpose.',
    'Ex-merchant with a knack for ambushes.',
    'Orphaned apprentice, eager to prove worth.',
    'Disgraced samurai — dangerous and unpredictable.',
    'Quiet assassin who never misses a target.',
    'Healer turned warrior out of necessity.',
    'Cheerful but ruthless in equal measure.',
    'Night-hunter with exceptional reflexes.',
    'Pirate turned shadow-walker.',
    'Former spy with too many secrets.',
  ];

  return {
    id: 'hire_' + Date.now() + '_' + Math.floor(Math.random() * 9999),
    name: pickUnusedName(),
    class: classKey,
    level, exp: 0, expToNext: 100,
    hp: cls.baseStats.hp + bonus, maxHp: cls.baseStats.hp + bonus,
    stamina: cls.baseStats.stamina, maxStamina: cls.baseStats.stamina,
    chi: cls.baseStats.chi, maxChi: cls.baseStats.chi,
    proficiency: { ...cls.proficiency },
    specialMove: special,
    weapon, carriedItems: [],
    training: null, isPlayer: false,
    jobs: {}, unlockedAbilities: [],
    equippedAbilities: { reaction: null, support: null, movement: null },
    hireCost: cost,
    hireTrait: traits[Math.floor(Math.random() * traits.length)],
  };
}

function generateRecruitRoster() {
  const maxLevel = GS.clan.length ? Math.max(...GS.clan.map(n => n.level)) : 1;
  const roster = [];
  for (let i = 0; i < RECRUIT_ROSTER_SIZE; i++) {
    roster.push(generateHireableNinja(maxLevel));
  }
  GS.recruitRoster = roster;
  GS.recruitNextRefresh = Date.now() + 3600000; // 1 hour
  // NOTE: deliberately not calling saveGame() here — called by the player action that triggers this
}

function hireNinja(id) {
  const candidate = GS.recruitRoster.find(n => n.id === id);
  if (!candidate) { toast('Ninja no longer available.', 'error'); return; }
  if (GS.gold < candidate.hireCost) {
    toast('Not enough gold! Need ' + candidate.hireCost + 'G.', 'error');
    return;
  }
  GS.gold -= candidate.hireCost;
  // Strip hire-specific fields, add to clan
  const { hireCost, hireTrait, ...ninja } = candidate;
  ninja.id = 'ninja_' + Date.now();
  GS.clan.push(ninja);
  GS.recruitRoster = GS.recruitRoster.filter(n => n.id !== id);
  saveGame();
  updateGoldDisplay();
  toast(ninja.name + ' joins your clan!', 'success');
  renderRecruitShop();
  renderClan();
}
